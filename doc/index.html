esignated statement.\n\nConcurrent use of mouse and keyset also provide considerable gains in speed and flexibility for studying and modifying document structure. For example, if when studying the overview described in the previous paragraph, the author perceives that Statement 2b really belongs in Section 3, following Statement 3c, he can execute the necessary move command in a very quick, deft manner:\n\nKeyset hand strikes \"m\" and \"b\" (for Move Branch), while the mouse hand is positioning the cursor anywhere in the text line of Statement 2b. [Two chord strokes.]\n\nThe mouse hand depresses the <Select> button on the mouse while the cursor is on Statement 2b, then moves to Statement 3c and depresses it again, and then depresses it again to say, \"OK, do it.\" [Three button pushes, synchronized with the mouse movement as it made two selections on easy, window-wide, whole-line targets.]\n\n(Note: I just had myself timed for this above operation -- an unhurried 2.5 seconds.)\n\nIn our view, interactive computer support offers an author a priceless opportunity to get away from the geometric bondage inflicted by pages, margins, and lines -- things which have very little if any bearing upon the content and organization of one's text. In terms of value to the authoring process, we differ sharply from those who advocate a \"What you see is what you get\" working mode during the development of a document's content and organization. For this kind of work, experienced users of the foregoing kind of flexible facility for addressing, viewing, and manipulating structured documents, would consider a \"What you see ...\" mode as a relative handicap.\n\nSupporting Multi-Party Collaboration\n\nThe support that advanced technology can provide for close collaboration among knowledge workers is a very important and much under-rated possibility. For multiple-author activities, collaborative support is an important aspect of system capability. Some years ago, we introduced the following provisions into AUGMENT. (A more complete, overview treatment of these is given in <Ref-8>.)\n\nElectronic Mail. Its primary attributes of speed, automatic distribution, and computer-to-computer directness are well recognized -- and are generally accepted now as important to the effectiveness of knowledge workers. AUGMENT Mail has features that are beyond what most electronic mail systems offer, and which provide unique benefit to the authorship process.\n\nAUGMENT's mail system allows one to \"send\" complete, structured documents as well as small messages. In an authorship environment, an important role for \"electronic mail\" is for the control and distribution of documents -- where small, throw-away messages are considered to be but a special class of document. An author should be able to bundle up any combination of text and graphics, in the forms that he has been using for studying and manipulating them -- and send the bundle to other workers. In AUGMENT, such a bundle is just like any other file structure, and can be studied and manipulated, incorporated into other files (documents), saved or deleted.\n\nRecorded Mail -- AUGMENT's Journal System. When mailing a document, an AUGMENT worker may optionally specify that it be installed as a \"recorded\" item. In this case, before distributing the item, the system will make a permanent record if it, as a file in a specified Journal collection. And, just as though it had been published, this recorded Journal item cannot later be changed. The system assigns a straightforward accession identifier (a simple number), and any authorized worker is henceforth guaranteed access to that Journal item by specifying the name of the Journal-collection and the Journal-item number -- e.g., as specified in the link \"<OAD,2237,>\".\n\nA given journal may be set up to serve multiple hosts and is much like a special library. It has its collection of documents, and AUGMENT provides associated support processes for entry, cataloging, retrieval, and access.\n\nTogether with the linking capability described above, a Journal system provides an extremely effective form of \"recorded dialog.\" Cross-reference links between a succession of Journal items produces an inter-linked network of collaborative contributions -- plans, outlines, document drafts, schedules, short comments, detailed critiques, reference material, etc. The on-line worker can follow these links very easily and, using multiple windows and flexible viewing options, can make very effective use of such records.\n\nFor instance, consider a detailed commentary directed toward a \"preliminary design\" document recorded in a given Journal collection. The author writing the commentary could view the design document in one window and his developing commentary document in another. He can easily establish links in his commentary to cite any passage in the design document -- e.g., a statement, a term in the statement, or a diagram. Then this author would submit his commentary into the Journal, perhaps specifying a list of colleagues for \"distribution.\" Each listed user would automatically receive a mail item announcing this new Journal entry, giving subject, author, date, etc., and the all-important link to the new Journal file containing the commentary. Any such recipient can subsequently study both the commentary and its cited planning document in a similar, multi-window, link-assisted manner.\n\nFurthermore, this second reader could develop and submit his own recorded commentary, which because of the citation power of AUGMENT links could be as short and to the point as: \"Frankly, John, I think your comment in (DDD,xxx,aa) is a mistake! Didn't you notice the earlier assumption in (DDD,xxx,bb)? Maybe you should go back to Tom's earlier requirements document -- especially at (EEE,yy,cc).\" (Here, \"DDD\" and \"EEE\" represent Journal names, \"xxx\", \"yyy\", and \"zzz\" represent Journal item numbers, and \"aa\", \"bb\", and \"cc\" represent addresses pointing to specific passages in those Journal files.)\n\nIn official parlance, \"retrieval\" is the finding out about the existence of a relevant piece of information, whereas \"access\" is the subsequent process of gaining possession of the information. For users of AUGMENT's Journal system, retrieval is immensely facilitated by the widespread use of citation links. When one can follow them as easily as can a practiced AUGMENT worker, these links provide extremely effective retrieval support. We have supplemented this with some simple, automatically generated catalog files, which made a rather nice balance. Access is provided by direct Jump on a reference link if the file is on line; if it isn't, AUGMENT asks the worker if she wants it retrieved, and a simple affirmative response automatically launches a request for the system operator to retrieve the file from its archive tape, after which the worker is notified of its availability via electronic mail.\n\nA private document can be submitted into a Journal. In this case, only those workers listed at Journal-entry time can get access to the central copy. Such a private item would not be listed or indexed in the \"public\" catalogs.\n\nWe have used the Journal system very heavily since 1970 to support AUGMENT's development activity; many customers have employed it heavily since 1975. There are about 100,000 entries recorded in the original Journal now (I don't know about other, newer AUGMENT Journal collections). We found that as workers became at home in this environment, they were increasingly free about submitting their items to the \"public.\" It became evident that the scientific tradition of active and open interchange has some solid relevance to the collaborative processes in our smaller, \"colleague communities.\" Time and again a worker would come across others' dialog and be able to contribute some valuable information (sometimes a one-sentence comment with a critical citation link). Often the payoff went the other way: the new party found immediate value in an old piece of recorded dialog.\n\nShared-Screen Teleconferencing. Consider a case where two people sit down to work together at a terminal, where they can both see the screen(s), and where either one can take over the controls. This is being done countless times every day throughout the country, in different combinations of expert-expert, expert-novice, novice-coach, etc. When talking together on their telephones, two or more distantly separated AUGMENT users can collaborate in a manner very similar to this.\n\nSuppose that two workers, Smith and Jones, want to set up and operate in a Shared-Screen Conferencing mode. Smith is in Princeton, working on host Office-4, and Jones is in San Francisco, working on host Office-12 -- and both of these host computers are connected to the same network. Assumedly they are in telephone contact when they decide to work in this shared-screen mode to collaborate on Smith's current job.\n\nJones will enter the command \"Share (display with user) SMITH! On host OF12! Viewing (other display)!!\"\n\nSmith will enter the command \"Share (display with user) JONES! On host OF4! Showing (this display)!!\"\n\nTo give these commands, each person only entered the characters shown in upper case (entry case actually irrelevant), plus the digits, plus an \"OK Key\" action where each exclamation point is shown.\n\nWhatever tool that Jones is currently using will continue responding to his controlling actions, as evidenced by various feedback and portrayal actions in the windows on his screen. Smith's screen image will clear, and be replaced with a replica of Jones' screen image -- multiple windows and all. For the duration of the shared-screen session, Smith's screen image will continue to replicate what is shown on Jones' screen.\n\nThere are provisions for passing control back and forth between workers. For instance, Jones can pass control to Smith so that Smith can show him some material or method of work. There are also provisions for the subsequent entry and departure of other conference participants.\n\nEmbedding the Graphic Illustrations\n\nFor complete support of document development, it is important to provide integrated means for developing, viewing, and manipulating graphical portrayals. These portrayals should be part of the working files from the very start, to be studied, passed about in mail, shared in Conferencing mode, edited, captioned, labelled, and moved about within the document structure. Furthermore, active, relevant citation links pointing to these graphical constructs would be installed in and followed from textual passages throughout the associated set of documents (including Mail and Journal documents).\n\nAUGMENT's architecture and file structure were designed for this end, and a good bit of the associated implementation is in place.\n\nA graphical data structure can be attached to any given file node, and there are basic capabilities for composing, studying, and modifying graphical diagrams. When formatting for a suitably equipped photo-typesetting device, there are formatting directives to designate the position and scale for placing these diagrams on a page. An AUGMENT file with integrated text and graphics can thus be mapped automatically onto a high-quality document whose pages contain both text and line drawings.\n\nOur goal here was for what we call an \"illustrative graphics\" capability -- basic to which is a command that, when directed toward any conventional \"plotter\" file, will translate it into a diagram attached to a designated node. In this way we can make use of graphic constructs developed within almost any applications system, most of which have provision for outputting \"conventional\" plotter files.\n\nThe most important next step is to adapt a bit-mapped display as an AUGMENT workstation, so the integrated text and graphics can be viewed and manipulated on the same screen. Heretofore, to do graphic work, an author has had to attach a Tektronix 4014 storage-tube display to the special printer/graphic port of her AUGMENT workstation. This has made use of AUGMENT graphics slow and expensive enough to limit the number of user groups who have developed the integrated use of mixed text and graphics.\n\nConclusion\n\nAUGMENT's unique provisions stemmed for the most part from the conceptual framework within which AUGMENT was developed. For instance, consider the pervasive and significant changes in the environment in which humans will be doing their knowledge work. Note that the habits, methods, conventions, intuitions, etc., that comprise the \"ways\" in which we think, work and collaborate, are for the most part products of many centuries of cultural evolution -- in a radically different environment. With a radically different environment, this constant process of cultural evolution can be expected to take some radical turns.\n\nThe AUGMENT developmental framework assumed that many of these \"ways\" are candidates now for change in directions that heretofore would not have been beneficial. The AUGMENT system emerged as a first step in considering a few such changes, which perhaps can improve human capability for doing knowledge work because their new \"ways\" will enable us more effectively to harness the new tools toward more effective basic capability. (This is very different from trying to \"automate\" our old \"ways\" of doing things.)\n\nAs an example, consider the \"What You See Is What You Get\" (WYSIWYG) syndrome. It is a highly touted feature for many vendors. It provides a definite advantage for the final process of converting a computer-held document to a nicely formatted hard copy. But what does it do for authorship? Well, in our framework, it has a negative impact. We were happy to abandon those constraints of lines and pages and other formatting geometry which did not contribute to matters of content and structure. We have chosen instead to provide the authorship process with structured files, flexible addressing, flexible window-size viewing, level and truncation viewspecs, etc. -- things that would be awkward or impossible to provide in a WYSIWYG environment. This provides the authorship phase with flexibility and power for studying and manipulating content and structure that we wouldn't consider trading off for WYSIWYG. Save it for the production phase.\n\nHere is another bit of culture that deserves re-examination. Consider the dictum, \"Easy to learn, and natural to use.\" Or, \"User friendly.\" The question is, for whom are you judging that things will be easy, or natural, or friendly? For designers of craft-work tool systems, very different perceptions of this issue are warranted between a system for the occasional, weekend do-it-yourself person and a system to be heavily used day after day by professionals. The AUGMENT User Interface System enables us easily to configure either kind of a tool collection.\n\nThis paper describes part of what is provided to professional knowledge workers who do a significant amount of authorship work. We observe no more difficulty in their learning how to employ this relatively large collection of tools than one would expect for professional woodworkers in their learning about the relatively large collection of chisels and other tools of their trade.\n\nIt is a basic part of our framework that, to augment human knowledge workers, attention must be given not only to tools, but to methods and skills as well. Because of space limitations, the scope of this paper was restricted to a summary of those tool provisions within AUGMENT that especially facilitate the authorship process. A full description of \"How to use AUGMENT to ...\" would definitely need to include methods of work that effectively harness these tool provisions, and the special kinds of skills that yield unique payoff in executing these methods. This is true for every tool system, of course, but it seems especially true in this case because many AUGMENT provisions do not fit into the general cultural background of our authorship process.\n\nPerhaps the best way for very brief summarization of what AUGMENT's users feel about its unique features is simply to say that those who leave its working environment really miss them.\n\nReferences\n\nRef-1: Engelbart, D. C., \"Toward Integrated, Evolutionary Office Automation Systems,\" Proceedings of the 26th Joint Engineering Management Conference, Denver, CO, Oct. 16-18, 1978, pp. 63-68. (AUGMENT,71279,)\n\nRef-2: Engelbart, D. C., R. W. Watson and J. C. Norton, \"The Augmented Knowledge Workshop,\" AFIPS Conference Proceedings, Volume 42, pp. 9-21, National Computer Conference, June 4-8, 1973. (AUGMENT,14724,)\n\nRef-3: Michael, Elizabeth K., Dirk H. van Nouhuys, Beverly R. Boli, Raphael Rom, and Ann C. Weinberg, \"Document Production and Control Systems,\" Phase One report of Document Production and Control Systems Design Study, by the Augmentation Research Center, SRI International, for AF Rome Air Development Center, Contract F30602-76-C-003, March 1, 1977. (AUGMENT,37730,)\n\nRef-4: Boli, Beverly R., Harvey G Lehtman, Elizabeth K. Michael, Raphael Rom, Dirk H. van Nouhuys, and Nina Zolotow, \"A Model Document Production System,\" Phase Two report of Document Production and Control Systems Design Study, by the Augmentation Research Center, SRI International, for AF Rome Air Development Center, Contract F30602-76-C-003, July 30, 1977. (AUGMENT,29000,)\n\nRef-5: Engelbart, D. C., \"Toward High-Performance Knowledge Workers,\" OAC '82 Digest (Proceedings of the 1982, AFIPS Office Automation Conference, San Francisco, Ca., April 5-7), pp. 279-290. (AUGMENT, 81010,)\n\nRef-6: Watson, Richard W., \"User Interface Design Issues for a Large Interactive System,\" AFIPS Conference Proceedings, Volume 45, AFIPS Press, 1976, Montvale, NJ, pp. 357-364. (AUGMENT,27171,)\n\nRef-7: Engelbart, D. C., \"Design Considerations for Knowledge Workshop Terminals,\" AFIPS Conference Proceedings, Volume 42, pp. 221-227, National Computer Conference, June 4-8, 1973. (AUGMENT,14851,)\n\nRef-8: Engelbart, D. C., \"Collaboration Support Provisions in AUGMENT,\" OAC '84 Digest (Proceedings of the 1984, AFIPS Office Automation Conference, Los Angeles, Ca., February 20-22). (OAD,2221,)"}},"manifest":[{"authors":["Sarah"],"date":"2015-10-10","has_audio":true,"slug":"2015-10-10-software-isnt-real","source_url":"https://ultrasaurus.com/2015/10/software-isnt-real/","title":"software isn’t real"},{"authors":["Christina Engelbart","Doug Engelbart Institute"],"date":"2024-12-01","description":"Visit the Doug Engelbart Institute to explore his remarkable legacy and all it inspires (official site)","has_audio":true,"slug":"2024-12-01-authorship-provisions-in-augment-1984-oad2250","source_url":"https://www.dougengelbart.org/content/view/148/","title":"Authorship Provisions in AUGMENT - 1984 (OAD,2250,)"}],"transcripts":{"2015-10-10-software-isnt-real":[{"end":8.109405517578125,"index":0,"paragraph_end":false,"start":0.0,"text":"Images and sound, which respond to our touch, create the feeling that we are interacting with something that is actually there."},{"end":10.677597999572754,"index":1,"paragraph_end":false,"start":8.109405517578125,"text":"We talk about going to a web site."},{"end":22.310461044311523,"index":2,"paragraph_end":false,"start":10.677597999572754,"text":"We tap buttons, open folders, and select choices from menus, and aren’t bothered by the inconsistency with real world analogs as we drag windows and surf the web."},{"end":31.572239875793457,"index":3,"paragraph_end":false,"start":22.310461044311523,"text":"I don’t know the story behind this image sent to me via Twitter by “Brett” — is it an original in drawing or native digital creation?"},{"end":36.14282464981079,"index":4,"paragraph_end":false,"start":31.572239875793457,"text":"or were 140 characters too short for attribution?"},{"end":54.37646150588989,"index":5,"paragraph_end":false,"start":36.14282464981079,"text":"There is a strength in the Tim Berners-Lee vision of the web as “always a little bit broken” allowing for us to post these disconnected fragments which cause images and video to act like language, spread virally and owned by no one, in direct contradiction to our copyright laws."},{"end":71.86076402664185,"index":6,"paragraph_end":false,"start":54.37646150588989,"text":"I also feel a loss that there was never widespread adoption of the Ted Nelson model that he envisioned when he coined the word “hypertext” — every link could let you dive into its source and references were a “transclusion” — instead of copying, everything would be by reference."},{"end":79.14127683639526,"index":7,"paragraph_end":false,"start":71.86076402664185,"text":"We need to intentionally draw real world connections in this strange, fictional world of software we create."},{"end":85.54893064498901,"index":8,"paragraph_end":true,"start":79.14127683639526,"text":"Even the so-called users of software create this world of code and data that we inhabit."}],"2024-12-01-authorship-provisions-in-augment-1984-oad2250":[{"end":2.1646666666666667,"index":0,"paragraph_end":true,"start":0.0,"text":"Abstract"},{"end":9.076,"index":1,"paragraph_end":false,"start":2.1646666666666667,"text":"AUGMENT is a text processing system marketed by Tymshare for a multi-user, network environment."},{"end":19.272666666666666,"index":2,"paragraph_end":false,"start":9.076,"text":"In AUGMENT's frontend is a User Interface System that facilitates flexible evolution of command languages and provides optional command recognition features."},{"end":28.27466666666667,"index":3,"paragraph_end":false,"start":19.272666666666666,"text":"Exceptionally fast and flexible control of interactive operations is enabled by concurrent action of mouse and optional one-handed chord keyset."},{"end":36.63666666666667,"index":4,"paragraph_end":false,"start":28.27466666666667,"text":"Files are hierarchically structured, and textual address expressions can flexibly specify any text entity in any file."},{"end":44.26266666666667,"index":5,"paragraph_end":false,"start":36.63666666666667,"text":"The screen may be divided into arbitrary, rectangular windows, allowing cross-file editing between windows."},{"end":53.39266666666667,"index":6,"paragraph_end":false,"start":44.26266666666667,"text":"Many options exist for controlling the \"view\" of a file's text in a window, e.g.: level clipping, paragraph truncation, and content filtering."},{"end":59.80266666666667,"index":7,"paragraph_end":false,"start":53.39266666666667,"text":"Structural study and modification of on-line documents are especially facilitated."},{"end":67.24733333333333,"index":8,"paragraph_end":false,"start":59.80266666666667,"text":"A Journal system and \"Shared Screen Teleconferencing\" support collaboration among authors and their colleagues."},{"end":72.58,"index":9,"paragraph_end":true,"start":67.24733333333333,"text":"Graphic illustrations may be embedded in the same file with text."},{"end":74.93666666666667,"index":10,"paragraph_end":true,"start":72.58,"text":"Introduction"},{"end":80.30133333333333,"index":11,"paragraph_end":false,"start":74.93666666666667,"text":"AUGMENT was designed for augmenting human intellectual capabilities."},{"end":91.202,"index":12,"paragraph_end":false,"start":80.30133333333333,"text":"It was targeted particularly toward the core work of professionals engaged in \"tough knowledge work\" -- e.g., planning, analyzing, and designing in complex problem domains."},{"end":98.13466666666666,"index":13,"paragraph_end":true,"start":91.202,"text":"And special attention was paid to augmenting group collaboration among workers pursuing common goals."},{"end":106.36866666666666,"index":14,"paragraph_end":false,"start":98.13466666666666,"text":"Authorship has received a great deal of attention in AUGMENT's evolution, as one of the central human activities to be augmented."},{"end":118.59199999999998,"index":15,"paragraph_end":false,"start":106.36866666666666,"text":"An important set of provisions within AUGMENT -- in its architecture, design principles, and specific features -- is directly aimed toward bringing high performance to the authorship activities of knowledge workers."},{"end":125.17266666666666,"index":16,"paragraph_end":true,"start":118.59199999999998,"text":"For the purposes of this paper, we thus speak interchangeably of \"knowledge worker\" and \"author.\""},{"end":133.79066666666665,"index":17,"paragraph_end":false,"start":125.17266666666666,"text":"We recognize explicitly that highly skilled workers in any field, and knowledge work is no exception, are those with good command of their tools."},{"end":141.38466666666665,"index":18,"paragraph_end":false,"start":133.79066666666665,"text":"Our basic design goal was to provide a set of tools that would not themselves limit the capabilities of the people using them."},{"end":150.08799999999997,"index":19,"paragraph_end":true,"start":141.38466666666665,"text":"A system designed to encourage more skilled workers will always enable higher human performance than one designed to support less skilled workers."},{"end":161.45799999999997,"index":20,"paragraph_end":false,"start":150.08799999999997,"text":"In this regard, our design goal was to provide as much capability as possible for each level of system usage skill, and a continuous evolution path between skill levels."},{"end":170.04399999999998,"index":21,"paragraph_end":false,"start":161.45799999999997,"text":"We believe firmly that knowledge workers are motivated to grow in knowledge and skill and that provisions in system design should support this."},{"end":186.35266666666666,"index":22,"paragraph_end":true,"start":170.04399999999998,"text":"As the rest of the paper reveals, this approach translates into a rich set of AUGMENT provisions, aimed at providing speed and flexibility for skilled workers in organizing and pursuing their core knowledge work -- in which \"authorship\" is a primary activity."},{"end":207.74933333333334,"index":23,"paragraph_end":true,"start":186.35266666666666,"text":"An explicit sub-goal in AUGMENT's development was to \"augment\" the development, production and control of complex technical documentation -- through the whole cycle of gathering information, planning, creating, collaborating, reviewing, editing, controlling versions, designing layout, and producing the final documents."},{"end":212.98600000000002,"index":24,"paragraph_end":false,"start":207.74933333333334,"text":"This paper concentrates upon the development phase of this cycle."},{"end":220.2386666666667,"index":25,"paragraph_end":true,"start":212.98600000000002,"text":"AUGMENT has well-developed tools to support the later, production phase, but their discussion is not included here."},{"end":243.4486666666667,"index":26,"paragraph_end":true,"start":220.2386666666667,"text":"Studying another's work provides a well-recognized challenge, but one of the toughest jobs is to study one's own work during its development: to see what it really says about Issue X; to see if it does provide for Concept Y; to see if it is reasonably organized and structured -- and to do these over a body of material before it is \"polished\", i.e., before it is well structured, coherently worded, non-redundant and consistently termed."},{"end":245.8586666666667,"index":27,"paragraph_end":true,"start":243.4486666666667,"text":"Some Background"},{"end":247.95933333333335,"index":28,"paragraph_end":true,"start":245.8586666666667,"text":"History"},{"end":255.45733333333334,"index":29,"paragraph_end":false,"start":247.95933333333335,"text":"AUGMENT is an integrated system of knowledge-worker tools that is marketed by Tymshare's Office Automation Division."},{"end":263.5953333333333,"index":30,"paragraph_end":false,"start":255.45733333333334,"text":"The system was developed at SRI International over an extended period under the sponsorship of NASA, DARPA, and RADC."},{"end":272.37333333333333,"index":31,"paragraph_end":false,"start":263.5953333333333,"text":"Commercial rights were transferred to Tymshare in 1978 (where the system has since been renamed from NLS to AUGMENT) and its evolution continued."},{"end":280.53266666666667,"index":32,"paragraph_end":false,"start":272.37333333333333,"text":"A short history of AUGMENT's development may be found in <Ref-1>, along with a summary of system characteristics and features."},{"end":287.81733333333335,"index":33,"paragraph_end":true,"start":280.53266666666667,"text":"The general R&D philosophy and the design principles behind AUGMENT'S development are laid out in <Ref-2>."},{"end":294.80333333333334,"index":34,"paragraph_end":false,"start":287.81733333333335,"text":"The system evolved on time-shared, mainframe computers, and in a packet-switched network environment."},{"end":303.496,"index":35,"paragraph_end":false,"start":294.80333333333334,"text":"In 1970 our computer was the second to be attached to the ARPANET, and since 1978 we have also operated extensively in the TYMNET environment."},{"end":316.1886666666666,"index":36,"paragraph_end":false,"start":303.496,"text":"We have benefited directly from both the time-sharing and the network environments in matters that are important to the authorship process -- especially in dealing with large documents and multi-party documentation activities."},{"end":325.16933333333327,"index":37,"paragraph_end":true,"start":316.1886666666666,"text":"In 1976-77 we conducted some applied studies for the Air Force, as reported in <Ref-3> and <Ref-4>, which concentrated upon this latter application."},{"end":328.5286666666666,"index":38,"paragraph_end":true,"start":325.16933333333327,"text":"Relevant Architectural Features"},{"end":340.2079999999999,"index":39,"paragraph_end":false,"start":328.5286666666666,"text":"Perhaps AUGMENT's most unique architectural feature is its User Interface System (UIS), a special software module, which handles the human/computer interfaces to all interactive programs."},{"end":362.53266666666656,"index":40,"paragraph_end":false,"start":340.2079999999999,"text":"It takes care of all command-language dialog and connection protocols, and provides a framework for building a coherent and integrated user environment while supporting flexible evolution on both sides: on the user's side, with evolution of command function and terminology; and on the technology side, with evolving hardware and software."},{"end":368.57999999999987,"index":41,"paragraph_end":true,"start":362.53266666666656,"text":"(Design details are outlined in <Ref-5>; rationale and utilization in <Ref-6>.)"},{"end":377.51799999999986,"index":42,"paragraph_end":false,"start":368.57999999999987,"text":"The UIS provides a reach-through service to non-AUGMENT systems, and can optionally translate back and forth to a foreign program's command language."},{"end":383.88533333333316,"index":43,"paragraph_end":true,"start":377.51799999999986,"text":"It also supports the shared-screen, remote collaboration capability discussed below."},{"end":392.8659999999998,"index":44,"paragraph_end":true,"start":383.88533333333316,"text":"AUGMENT's architecture provides for open-ended expansion and flexible evolution of system functionality and worker command languages."},{"end":404.5773333333332,"index":45,"paragraph_end":false,"start":392.8659999999998,"text":"It is assumed that for any class of knowledge workers, specialized application systems developed by other parties, perhaps running on other computers, will provide services worth integrating."},{"end":409.0886666666665,"index":46,"paragraph_end":false,"start":404.5773333333332,"text":"The \"author class\" of worker should be no exception."},{"end":417.22666666666646,"index":47,"paragraph_end":true,"start":409.0886666666665,"text":"Continuing evolution toward the \"author workshop of the future\" will certainly depend upon some such features in workshop architecture."},{"end":425.8019999999998,"index":48,"paragraph_end":true,"start":417.22666666666646,"text":"It provides adaptation for different terminal characteristics, enabling application programers to work as though with a virtual terminal."},{"end":428.5639999999998,"index":49,"paragraph_end":true,"start":425.8019999999998,"text":"File Characteristics"},{"end":444.8939999999998,"index":50,"paragraph_end":false,"start":428.5639999999998,"text":"AUGMENT employs explicitly structured files, with hierarchically organized nodes; each node can contain either or all of: up to 2,000 characters of text, a graphic structure, or other forms of useful data (e.g., digitized speech)."},{"end":467.8693333333331,"index":51,"paragraph_end":false,"start":444.8939999999998,"text":"The worker has a definite model in mind for the structuring of any file that he works with; in composing and modifying it he can organize and modify structure using the same verbs as for working with text strings (e.g. Insert, Replace, Move, Copy, Delete), with appropriate structural-entity nouns (e.g., Statement, Branch, Group, Plex)."},{"end":479.8686666666664,"index":52,"paragraph_end":true,"start":467.8693333333331,"text":"For any existing hierarchical structure, he has many flexible alternatives for addressing its entities, modifying its organization, jumping around within it, and viewing it in a most beneficial manner."},{"end":490.80133333333305,"index":53,"paragraph_end":false,"start":479.8686666666664,"text":"(Note: AUGMENT workers generally use the term \"statement\" to refer to a file node, which is natural enough since the terminology became established before we added the graphic capability."},{"end":497.3286666666664,"index":54,"paragraph_end":true,"start":490.80133333333305,"text":"Now an AUGMENT \"statement\" can contain either or both a text statement and a graphic diagram.)"},{"end":499.8986666666664,"index":55,"paragraph_end":true,"start":497.3286666666664,"text":"Controlling the Tools"},{"end":508.63399999999973,"index":56,"paragraph_end":false,"start":499.8986666666664,"text":"Many of AUGMENT's unique author-support provisions address basic operations common to almost every task, things done over and over again."},{"end":531.8546666666664,"index":57,"paragraph_end":true,"start":508.63399999999973,"text":"These operations, executed with speed and flexibility, provide for composing and modifying one's working material, and for studying what is there over a wide range of substantive levels -- from a single text passage to a collection of end-product draft documents and their associated set of working notes, reference material, and recorded-message dialog (assuming all to be on line)."},{"end":543.0006666666663,"index":58,"paragraph_end":false,"start":531.8546666666664,"text":"In the early stages of our program at SRI, we did a great deal of detailed work on what we called the \"control interface\" -- how users control the functional application of their tools."},{"end":550.6586666666664,"index":59,"paragraph_end":false,"start":543.0006666666663,"text":"These details can be very important to \"low-level\" interactions which are done hundreds of times during a working day."},{"end":556.8553333333331,"index":60,"paragraph_end":true,"start":550.6586666666664,"text":"Some of these details are quite relevant to bringing high performance to the authorship process."},{"end":565.9746666666664,"index":61,"paragraph_end":false,"start":556.8553333333331,"text":"AUGMENT commands are expressed with verbs, nouns, and appropriate qualifier words; every command word is designated by entering one or more characters."},{"end":574.9019999999997,"index":62,"paragraph_end":false,"start":565.9746666666664,"text":"The UIS recognizes the command word from these characters according to the command-recognition options designated in each individual's \"profile file.\""},{"end":584.0533333333331,"index":63,"paragraph_end":false,"start":574.9019999999997,"text":"Users seem to migrate fairly rapidly to \"expert\" recognition modes, where a minimum number of characters will elicit recognition of command words."},{"end":591.1673333333331,"index":64,"paragraph_end":false,"start":584.0533333333331,"text":"The fully spelled-out command words are presented in the Command Feedback Window as soon as they are recognized."},{"end":596.4146666666664,"index":65,"paragraph_end":true,"start":591.1673333333331,"text":"The Backspace Key will cause backup, one command word at a time."},{"end":619.6033333333331,"index":66,"paragraph_end":true,"start":596.4146666666664,"text":"Of the system requirements behind our choice of this noun-verb command form, two are particularly relevant here: (1) The \"vocabulary\" of the functions of the tools, and of the entities they operate upon, must be as extensible as is a natural language; (2) Textual lists of commands must conveniently lend themselves to writing, documenting, and executing as \"macro\" commands."},{"end":623.3679999999998,"index":67,"paragraph_end":false,"start":619.6033333333331,"text":"Screen selection is done with a mouse."},{"end":635.0153333333332,"index":68,"paragraph_end":true,"start":623.3679999999998,"text":"If the command's noun is a single, defined text or structure entity, e.g., a \"word\", then there is only one selection needed (e.g., to pick any character in the designated word)."},{"end":643.4946666666665,"index":69,"paragraph_end":false,"start":635.0153333333332,"text":"Besides using a standard keyboard for character entry, an AUGMENT user may optionally use a five-key, one-hand, chord keyset."},{"end":651.1419999999998,"index":70,"paragraph_end":false,"start":643.4946666666665,"text":"Remarkably little practice is required in order to enter alphabetic characters, one hand-stroke per character."},{"end":665.2426666666665,"index":71,"paragraph_end":true,"start":651.1419999999998,"text":"With less than five hours practice, a person can begin profitably working in a two-handed, concurrent mode -- operating the mouse with one hand and simultaneously entering command characters and short literal strings with the other hand."},{"end":672.8686666666665,"index":72,"paragraph_end":false,"start":665.2426666666665,"text":"Here is an example of a low-level action which reveals some basic characteristics of high-performance execution."},{"end":681.0599999999998,"index":73,"paragraph_end":false,"start":672.8686666666665,"text":"It is a very simple situation, but representative of what is met over and over and over again in doing hard knowledge work."},{"end":689.0486666666665,"index":74,"paragraph_end":false,"start":681.0599999999998,"text":"The worker is composing or modifying something in one area of the screen, when his eye catches a one-character typo in another area."},{"end":707.4586666666664,"index":75,"paragraph_end":true,"start":689.0486666666665,"text":"For a skilled AUGMENT worker, the typo could be corrected in less time than it would take someone to point it out to him -- with three quick strokes of the keyset hand during a casual flick of the mouse hand, and an absolute minimum of visual and mental attention taken from the other ongoing task."},{"end":715.4473333333331,"index":76,"paragraph_end":false,"start":707.4586666666664,"text":"Fast, flexible, graceful, low effort -- these are important to all high-frequency, low-level, knowledge-work actions."},{"end":724.0759999999997,"index":77,"paragraph_end":false,"start":715.4473333333331,"text":"This same kind of speed and flexibility are achieved by skilled AUGMENT workers in executing all of the other functional features described below."},{"end":730.3686666666664,"index":78,"paragraph_end":true,"start":724.0759999999997,"text":"Description of mouse and keyset, and their concurrent employment, may be found in <Ref-7>."},{"end":733.6319999999997,"index":79,"paragraph_end":true,"start":730.3686666666664,"text":"Addressing the Working Materials"},{"end":745.2153333333331,"index":80,"paragraph_end":false,"start":733.6319999999997,"text":"There is a consistent set of addressing features that a worker may use in any command to designate a particular structural node or some element of text or graphics attached to that node."},{"end":757.001333333333,"index":81,"paragraph_end":false,"start":745.2153333333331,"text":"It adds appreciably to the power and flexibility of the system commands to have a rich, universally applicable vocabulary for directly addressing particular entities within the working files."},{"end":759.9979999999997,"index":82,"paragraph_end":true,"start":757.001333333333,"text":"Below are some examples."},{"end":763.2186666666664,"index":83,"paragraph_end":true,"start":759.9979999999997,"text":"Explicit Statement Addresses"},{"end":769.0313333333331,"index":84,"paragraph_end":true,"start":763.2186666666664,"text":"There are four \"handles\" by which a given statement may be directly addressed:"},{"end":772.0813333333331,"index":85,"paragraph_end":false,"start":769.0313333333331,"text":"Structural Statement Number."},{"end":777.371333333333,"index":86,"paragraph_end":false,"start":772.0813333333331,"text":"This designates the current \"structural location\" of the statement."},{"end":788.1866666666664,"index":87,"paragraph_end":false,"start":777.371333333333,"text":"It is assigned by the system, depending upon where the worker installs or moves a statement within an existing structure, or how that structure might have been re-organized subsequently."},{"end":797.0179999999997,"index":88,"paragraph_end":false,"start":788.1866666666664,"text":"It is usually expressed as an alternating sequence of number-letter fields -- e.g. \"1\", \"1a\", \"1a1\", \"1a2\", and \"1b\"."},{"end":806.105333333333,"index":89,"paragraph_end":true,"start":797.0179999999997,"text":"At a worker's option, these same statement numbers could be shown as \"1\", \"1.1\", \"1.1.1\", \"1.1.2\", or \"1.2\", but this bulkier alternative is seldom chosen."},{"end":809.507333333333,"index":90,"paragraph_end":false,"start":806.105333333333,"text":"Statement Identifier (or SID)."},{"end":823.4159999999997,"index":91,"paragraph_end":false,"start":809.507333333333,"text":"This is a unique integer, assigned in sequential order by the system as each statement is first inserted, and which stays with a statement no matter how much its content may be altered or where it may be moved in its file structure."},{"end":841.3993333333331,"index":92,"paragraph_end":true,"start":823.4159999999997,"text":"To make it uniquely recognizable for what it is, a SID is always displayed, printed, or designated with a prefixed \"0\" -- e.g., \"012\", \"0417\", etc. SIDs are particularly useful for referencing passages in a document while it is evolving."},{"end":845.4519999999998,"index":93,"paragraph_end":false,"start":841.3993333333331,"text":"Worker-Assigned Statement Name (or label)."},{"end":858.2193333333331,"index":94,"paragraph_end":false,"start":845.4519999999998,"text":"For any statement or part of the file structure, an author can designate as \"name delimiters\" a pair of characters that indicate to the system when the first word of a statement is to be treated as a name for that statement."},{"end":870.1546666666665,"index":95,"paragraph_end":true,"start":858.2193333333331,"text":"For instance, if \"(\" and \")\" are set by the author as name delimiters for a specified part of the file, any parenthesized first word in a statement would be recognized by the system as that statement's name."},{"end":877.8659999999998,"index":96,"paragraph_end":true,"start":870.1546666666665,"text":"(Note: It is optional whether to have any of the above three identifiers displayed or printed with the statements' text.)"},{"end":880.9799999999998,"index":97,"paragraph_end":false,"start":877.8659999999998,"text":"A Direct Screen Selection."},{"end":895.2619999999998,"index":98,"paragraph_end":false,"start":880.9799999999998,"text":"When a statement to be designated is displayed in a window, usually the best way to \"address\" it is to use the mouse to position the cursor anywhere on the statement and depress the mouse's \"Select\" key (indicated below by \"<Select>\")."},{"end":907.1759999999998,"index":99,"paragraph_end":true,"start":895.2619999999998,"text":"This mode is generally used for text manipulation -- selecting characters, words, numbers, visibles, invisibles, etc. (any of the text entities which have been made system recognizable)."},{"end":909.2873333333331,"index":100,"paragraph_end":true,"start":907.1759999999998,"text":"Markers"},{"end":918.4173333333331,"index":101,"paragraph_end":false,"start":909.2873333333331,"text":"As one \"holds a place\" in a book by leaving a temporary place marker in it, an author can place \"markers\" at arbitrary locations within an AUGMENT file."},{"end":925.4993333333331,"index":102,"paragraph_end":false,"start":918.4173333333331,"text":"When placing a marker, he attaches it to a specific character in the text and gives it a name or label."},{"end":929.1679999999998,"index":103,"paragraph_end":false,"start":925.4993333333331,"text":"Marker names are local to each file."},{"end":938.1379999999998,"index":104,"paragraph_end":true,"start":929.1679999999998,"text":"Simple commands provide for displaying where one's markers are located and what their names are, for deleting or moving a marker, or for installing a new one."},{"end":945.5826666666665,"index":105,"paragraph_end":false,"start":938.1379999999998,"text":"A marker name may be included in an address expression, to provide another way of designating an address."},{"end":952.8886666666665,"index":106,"paragraph_end":false,"start":945.5826666666665,"text":"A marker name can designate not only a particular statement, but a specific character within that statement."},{"end":963.5866666666665,"index":107,"paragraph_end":false,"start":952.8886666666665,"text":"For example, \"Copy Word #x (to follow word) <Select>\" would designate that a word located somewhere in the file and marked with an \"x\" is to be copied to follow the cursor-selected word."},{"end":971.8526666666664,"index":108,"paragraph_end":true,"start":963.5866666666665,"text":"There are many unique ways in which markers may be employed by an author who has integrated their artful use into her working methodology."},{"end":993.9426666666665,"index":109,"paragraph_end":false,"start":971.8526666666664,"text":"As a comparative example of some of the foregoing addressing forms, consider a statement whose SID is \"069\", whose statement number is \"3b5\", that has statement-name delimiters designated for it as \"NULL\" and \":\", that starts with the text \"Capacity: For every ...\", and that has a marker named \"x\" positioned on one of its characters."},{"end":999.2113333333332,"index":110,"paragraph_end":true,"start":993.9426666666665,"text":"A command to move this statement could optionally be expressed as:"},{"end":1002.4213333333332,"index":111,"paragraph_end":true,"start":999.2113333333332,"text":"\"Move Statement <Select> ...\","},{"end":1005.4393333333333,"index":112,"paragraph_end":true,"start":1002.4213333333332,"text":"\"Move Statement 3b5 ...\","},{"end":1008.3506666666666,"index":113,"paragraph_end":true,"start":1005.4393333333333,"text":"\"Move Statement 069 ...\","},{"end":1012.0406666666667,"index":114,"paragraph_end":true,"start":1008.3506666666666,"text":"\"Move Statement Capacity ...\", or"},{"end":1014.8773333333334,"index":115,"paragraph_end":true,"start":1012.0406666666667,"text":"\"Move Statement #x ...\"."},{"end":1018.1406666666667,"index":116,"paragraph_end":true,"start":1014.8773333333334,"text":"Relative-Address Extensions"},{"end":1026.78,"index":117,"paragraph_end":false,"start":1018.1406666666667,"text":"A sequence of characters may be appended to the address of a given statement to specify an address of a position \"relative\" to that statement."},{"end":1046.79,"index":118,"paragraph_end":false,"start":1026.78,"text":"A major class of these designations deals with relative structural location, such as: Up a level, Down a level, Successor at same level, Predecessor at same level, Head at this level, Tail at this level, and End statement at last and lowest position in this branch."},{"end":1058.5013333333334,"index":119,"paragraph_end":true,"start":1046.79,"text":"A period (\".\") in the address string indicates that relative addressing is beginning, and each of these relative-location designators is indicated with a directly mnemonic, one-letter designation."},{"end":1078.778,"index":120,"paragraph_end":true,"start":1058.5013333333334,"text":"For example, \"Move Statement 0609 (to follow statement) 4b.dt\" would move Statement 0609 to follow the tail statement of the substructure one level down from Statement 4b -- or, to conceptualize the associated address-location pathway, \"go to 4b, then Down a level and to the Tail\"."},{"end":1081.7213333333334,"index":121,"paragraph_end":true,"start":1078.778,"text":"Embedded Citation Links"},{"end":1090.1366666666668,"index":122,"paragraph_end":false,"start":1081.7213333333334,"text":"A special use of address expressions is within an explicit text entity that we call a \"Citation Link\" (or \"Link\" for short)."},{"end":1096.76,"index":123,"paragraph_end":false,"start":1090.1366666666668,"text":"Links are used as textual citations to some specific file item within the workshop domain."},{"end":1105.1006666666667,"index":124,"paragraph_end":false,"start":1096.76,"text":"A link is delimited by parentheses or angle brackets and contains a valid address string whose path leads to the cited file entity."},{"end":1110.476,"index":125,"paragraph_end":false,"start":1105.1006666666667,"text":"For example, \"(0306)\" or \"(4b.dt)\" are valid links."},{"end":1127.9153333333334,"index":126,"paragraph_end":true,"start":1110.476,"text":"Also, the reference items at the end of this paper are statements named \"Ref-1\", \"Ref-2\", etc., and as such can be cited with links \"<Ref-1>\", \"<Ref-2>\", etc. An AUGMENT reader may travel via such a link directly to the referenced bibliographic citation."},{"end":1134.4,"index":127,"paragraph_end":false,"start":1127.9153333333334,"text":"A special feature in AUGMENT's link provisions is the use of \"indirect link referencing\"."},{"end":1143.21,"index":128,"paragraph_end":false,"start":1134.4,"text":"In path-following terms, including \".l\" in an address string stipulates, \"scan forward from this point to the next link, and follow that link to its target.\""},{"end":1152.1693333333333,"index":129,"paragraph_end":false,"start":1143.21,"text":"For example, to follow the path prescribed by link \"(4b.l)\", one would \"go to 4b, then find the first link in that statement and follow the path that it specifies.\""},{"end":1167.3686666666665,"index":130,"paragraph_end":true,"start":1152.1693333333333,"text":"This latter path in turn could prescribe use of another link, etc. There is no intrinsic limit to the number of these indirect links that may be employed in a given path -- only a natural caution against such a path looping back upon itself."},{"end":1175.5066666666664,"index":131,"paragraph_end":false,"start":1167.3686666666665,"text":"As an example, note that \"<Ref-1>\" is a link to the statement named \"Ref-1\", a bibliographic citation at the end of this paper."},{"end":1186.7699999999998,"index":132,"paragraph_end":false,"start":1175.5066666666664,"text":"In that citation, there is a link to the original source document of the referenced publication, permanently stored in the AUGMENT Journal as Item 71279 (the Journal is described below)."},{"end":1195.633333333333,"index":133,"paragraph_end":true,"start":1186.7699999999998,"text":"The point to be made here is that with the link \"<Ref-1.l>\", I can reference the original source document -- and a Jump Link command would \"take me there.\""},{"end":1198.747333333333,"index":134,"paragraph_end":true,"start":1195.633333333333,"text":"Text and Content Addressing"},{"end":1208.2079999999996,"index":135,"paragraph_end":false,"start":1198.747333333333,"text":"Other addressing options include scanning for a content match, and/or stepping backward and forward a given number of characters or words (or other text entities)."},{"end":1222.415333333333,"index":136,"paragraph_end":true,"start":1208.2079999999996,"text":"For instance, the foregoing link could have involved a bit more smarts in designating which link to follow: e.g., the path for '(4b \"*D\" .l)' would be \"to 4b, scan for first occurrence of \"*D\", then follow the next link found in that statement.\""},{"end":1225.113333333333,"index":137,"paragraph_end":true,"start":1222.415333333333,"text":"Other-File Addressing"},{"end":1236.483333333333,"index":138,"paragraph_end":false,"start":1225.113333333333,"text":"By preceding an in-file address string with a file address, and separating the two strings with a comma, one obtains a composite address designating a given entity within a given file."},{"end":1246.1039999999996,"index":139,"paragraph_end":true,"start":1236.483333333333,"text":"Extending this principle lets one prefix the file name with a directory name in which the file is to be found; and further, one can prefix this with a host-computer name."},{"end":1268.535333333333,"index":140,"paragraph_end":true,"start":1246.1039999999996,"text":"For example, '(Office-5, Program-Documentation, Sequence-Doc, Specifications \"Journal\")' specifies the path: to the Office-5 host computer, to its Program-Documentation file directory, to its Sequence-Doc file, to its statement named \"Specifications\", and then scan to the location of the text \"Journal\"."},{"end":1277.5693333333331,"index":141,"paragraph_end":false,"start":1268.535333333333,"text":"If a person were working on the Office-5 host, he would only have to specify '(Program-Documentation, Sequence-Doc, Specifications \"Journal\")'."},{"end":1288.5553333333332,"index":142,"paragraph_end":false,"start":1277.5693333333331,"text":"If he were already working within a file with its \"link default\" set to the Program-Documentation directory, he would only have to specify '(Sequence-Doc, Specifications \"Journal\")'."},{"end":1296.224,"index":143,"paragraph_end":false,"start":1288.5553333333332,"text":"And if he were already working within the Sequence-Doc file, he would only have to specify '(Specifications \"Journal\")'."},{"end":1308.1913333333332,"index":144,"paragraph_end":true,"start":1296.224,"text":"And if he were planning to reference items relative to the Statement named \"Specifications\" very often, he could affix a marker (e.g., named \"s\") to its front and would then only have to specify '(#s \"Journal\")'."},{"end":1330.7293333333332,"index":145,"paragraph_end":false,"start":1308.1913333333332,"text":"Or, suppose he were working in another file in a different directory on Office-5 and wanted to reference items relative to that same \"far off\" statement with special ease: in some temporary place in that file he could install a statement named \"Ref\" (for example) containing the textual link, \"(Program-Documentation, Sequence-Doc, Specifications)\"."},{"end":1336.0086666666666,"index":146,"paragraph_end":false,"start":1330.7293333333332,"text":"He could then cite the above reference with the link, '(Ref.l \"Journal\")'."},{"end":1355.9333333333334,"index":147,"paragraph_end":true,"start":1336.0086666666666,"text":"This path description is: go to the statement in this file named \"Ref\", take the first link that you find there (traveling across intervening directories and files and statements), and beginning in the statement on the other end of that link, scan forward to the string \"Journal\"."},{"end":1364.018,"index":148,"paragraph_end":false,"start":1355.9333333333334,"text":"This is only a cursory treatment, but should illustrate well enough what is meant by \"a rich and flexible addressing vocabulary.\""},{"end":1378.1506666666667,"index":149,"paragraph_end":false,"start":1364.018,"text":"As with other high-performance features in AUGMENT, a beginner is not forced to become involved in the larger vocabulary in order to do useful work (with productivity on at least a par with some other, restricted-vocabulary system)."},{"end":1387.8566666666666,"index":150,"paragraph_end":true,"start":1378.1506666666667,"text":"But an AUGMENT worker interested in higher performance can steadily pick up more of the optional vocabulary and skills in a smooth, upward-compatible progression."},{"end":1390.4266666666665,"index":151,"paragraph_end":true,"start":1387.8566666666666,"text":"Controlling the Views"},{"end":1399.215333333333,"index":152,"paragraph_end":false,"start":1390.4266666666665,"text":"A user of a book, or of most on-line text systems, is constrained to viewing the text as though he had a window through which he sees a fixed, formatted document."},{"end":1406.8839999999998,"index":153,"paragraph_end":true,"start":1399.215333333333,"text":"But as described below, our worker can view a section of text in many ways, depending upon his need of the moment."},{"end":1409.4326666666664,"index":154,"paragraph_end":true,"start":1406.8839999999998,"text":"Multiple Windows"},{"end":1423.5866666666664,"index":155,"paragraph_end":false,"start":1409.4326666666664,"text":"For whatever total screen area is available to the worker, his general performance will be improved significantly if he can flexibly allocate that area into arbitrary-sized windows whose contents can be independently controlled."},{"end":1437.1539999999998,"index":156,"paragraph_end":true,"start":1423.5866666666664,"text":"AUGMENT has long provided this basic capability, along with the provision that material from any accessible file may be shown in any window, and also that screen-select copying or moving can be done across the different windows."},{"end":1444.1079999999997,"index":157,"paragraph_end":false,"start":1437.1539999999998,"text":"(Note: Cross-file editing can be done at any time, between any two legally accessible files."},{"end":1456.1819999999998,"index":158,"paragraph_end":true,"start":1444.1079999999997,"text":"If one or the other file's material or destination is not being displayed in any of the windows, one may always opt to employ a textual address expression instead of a <Select> within any editing command.)"},{"end":1462.1439999999998,"index":159,"paragraph_end":false,"start":1456.1819999999998,"text":"User-adjustable parameters are used to control the view presented on the display."},{"end":1469.3006666666665,"index":160,"paragraph_end":false,"start":1462.1439999999998,"text":"Adjusting one's view parameters is a constantly used AUGMENT feature that has solidly proved its value."},{"end":1478.3666666666666,"index":161,"paragraph_end":false,"start":1469.3006666666665,"text":"To facilitate their quick and flexible use, the view-specification actions evolved into cryptic, single-character codes, called \"viewspecs.\""},{"end":1492.734,"index":162,"paragraph_end":false,"start":1478.3666666666666,"text":"The syntax of all Jump commands (used for traveling) includes the option of designating new viewspecs, and a special combination of mouse buttons enables quick, concurrent, keyset action to change the viewspecs for a given window."},{"end":1497.3626666666667,"index":163,"paragraph_end":true,"start":1492.734,"text":"Here are a few of the frequently used view controls:"},{"end":1499.7726666666667,"index":164,"paragraph_end":true,"start":1497.3626666666667,"text":"Window Views"},{"end":1502.2573333333335,"index":165,"paragraph_end":false,"start":1499.7726666666667,"text":"Structure Cutoff."},{"end":1515.9526666666668,"index":166,"paragraph_end":true,"start":1502.2573333333335,"text":"Show only the statements that lie \"below\" this statement in the structure (i.e., this \"branch\"); or show only those following statements that are at this level or deeper; or show all of the following statements that will fit in this window."},{"end":1518.3413333333335,"index":167,"paragraph_end":false,"start":1515.9526666666668,"text":"Level Clipping."},{"end":1524.7086666666669,"index":168,"paragraph_end":false,"start":1518.3413333333335,"text":"For the designated structure cutoff, show only the statements down to a specified level."},{"end":1533.0280000000002,"index":169,"paragraph_end":true,"start":1524.7086666666669,"text":"Lower-level statements are \"clipped\" from the view; the worker can thus view just a selected number of the upper levels of his document/file."},{"end":1535.736666666667,"index":170,"paragraph_end":false,"start":1533.0280000000002,"text":"Statement Truncation."},{"end":1543.3840000000002,"index":171,"paragraph_end":false,"start":1535.736666666667,"text":"For those statements brought into view (as selected by other view specifications), show only their first n lines."},{"end":1550.7113333333336,"index":172,"paragraph_end":true,"start":1543.3840000000002,"text":"Truncation to one line is often used, along with level clipping, in order to get an effective overview."},{"end":1553.7613333333336,"index":173,"paragraph_end":false,"start":1550.7113333333336,"text":"Inter-Statement Separation."},{"end":1559.904666666667,"index":174,"paragraph_end":true,"start":1553.7613333333336,"text":"For viewing ease -- blank lines can be optionally installed between statements."},{"end":1567.914666666667,"index":175,"paragraph_end":true,"start":1559.904666666667,"text":"(Note: The foregoing view controls are extremely helpful when studying and modifying a document's structural organization.)"},{"end":1571.1033333333337,"index":176,"paragraph_end":false,"start":1567.914666666667,"text":"Statement Numbers and Names."},{"end":1580.0093333333336,"index":177,"paragraph_end":false,"start":1571.1033333333337,"text":"Optionally, for a given window, show the Statement Number (or the SID) of each statement -- with an option for showing them at either the right or at the left margin."},{"end":1585.384666666667,"index":178,"paragraph_end":true,"start":1580.0093333333336,"text":"Independently, the showing of statement names may be turned on or off."},{"end":1587.9866666666671,"index":179,"paragraph_end":false,"start":1585.384666666667,"text":"Frozen Statements."},{"end":1594.5033333333338,"index":180,"paragraph_end":false,"start":1587.9866666666671,"text":"A worker may select a number of statements, in random order, and designate them as \"frozen.\""},{"end":1603.4840000000004,"index":181,"paragraph_end":false,"start":1594.5033333333338,"text":"One of the view-specification options is to have the frozen statements appear at the top of the frame, with the rest of that window left for normal viewing and editing."},{"end":1611.2166666666672,"index":182,"paragraph_end":true,"start":1603.4840000000004,"text":"The frozen statements may be edited, or even cross-edited between any other displayed (or addressable) statements."},{"end":1614.6293333333338,"index":183,"paragraph_end":false,"start":1611.2166666666672,"text":"User-Specified Content Filters."},{"end":1623.076666666667,"index":184,"paragraph_end":false,"start":1614.6293333333338,"text":"A simple content-analysis language may be used in a \"Set Content Pattern\" command, which compiles a little content-checking program."},{"end":1639.2040000000004,"index":185,"paragraph_end":false,"start":1623.076666666667,"text":"One of the view-specification options will cause the system to display only those statements which satisfy both the structure and level conditions imposed by other viewspecs, and which also pass the content-analysis test applied by this program."},{"end":1648.5260000000003,"index":186,"paragraph_end":true,"start":1639.2040000000004,"text":"Where desired, very sophisticated content-analysis programs may be written, using a full-blown programming language, and placed on call for any user."},{"end":1652.290666666667,"index":187,"paragraph_end":true,"start":1648.5260000000003,"text":"User-Specified Sequence Generators"},{"end":1673.644666666667,"index":188,"paragraph_end":false,"start":1652.290666666667,"text":"In the foregoing, a \"view\" is created by beginning at a designated location in a document (file) and selecting certain of the the \"following\" statements for display, according to the viewing parameters -- possibly suppressing statements that don't pass the test of a content-analysis program."},{"end":1691.734666666667,"index":189,"paragraph_end":true,"start":1673.644666666667,"text":"This is essentially a \"parameterized sequence generator,\" and provides very useful options for selectively viewing statements within a document; however, it works only by selectively discarding statements from a sequence provided in standard order."},{"end":1700.3100000000004,"index":190,"paragraph_end":false,"start":1691.734666666667,"text":"Application programmers can provide alternate sequence-generator programs, which any user can invoke in a straightforward manner."},{"end":1721.0880000000004,"index":191,"paragraph_end":true,"start":1700.3100000000004,"text":"In such a case, the apparent structure being presented to the user could be generated from a sequence of candidate statements according to any rules one may invent -- and the actual views could be further controlled by the above-described viewspecs for level clipping, truncation, content filtering, etc."},{"end":1741.1513333333337,"index":192,"paragraph_end":false,"start":1721.0880000000004,"text":"Perhaps the most commonly used, special sequence generator is one that provides an \"Include\" feature, where specially tagged links embedded in the text will cause their cited passages to be \"included\" in place of the Include-Link statements, as though they were part of this file."},{"end":1751.7640000000004,"index":193,"paragraph_end":false,"start":1741.1513333333337,"text":"This provision enables arbitrary assemblage of text and formatting directives, from a wide collection of files, to represent a virtual, one-document, super file."},{"end":1760.9260000000004,"index":194,"paragraph_end":true,"start":1751.7640000000004,"text":"For instance, the whole assemblage could be passed to the formatter, by means of a single user action, to generate a composite, photo-typeset document."},{"end":1764.2213333333336,"index":195,"paragraph_end":true,"start":1760.9260000000004,"text":"Traveling Through the Working Files"},{"end":1785.532666666667,"index":196,"paragraph_end":true,"start":1764.2213333333336,"text":"An important provision in AUGMENT enables an author to freely \"travel around\" in his on-line file space to reach a particular \"view point\" of his choice -- i.e., the position within a file from which the system develops the desired form of \"view\" according to the currently invoked view specifications."},{"end":1795.302666666667,"index":197,"paragraph_end":false,"start":1785.532666666667,"text":"Traveling from one view point to another is accomplished by Jump commands, of which the simplest perhaps is a direct Jump to a statement designated by a screen selection."},{"end":1811.2593333333336,"index":198,"paragraph_end":false,"start":1795.302666666667,"text":"Then, for a worker grown used to employing address strings, a next form would be a Jump on an embedded link, or to a statement designated by a typed-in address string -- using any combination of the addressing elements and viewspecs described above."},{"end":1819.994666666667,"index":199,"paragraph_end":false,"start":1811.2593333333336,"text":"For example, the link \"<4b:mi>\" points to the Statement 4b, while invoking viewspecs \"m\" and \"I\" which cause the statements' SIDs to be displayed."},{"end":1835.1193333333335,"index":200,"paragraph_end":false,"start":1819.994666666667,"text":"The link \"<Ref-1.l:i;LL>\" points to the document referenced by the link in the statement named \"Ref-1\", invoking viewspec \"i\" for user content filtering, and sets the filter to \"LL\" to show only those statements beginning with a lower-case letter."},{"end":1839.2786666666668,"index":201,"paragraph_end":true,"start":1835.1193333333335,"text":"The applications are effectively endless."},{"end":1842.5526666666667,"index":202,"paragraph_end":true,"start":1839.2786666666668,"text":"Modifying the Document Structures"},{"end":1851.448,"index":203,"paragraph_end":false,"start":1842.5526666666667,"text":"Given the array of capabilities described above, it is very simple also to provide for very flexible manipulation of the file structure."},{"end":1867.1806666666669,"index":204,"paragraph_end":false,"start":1851.448,"text":"For operating on a small, basic set of structure-entity nouns, essentially the same basic verbs may be used as for text manipulation -- i.e. Insert, Delete, Move, Copy, Replace, and Transpose are quite sufficient for most cases."},{"end":1882.4653333333335,"index":205,"paragraph_end":true,"start":1867.1806666666669,"text":"For instance, \"Move Branch 2b (to follow) 3c\" immediately moves Statement 2b and all of its substatements to follow Statement 3c -- and their statement numbers are automatically changed from 2b, 2b1, etc., to 3d, 3d1, etc."},{"end":1887.6593333333335,"index":206,"paragraph_end":false,"start":1882.4653333333335,"text":"A few extra verbs are useful for structure manipulation."},{"end":1896.6826666666668,"index":207,"paragraph_end":false,"start":1887.6593333333335,"text":"For instance, a \"Break\" command will break a given statement off at a designated point in its text string, and establish the rest of the text as a new, separate statement."},{"end":1905.3433333333335,"index":208,"paragraph_end":true,"start":1896.6826666666668,"text":"And an \"Append\" command does the reverse -- i.e., it appends the text of one or more existing statements to the end of a designated statement."},{"end":1914.0573333333334,"index":209,"paragraph_end":false,"start":1905.3433333333335,"text":"Concurrent use of mouse and keyset also provide considerable gains in speed and flexibility for studying and modifying document structure."},{"end":1929.9286666666667,"index":210,"paragraph_end":true,"start":1914.0573333333334,"text":"For example, if when studying the overview described in the previous paragraph, the author perceives that Statement 2b really belongs in Section 3, following Statement 3c, he can execute the necessary move command in a very quick, deft manner:"},{"end":1938.344,"index":211,"paragraph_end":false,"start":1929.9286666666667,"text":"Keyset hand strikes \"m\" and \"b\" (for Move Branch), while the mouse hand is positioning the cursor anywhere in the text line of Statement 2b."},{"end":1941.0953333333334,"index":212,"paragraph_end":true,"start":1938.344,"text":"[Two chord strokes.]"},{"end":1952.1560000000002,"index":213,"paragraph_end":false,"start":1941.0953333333334,"text":"The mouse hand depresses the <Select> button on the mouse while the cursor is on Statement 2b, then moves to Statement 3c and depresses it again, and then depresses it again to say, \"OK, do it.\""},{"end":1960.4220000000003,"index":214,"paragraph_end":true,"start":1952.1560000000002,"text":"[Three button pushes, synchronized with the mouse movement as it made two selections on easy, window-wide, whole-line targets.]"},{"end":1966.938666666667,"index":215,"paragraph_end":true,"start":1960.4220000000003,"text":"(Note: I just had myself timed for this above operation -- an unhurried 2.5 seconds.)"},{"end":1984.900666666667,"index":216,"paragraph_end":false,"start":1966.938666666667,"text":"In our view, interactive computer support offers an author a priceless opportunity to get away from the geometric bondage inflicted by pages, margins, and lines -- things which have very little if any bearing upon the content and organization of one's text."},{"end":1995.726666666667,"index":217,"paragraph_end":false,"start":1984.900666666667,"text":"In terms of value to the authoring process, we differ sharply from those who advocate a \"What you see is what you get\" working mode during the development of a document's content and organization."},{"end":2008.0673333333336,"index":218,"paragraph_end":true,"start":1995.726666666667,"text":"For this kind of work, experienced users of the foregoing kind of flexible facility for addressing, viewing, and manipulating structured documents, would consider a \"What you see ...\" mode as a relative handicap."},{"end":2011.7680000000003,"index":219,"paragraph_end":true,"start":2008.0673333333336,"text":"Supporting Multi-Party Collaboration"},{"end":2020.7380000000003,"index":220,"paragraph_end":false,"start":2011.7680000000003,"text":"The support that advanced technology can provide for close collaboration among knowledge workers is a very important and much under-rated possibility."},{"end":2027.9160000000004,"index":221,"paragraph_end":false,"start":2020.7380000000003,"text":"For multiple-author activities, collaborative support is an important aspect of system capability."},{"end":2033.280666666667,"index":222,"paragraph_end":false,"start":2027.9160000000004,"text":"Some years ago, we introduced the following provisions into AUGMENT."},{"end":2038.4640000000004,"index":223,"paragraph_end":true,"start":2033.280666666667,"text":"(A more complete, overview treatment of these is given in <Ref-8>.)"},{"end":2041.0340000000003,"index":224,"paragraph_end":false,"start":2038.4640000000004,"text":"Electronic Mail."},{"end":2053.204,"index":225,"paragraph_end":false,"start":2041.0340000000003,"text":"Its primary attributes of speed, automatic distribution, and computer-to-computer directness are well recognized -- and are generally accepted now as important to the effectiveness of knowledge workers."},{"end":2061.8113333333336,"index":226,"paragraph_end":true,"start":2053.204,"text":"AUGMENT Mail has features that are beyond what most electronic mail systems offer, and which provide unique benefit to the authorship process."},{"end":2068.7333333333336,"index":227,"paragraph_end":false,"start":2061.8113333333336,"text":"AUGMENT's mail system allows one to \"send\" complete, structured documents as well as small messages."},{"end":2080.839333333334,"index":228,"paragraph_end":false,"start":2068.7333333333336,"text":"In an authorship environment, an important role for \"electronic mail\" is for the control and distribution of documents -- where small, throw-away messages are considered to be but a special class of document."},{"end":2091.3453333333337,"index":229,"paragraph_end":false,"start":2080.839333333334,"text":"An author should be able to bundle up any combination of text and graphics, in the forms that he has been using for studying and manipulating them -- and send the bundle to other workers."},{"end":2101.6593333333335,"index":230,"paragraph_end":true,"start":2091.3453333333337,"text":"In AUGMENT, such a bundle is just like any other file structure, and can be studied and manipulated, incorporated into other files (documents), saved or deleted."},{"end":2105.5733333333337,"index":231,"paragraph_end":false,"start":2101.6593333333335,"text":"Recorded Mail -- AUGMENT's Journal System."},{"end":2112.954,"index":232,"paragraph_end":false,"start":2105.5733333333337,"text":"When mailing a document, an AUGMENT worker may optionally specify that it be installed as a \"recorded\" item."},{"end":2121.454666666667,"index":233,"paragraph_end":false,"start":2112.954,"text":"In this case, before distributing the item, the system will make a permanent record if it, as a file in a specified Journal collection."},{"end":2127.736666666667,"index":234,"paragraph_end":false,"start":2121.454666666667,"text":"And, just as though it had been published, this recorded Journal item cannot later be changed."},{"end":2149.005333333334,"index":235,"paragraph_end":true,"start":2127.736666666667,"text":"The system assigns a straightforward accession identifier (a simple number), and any authorized worker is henceforth guaranteed access to that Journal item by specifying the name of the Journal-collection and the Journal-item number -- e.g., as specified in the link \"<OAD,2237,>\"."},{"end":2155.6820000000007,"index":236,"paragraph_end":false,"start":2149.005333333334,"text":"A given journal may be set up to serve multiple hosts and is much like a special library."},{"end":2164.524000000001,"index":237,"paragraph_end":true,"start":2155.6820000000007,"text":"It has its collection of documents, and AUGMENT provides associated support processes for entry, cataloging, retrieval, and access."},{"end":2173.003333333334,"index":238,"paragraph_end":false,"start":2164.524000000001,"text":"Together with the linking capability described above, a Journal system provides an extremely effective form of \"recorded dialog.\""},{"end":2196.245333333334,"index":239,"paragraph_end":true,"start":2173.003333333334,"text":"Cross-reference links between a succession of Journal items produces an inter-linked network of collaborative contributions -- plans, outlines, document drafts, schedules, short comments, detailed critiques, reference material, etc. The on-line worker can follow these links very easily and, using multiple windows and flexible viewing options, can make very effective use of such records."},{"end":2204.8206666666674,"index":240,"paragraph_end":false,"start":2196.245333333334,"text":"For instance, consider a detailed commentary directed toward a \"preliminary design\" document recorded in a given Journal collection."},{"end":2212.6600000000008,"index":241,"paragraph_end":false,"start":2204.8206666666674,"text":"The author writing the commentary could view the design document in one window and his developing commentary document in another."},{"end":2222.1100000000006,"index":242,"paragraph_end":false,"start":2212.6600000000008,"text":"He can easily establish links in his commentary to cite any passage in the design document -- e.g., a statement, a term in the statement, or a diagram."},{"end":2229.874666666667,"index":243,"paragraph_end":false,"start":2222.1100000000006,"text":"Then this author would submit his commentary into the Journal, perhaps specifying a list of colleagues for \"distribution.\""},{"end":2241.9593333333337,"index":244,"paragraph_end":false,"start":2229.874666666667,"text":"Each listed user would automatically receive a mail item announcing this new Journal entry, giving subject, author, date, etc., and the all-important link to the new Journal file containing the commentary."},{"end":2250.897333333334,"index":245,"paragraph_end":true,"start":2241.9593333333337,"text":"Any such recipient can subsequently study both the commentary and its cited planning document in a similar, multi-window, link-assisted manner."},{"end":2264.2833333333338,"index":246,"paragraph_end":false,"start":2250.897333333334,"text":"Furthermore, this second reader could develop and submit his own recorded commentary, which because of the citation power of AUGMENT links could be as short and to the point as: \"Frankly, John, I think your comment in (DDD,xxx,aa) is a mistake!"},{"end":2269.5840000000003,"index":247,"paragraph_end":false,"start":2264.2833333333338,"text":"Didn't you notice the earlier assumption in (DDD,xxx,bb)?"},{"end":2276.2713333333336,"index":248,"paragraph_end":false,"start":2269.5840000000003,"text":"Maybe you should go back to Tom's earlier requirements document -- especially at (EEE,yy,cc).\""},{"end":2288.7613333333334,"index":249,"paragraph_end":true,"start":2276.2713333333336,"text":"(Here, \"DDD\" and \"EEE\" represent Journal names, \"xxx\", \"yyy\", and \"zzz\" represent Journal item numbers, and \"aa\", \"bb\", and \"cc\" represent addresses pointing to specific passages in those Journal files.)"},{"end":2300.6433333333334,"index":250,"paragraph_end":false,"start":2288.7613333333334,"text":"In official parlance, \"retrieval\" is the finding out about the existence of a relevant piece of information, whereas \"access\" is the subseq
