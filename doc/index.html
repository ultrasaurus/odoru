uent process of gaining possession of the information."},{"end":2308.578666666667,"index":251,"paragraph_end":false,"start":2300.6433333333334,"text":"For users of AUGMENT's Journal system, retrieval is immensely facilitated by the widespread use of citation links."},{"end":2316.6633333333334,"index":252,"paragraph_end":false,"start":2308.578666666667,"text":"When one can follow them as easily as can a practiced AUGMENT worker, these links provide extremely effective retrieval support."},{"end":2324.332,"index":253,"paragraph_end":false,"start":2316.6633333333334,"text":"We have supplemented this with some simple, automatically generated catalog files, which made a rather nice balance."},{"end":2347.5313333333334,"index":254,"paragraph_end":true,"start":2324.332,"text":"Access is provided by direct Jump on a reference link if the file is on line; if it isn't, AUGMENT asks the worker if she wants it retrieved, and a simple affirmative response automatically launches a request for the system operator to retrieve the file from its archive tape, after which the worker is notified of its availability via electronic mail."},{"end":2352.1493333333333,"index":255,"paragraph_end":false,"start":2347.5313333333334,"text":"A private document can be submitted into a Journal."},{"end":2358.922,"index":256,"paragraph_end":false,"start":2352.1493333333333,"text":"In this case, only those workers listed at Journal-entry time can get access to the central copy."},{"end":2364.713333333333,"index":257,"paragraph_end":true,"start":2358.922,"text":"Such a private item would not be listed or indexed in the \"public\" catalogs."},{"end":2373.683333333333,"index":258,"paragraph_end":false,"start":2364.713333333333,"text":"We have used the Journal system very heavily since 1970 to support AUGMENT's development activity; many customers have employed it heavily since 1975."},{"end":2381.970666666666,"index":259,"paragraph_end":false,"start":2373.683333333333,"text":"There are about 100,000 entries recorded in the original Journal now (I don't know about other, newer AUGMENT Journal collections)."},{"end":2389.7459999999996,"index":260,"paragraph_end":false,"start":2381.970666666666,"text":"We found that as workers became at home in this environment, they were increasingly free about submitting their items to the \"public.\""},{"end":2401.009333333333,"index":261,"paragraph_end":false,"start":2389.7459999999996,"text":"It became evident that the scientific tradition of active and open interchange has some solid relevance to the collaborative processes in our smaller, \"colleague communities.\""},{"end":2412.123333333333,"index":262,"paragraph_end":false,"start":2401.009333333333,"text":"Time and again a worker would come across others' dialog and be able to contribute some valuable information (sometimes a one-sentence comment with a critical citation link)."},{"end":2419.162666666666,"index":263,"paragraph_end":true,"start":2412.123333333333,"text":"Often the payoff went the other way: the new party found immediate value in an old piece of recorded dialog."},{"end":2422.415333333333,"index":264,"paragraph_end":false,"start":2419.162666666666,"text":"Shared-Screen Teleconferencing."},{"end":2431.2466666666664,"index":265,"paragraph_end":false,"start":2422.415333333333,"text":"Consider a case where two people sit down to work together at a terminal, where they can both see the screen(s), and where either one can take over the controls."},{"end":2452.451333333333,"index":266,"paragraph_end":true,"start":2431.2466666666664,"text":"This is being done countless times every day throughout the country, in different combinations of expert-expert, expert-novice, novice-coach, etc. When talking together on their telephones, two or more distantly separated AUGMENT users can collaborate in a manner very similar to this."},{"end":2459.8959999999997,"index":267,"paragraph_end":false,"start":2452.451333333333,"text":"Suppose that two workers, Smith and Jones, want to set up and operate in a Shared-Screen Conferencing mode."},{"end":2470.8606666666665,"index":268,"paragraph_end":false,"start":2459.8959999999997,"text":"Smith is in Princeton, working on host Office-4, and Jones is in San Francisco, working on host Office-12 -- and both of these host computers are connected to the same network."},{"end":2478.7106666666664,"index":269,"paragraph_end":true,"start":2470.8606666666665,"text":"Assumedly they are in telephone contact when they decide to work in this shared-screen mode to collaborate on Smith's current job."},{"end":2483.883333333333,"index":270,"paragraph_end":false,"start":2478.7106666666664,"text":"Jones will enter the command \"Share (display with user) SMITH!"},{"end":2486.389333333333,"index":271,"paragraph_end":false,"start":2483.883333333333,"text":"On host OF12!"},{"end":2489.3006666666665,"index":272,"paragraph_end":true,"start":2486.389333333333,"text":"Viewing (other display)!!\""},{"end":2494.484,"index":273,"paragraph_end":false,"start":2489.3006666666665,"text":"Smith will enter the command \"Share (display with user) JONES!"},{"end":2496.9153333333334,"index":274,"paragraph_end":false,"start":2494.484,"text":"On host OF4!"},{"end":2499.7946666666667,"index":275,"paragraph_end":true,"start":2496.9153333333334,"text":"Showing (this display)!!\""},{"end":2511.378,"index":276,"paragraph_end":true,"start":2499.7946666666667,"text":"To give these commands, each person only entered the characters shown in upper case (entry case actually irrelevant), plus the digits, plus an \"OK Key\" action where each exclamation point is shown."},{"end":2522.4813333333336,"index":277,"paragraph_end":false,"start":2511.378,"text":"Whatever tool that Jones is currently using will continue responding to his controlling actions, as evidenced by various feedback and portrayal actions in the windows on his screen."},{"end":2530.0433333333335,"index":278,"paragraph_end":false,"start":2522.4813333333336,"text":"Smith's screen image will clear, and be replaced with a replica of Jones' screen image -- multiple windows and all."},{"end":2537.9893333333334,"index":279,"paragraph_end":true,"start":2530.0433333333335,"text":"For the duration of the shared-screen session, Smith's screen image will continue to replicate what is shown on Jones' screen."},{"end":2543.396666666667,"index":280,"paragraph_end":false,"start":2537.9893333333334,"text":"There are provisions for passing control back and forth between workers."},{"end":2550.574666666667,"index":281,"paragraph_end":false,"start":2543.396666666667,"text":"For instance, Jones can pass control to Smith so that Smith can show him some material or method of work."},{"end":2557.518,"index":282,"paragraph_end":true,"start":2550.574666666667,"text":"There are also provisions for the subsequent entry and departure of other conference participants."},{"end":2560.962666666667,"index":283,"paragraph_end":true,"start":2557.518,"text":"Embedding the Graphic Illustrations"},{"end":2570.434,"index":284,"paragraph_end":false,"start":2560.962666666667,"text":"For complete support of document development, it is important to provide integrated means for developing, viewing, and manipulating graphical portrayals."},{"end":2582.6786666666667,"index":285,"paragraph_end":false,"start":2570.434,"text":"These portrayals should be part of the working files from the very start, to be studied, passed about in mail, shared in Conferencing mode, edited, captioned, labelled, and moved about within the document structure."},{"end":2595.2753333333335,"index":286,"paragraph_end":true,"start":2582.6786666666667,"text":"Furthermore, active, relevant citation links pointing to these graphical constructs would be installed in and followed from textual passages throughout the associated set of documents (including Mail and Journal documents)."},{"end":2603.3706666666667,"index":287,"paragraph_end":true,"start":2595.2753333333335,"text":"AUGMENT's architecture and file structure were designed for this end, and a good bit of the associated implementation is in place."},{"end":2613.258,"index":288,"paragraph_end":false,"start":2603.3706666666667,"text":"A graphical data structure can be attached to any given file node, and there are basic capabilities for composing, studying, and modifying graphical diagrams."},{"end":2623.3586666666665,"index":289,"paragraph_end":false,"start":2613.258,"text":"When formatting for a suitably equipped photo-typesetting device, there are formatting directives to designate the position and scale for placing these diagrams on a page."},{"end":2632.5526666666665,"index":290,"paragraph_end":true,"start":2623.3586666666665,"text":"An AUGMENT file with integrated text and graphics can thus be mapped automatically onto a high-quality document whose pages contain both text and line drawings."},{"end":2645.7466666666664,"index":291,"paragraph_end":false,"start":2632.5526666666665,"text":"Our goal here was for what we call an \"illustrative graphics\" capability -- basic to which is a command that, when directed toward any conventional \"plotter\" file, will translate it into a diagram attached to a designated node."},{"end":2656.8179999999998,"index":292,"paragraph_end":true,"start":2645.7466666666664,"text":"In this way we can make use of graphic constructs developed within almost any applications system, most of which have provision for outputting \"conventional\" plotter files."},{"end":2667.569333333333,"index":293,"paragraph_end":false,"start":2656.8179999999998,"text":"The most important next step is to adapt a bit-mapped display as an AUGMENT workstation, so the integrated text and graphics can be viewed and manipulated on the same screen."},{"end":2676.912666666666,"index":294,"paragraph_end":false,"start":2667.569333333333,"text":"Heretofore, to do graphic work, an author has had to attach a Tektronix 4014 storage-tube display to the special printer/graphic port of her AUGMENT workstation."},{"end":2685.989333333333,"index":295,"paragraph_end":true,"start":2676.912666666666,"text":"This has made use of AUGMENT graphics slow and expensive enough to limit the number of user groups who have developed the integrated use of mixed text and graphics."},{"end":2688.2819999999997,"index":296,"paragraph_end":true,"start":2685.989333333333,"text":"Conclusion"},{"end":2695.577333333333,"index":297,"paragraph_end":false,"start":2688.2819999999997,"text":"AUGMENT's unique provisions stemmed for the most part from the conceptual framework within which AUGMENT was developed."},{"end":2703.811333333333,"index":298,"paragraph_end":false,"start":2695.577333333333,"text":"For instance, consider the pervasive and significant changes in the environment in which humans will be doing their knowledge work."},{"end":2719.5866666666666,"index":299,"paragraph_end":false,"start":2703.811333333333,"text":"Note that the habits, methods, conventions, intuitions, etc., that comprise the \"ways\" in which we think, work and collaborate, are for the most part products of many centuries of cultural evolution -- in a radically different environment."},{"end":2727.9486666666667,"index":300,"paragraph_end":true,"start":2719.5866666666666,"text":"With a radically different environment, this constant process of cultural evolution can be expected to take some radical turns."},{"end":2736.9506666666666,"index":301,"paragraph_end":false,"start":2727.9486666666667,"text":"The AUGMENT developmental framework assumed that many of these \"ways\" are candidates now for change in directions that heretofore would not have been beneficial."},{"end":2754.8166666666666,"index":302,"paragraph_end":false,"start":2736.9506666666666,"text":"The AUGMENT system emerged as a first step in considering a few such changes, which perhaps can improve human capability for doing knowledge work because their new \"ways\" will enable us more effectively to harness the new tools toward more effective basic capability."},{"end":2760.7786666666666,"index":303,"paragraph_end":true,"start":2754.8166666666666,"text":"(This is very different from trying to \"automate\" our old \"ways\" of doing things.)"},{"end":2766.826,"index":304,"paragraph_end":false,"start":2760.7786666666666,"text":"As an example, consider the \"What You See Is What You Get\" (WYSIWYG) syndrome."},{"end":2771.22,"index":305,"paragraph_end":false,"start":2766.826,"text":"It is a highly touted feature for many vendors."},{"end":2779.3686666666663,"index":306,"paragraph_end":false,"start":2771.22,"text":"It provides a definite advantage for the final process of converting a computer-held document to a nicely formatted hard copy."},{"end":2782.642666666666,"index":307,"paragraph_end":false,"start":2779.3686666666663,"text":"But what does it do for authorship?"},{"end":2787.2819999999997,"index":308,"paragraph_end":false,"start":2782.642666666666,"text":"Well, in our framework, it has a negative impact."},{"end":2796.198666666666,"index":309,"paragraph_end":false,"start":2787.2819999999997,"text":"We were happy to abandon those constraints of lines and pages and other formatting geometry which did not contribute to matters of content and structure."},{"end":2812.816666666666,"index":310,"paragraph_end":false,"start":2796.198666666666,"text":"We have chosen instead to provide the authorship process with structured files, flexible addressing, flexible window-size viewing, level and truncation viewspecs, etc. -- things that would be awkward or impossible to provide in a WYSIWYG environment."},{"end":2821.893333333333,"index":311,"paragraph_end":false,"start":2812.816666666666,"text":"This provides the authorship phase with flexibility and power for studying and manipulating content and structure that we wouldn't consider trading off for WYSIWYG."},{"end":2825.0926666666664,"index":312,"paragraph_end":true,"start":2821.893333333333,"text":"Save it for the production phase."},{"end":2830.0306666666665,"index":313,"paragraph_end":false,"start":2825.0926666666664,"text":"Here is another bit of culture that deserves re-examination."},{"end":2835.2033333333334,"index":314,"paragraph_end":false,"start":2830.0306666666665,"text":"Consider the dictum, \"Easy to learn, and natural to use.\""},{"end":2837.88,"index":315,"paragraph_end":false,"start":2835.2033333333334,"text":"Or, \"User friendly.\""},{"end":2844.13,"index":316,"paragraph_end":false,"start":2837.88,"text":"The question is, for whom are you judging that things will be easy, or natural, or friendly?"},{"end":2857.9,"index":317,"paragraph_end":false,"start":2844.13,"text":"For designers of craft-work tool systems, very different perceptions of this issue are warranted between a system for the occasional, weekend do-it-yourself person and a system to be heavily used day after day by professionals."},{"end":2864.9500000000003,"index":318,"paragraph_end":true,"start":2857.9,"text":"The AUGMENT User Interface System enables us easily to configure either kind of a tool collection."},{"end":2873.0026666666668,"index":319,"paragraph_end":false,"start":2864.9500000000003,"text":"This paper describes part of what is provided to professional knowledge workers who do a significant amount of authorship work."},{"end":2888.938,"index":320,"paragraph_end":true,"start":2873.0026666666668,"text":"We observe no more difficulty in their learning how to employ this relatively large collection of tools than one would expect for professional woodworkers in their learning about the relatively large collection of chisels and other tools of their trade."},{"end":2898.078666666667,"index":321,"paragraph_end":false,"start":2888.938,"text":"It is a basic part of our framework that, to augment human knowledge workers, attention must be given not only to tools, but to methods and skills as well."},{"end":2908.744666666667,"index":322,"paragraph_end":false,"start":2898.078666666667,"text":"Because of space limitations, the scope of this paper was restricted to a summary of those tool provisions within AUGMENT that especially facilitate the authorship process."},{"end":2922.109333333334,"index":323,"paragraph_end":false,"start":2908.744666666667,"text":"A full description of \"How to use AUGMENT to ...\" would definitely need to include methods of work that effectively harness these tool provisions, and the special kinds of skills that yield unique payoff in executing these methods."},{"end":2933.4580000000005,"index":324,"paragraph_end":true,"start":2922.109333333334,"text":"This is true for every tool system, of course, but it seems especially true in this case because many AUGMENT provisions do not fit into the general cultural background of our authorship process."},{"end":2944.4120000000007,"index":325,"paragraph_end":true,"start":2933.4580000000005,"text":"Perhaps the best way for very brief summarization of what AUGMENT's users feel about its unique features is simply to say that those who leave its working environment really miss them."},{"end":2946.651333333334,"index":326,"paragraph_end":true,"start":2944.4120000000007,"text":"References"},{"end":2949.4986666666673,"index":327,"paragraph_end":false,"start":2946.651333333334,"text":"Ref-1: Engelbart, D."},{"end":2960.719333333334,"index":328,"paragraph_end":false,"start":2949.4986666666673,"text":"C., \"Toward Integrated, Evolutionary Office Automation Systems,\" Proceedings of the 26th Joint Engineering Management Conference, Denver, CO, Oct. 16-18, 1978, pp."},{"end":2962.830666666667,"index":329,"paragraph_end":false,"start":2960.719333333334,"text":"63-68."},{"end":2965.464666666667,"index":330,"paragraph_end":true,"start":2962.830666666667,"text":"(AUGMENT,71279,)"},{"end":2968.3440000000005,"index":331,"paragraph_end":false,"start":2965.464666666667,"text":"Ref-2: Engelbart, D."},{"end":2970.3700000000003,"index":332,"paragraph_end":false,"start":2968.3440000000005,"text":"C., R."},{"end":2972.118666666667,"index":333,"paragraph_end":false,"start":2970.3700000000003,"text":"W."},{"end":2974.5180000000005,"index":334,"paragraph_end":false,"start":2972.118666666667,"text":"Watson and J."},{"end":2976.234666666667,"index":335,"paragraph_end":false,"start":2974.5180000000005,"text":"C."},{"end":2982.8260000000005,"index":336,"paragraph_end":false,"start":2976.234666666667,"text":"Norton, \"The Augmented Knowledge Workshop,\" AFIPS Conference Proceedings, Volume 42, pp."},{"end":2988.1693333333337,"index":337,"paragraph_end":false,"start":2982.8260000000005,"text":"9-21, National Computer Conference, June 4-8, 1973."},{"end":2990.835333333334,"index":338,"paragraph_end":true,"start":2988.1693333333337,"text":"(AUGMENT,14724,)"},{"end":2996.4773333333337,"index":339,"paragraph_end":false,"start":2990.835333333334,"text":"Ref-3: Michael, Elizabeth K., Dirk H. van Nouhuys, Beverly R."},{"end":2999.8793333333338,"index":340,"paragraph_end":false,"start":2996.4773333333337,"text":"Boli, Raphael Rom, and Ann C."},{"end":3020.4760000000006,"index":341,"paragraph_end":false,"start":2999.8793333333338,"text":"Weinberg, \"Document Production and Control Systems,\" Phase One report of Document Production and Control Systems Design Study, by the Augmentation Research Center, SRI International, for AF Rome Air Development Center, Contract F30602-76-C-003, March 1, 1977."},{"end":3023.1100000000006,"index":342,"paragraph_end":true,"start":3020.4760000000006,"text":"(AUGMENT,37730,)"},{"end":3028.506666666667,"index":343,"paragraph_end":false,"start":3023.1100000000006,"text":"Ref-4: Boli, Beverly R., Harvey G Lehtman, Elizabeth K."},{"end":3051.215333333334,"index":344,"paragraph_end":false,"start":3028.506666666667,"text":"Michael, Raphael Rom, Dirk H. van Nouhuys, and Nina Zolotow, \"A Model Document Production System,\" Phase Two report of Document Production and Control Systems Design Study, by the Augmentation Research Center, SRI International, for AF Rome Air Development Center, Contract F30602-76-C-003, July 30, 1977."},{"end":3053.8066666666673,"index":345,"pa
