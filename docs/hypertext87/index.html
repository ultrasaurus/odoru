tute for Research on Information and Scholarship. IRIS not only creates scholars' workstation software but also has a completely symmetrical program evaluation branch where social scientists with an interest in this area study needs, requirements and impact of this technology on scholarly work. And by the way, 'scholarly work' to us is not just the work of faculty members but also that of students-we're all scholars on this bus.\n\nWe set up IRIS at a time when there was a lot of enthusiasm in front-running universities for buying into the workstation revolution, looking at the Xerox PARC model of distributed computation and saying, \"We want to deliver tools that really take advantage of the expressive power of such workstations.\" So IRIS and other organizations on other campuses were created to develop scholarly tools. I think, though, that there is still a paucity of such scholarly tools and we are at the very beginning of understanding what they might be.\n\nI'm going to sum up what I think are some key areas we all ought to be looking at. Here are nine quick items. My first concern is that systems may develop great infrastructure, great hypertext glue, but what's at the nodes? As with the 2D animation in BALSA, I think we should be aiming at user-controlled 3D animation, where the interactive user has control over what is being shown, the level of detail, the visualizations employed, and so on. This is just a wide-open area that needs a lot of study, not to mention vast hardware power.\n\nSecond, Ted talks a lot about the docuverse, a mythical entity out there that is all-inclusive and contains everything. But instead, right now we are building docu-islands; none of our systems talk to each other, they are wholly incompatible. So we are all working the same agenda, more or less, but we can't exchange stuff; there is no exchange format, there is no universality, and furthermore, our systems are closed systems. In a sense, they are making the same mistake as the all-in-one environments in personal computing. Yes, they give you a word processor and a spreadsheet editor and a business graphics package, etc., but none of them are really satisfactory. And our experience with FRESS, where we had to escape to command language, showed that it is really important to be able to go outside. So it's not enough to bundle the HyperCard package with every Mac you buy. It really ought to be migrated down, become part of the toolbox, so that application programmers can take their applications and take advantage of a standard linking protocol that works within and between applications.\n\nSo I'm going to raise a red-flag word: standards. I'm a firm believer in standards. And everybody will say it is absolutely premature to standardize when we don't even know what the hell we're talking about. We are still in the experimental phase. I believe that. But if we don't start thinking about standards, five years from now we are going to have a wealth of these little docu-islands which are totally incompatible, and that's crazy.\n\nPoint number three is size. We are still in the toy problem stage. There has not been a decent-sized hypertext built yet. And we won't know what it is like until we deal with the kinds of documentation problems that people in the real world deal with. People have graphed the number of pages of technical manuals for fighter aircraft against time. In World War II, we had 1K page documentation per fighter aircraft; in Korea, 10K; in Vietnam, 100K. It's an exponential curve. The F-16 has 600K pages, and the advanced tactical fighter will probably have somewhere around a million and a half pages of technical documentation. It is, in effect, a giant hypertext that should be linked, and done with change control.\n\nAnd that is my fourth point. We have to do something about versioning and change control in the large. But we won't have a fighting chance to kill paper and become an on-line community until we tackle the kinds of problems that paper solves for us today. Paper is convenient, you can carry it around and versions are easily created and maintained. Hypertext is not as accessible as paper, and it certainly isn't prepared to deal with the size problems as paper does.\n\nThe fifth problem is navigation, lost in hyperspace. Some people say we need content and structure query, we need virtual structures, composites; others say we need pruning. All of this is true. I find the notion of dynamically constructing a hypertext very intriguing, but very difficult to do in general. My point of view is that in a sense hypertext gives us a goto, and a goto, as we all know, produces spaghetti. At most we have invented the if-then-else-if, with hierarchy. That's our one structured flow-of-control concept, where you have some sense of what you are looking at in your hyperdocument. Well, we need to discover what the equivalents of other constructs are. As Ted did at the start, we have to invent other document forms that somehow become standard so that people have pattern recognition and say, \"Ah, yes, I know how that one works.\" So we need new forms, new flow of control kinds of constructs besides just unbridled goto-ness of directed graph structures.\n\nThe other navigation aid we need is a tell-me-what you've-got, which probably entails AI. Instead of just syntax, we need some notion of semantics at the nodes. We need to be able to derive new knowledge from old, using inference engines. Just storing billions and billions of facts that are tied together is not going to do it for us; that will just drown us in associations.\n\nThe sixth point is that we need hypermedia designers. Remember how crazy everybody went when they got the ability to print multiple fonts? We got 'fontitis.' Then people discovered color screens and we got 'coloritis,' without any rules, without any design discipline. Now we've got linkitis,' and people with no graphic design experience or talent are going to throw stuff together and it will look terrible. You all know that one of the interesting things that happened after Gutenberg was typography. For a while after Gutenberg, type designers were using manuscript letterforms. And they were using erasers and paintbrushes to doctor the stuff the typesetting machine had set so it would look more like an old-fashioned manuscript and people would be familiar with it. It took a long while for people to understand that this new medium demanded a new style, a new typography. So typography is an invention, and it is nearly as important as the printing press in the first place. We don't want to mimic the old manuscript form in our hypertexts.\n\nAldus Manutius discovered modern pages. And pages gave us a new way to cross-reference, to talk about content, to index, and that technology took a while, but it made information a great deal more accessible. So we need people who are concerned about layout and design and typography of hypermedia and can think about classification and indexing and how we put things together.\n\nBut we don't want to put things together in such a way that there is one point of view, because if we've learned one thing from interactive tools up to now is that multiview is the way people work. You can not have it just one way. We need an update to Larry Tesler's \"Don't mode me in.\" Jim Foley and I recently came up with \"Don't metaphor me in.\" Don't give me a little card image and say, \"That's all you've got, because that's what I thought you should want for your virtual shoebox.\" There have got to be multiple modalities and the designers have to be able to deal with that. So that was issue number seven: don't metaphor me in, don't give me only one way of looking at things.\n\nPoint eight: accessibility, portability-I want a laptop Dynabook. And I also want wallscreen-size displays. I want my whiteboard-sized hypertext display, and not until it's that big do I think we can really start working with hypertext. Hoker performs the following experiment. Take The Wall Street Journal and move around a little cutout the size of a Mac screen and see how happy you are with The Wall Street Journal, versus looking at a page of it in its entirety and immediately picking up what you might be interested in reading. A very persuasive point.\n\nAnd finally, point number nine: we must think about the sociopolitico-economic problems. We have not come to grips with issues of intellectual property rights and compensation. Congress and the U.S. Patent Office and copyright lawyers and so on do not understand what is involved here and need to be educated. If we shrink away from those issues and leave it to them, there is going to be absolute chaos. Ted, again, has written extensively on this issue and has postulated some interesting mechanisms for coping with the problems.\n\nSo there are essentially three classes of people. There are the visionary hypers who say, not only is the glass not half empty, it's overflowing with opportunities and possibilities and technology push of CD ROMs, 100 megabytes and 100 MIPS on your personal computer in just a few years, and so on. They are saying everything is great and we have a wonderful universe to explore.\n\nThen there are the skeptics who say, not only is the glass not half full, but there was probably never any water in it to begin with. And I'm a third type sitting on the fence somewhere in between these two extremes, saying, I've used a lot of hypertext systems and I think they are neat and show a lot of potential. I think we are just at the very beginning and it's too early to rush to judgment, but it's clear that collectively we have a lot of hard but exciting work to do to make this technology work and to create what has been called the electronic Alexandria.\n\nAuthor's Present Address: Andries van Dam, Brown University, Dept. of Computer Science, 115 Waterman St., Providence, RI 02912.\n\nPermission to copy without fee all or part of this material is granted provided that the copies are not made or distributed for direct commercial advantage, the ACM copyright notice and the title of the publication and its date appear, and notice is given that copying is by permission of the Association for Computing Machinery. To copy otherwise, or to republish, requires a fee and/or specific permission.\n\nCopyright 1996 ACM 1072-5520/96/0300 $3.50\n\nText extracted from the article printed in Communications of the ACM (Vol. 31, No. 7). Printed by permission of ACM."}},"manifest":[{"authors":["Andries van Dam"],"date":"1987-11-13","has_audio":true,"slug":"1987-11-13-hypertext-87-keynote-address","title":"Hypertext '87 Keynote Address"}],"sentence_blocks":{"1987-11-13-hypertext-87-keynote-address":[6,12,2,8,7,4,4,2,2,9,9,4,2,6,8,6,8,8,7,7,7,2,7,7,3,3,3,3,6,6,4,6,2,11,7,3,12,5,6,3,11,7,6,5,8,5,3,5,8,6,9,5,10,4,11,3,7,6,6,3,3,1,2,1,3]},"transcripts":{"1987-11-13-hypertext-87-keynote-address":[{"end":18.839552879333496,"index":0,"markdown_text":"I'm a Johnny-come-lately to hypertext: I didn't get started until 1967, and what is especially fun about being here is that I can pay public tribute to the two real trailblazers who have inspired me and hordes of my students who have gone off to do their own independent hypertext projects.","paragraph_end":false,"start":0.0,"text":"I'm a Johnny-come-lately to hypertext: I didn't get started until 1967, and what is especially fun about being here is that I can pay public tribute to the two real trailblazers who have inspired me and hordes of my students who have gone off to do their own independent hypertext projects."},{"end":25.57654571533203,"index":1,"markdown_text":"The first is the incomparable, one and only Doug Engelbart, who has been working at this since the late 1950s.","paragraph_end":false,"start":18.839552879333496,"text":"The first is the incomparable, one and only Doug Engelbart, who has been working at this since the late 1950s."},{"end":27.12815570831299,"index":2,"markdown_text":"Many people don't know that.","paragraph_end":false,"start":25.57654571533203,"text":"Many people don't know that."},{"end":39.150634765625,"index":3,"markdown_text":"Some of them may go back in ancient history and remember his mind-blowing demonstration at the 1968 Fall Joint Computer Conference, but at that point he had already been working in this area for a decade.","paragraph_end":false,"start":27.12815570831299,"text":"Some of them may go back in ancient history and remember his mind-blowing demonstration at the 1968 Fall Joint Computer Conference, but at that point he had already been working in this area for a decade."},{"end":43.20484161376953,"index":4,"markdown_text":"And he invented just about everything the rest of us have been doing since then.","paragraph_end":false,"start":39.150634765625,"text":"And he invented just about everything the rest of us have been doing since then."},{"end":46.93333333333333,"index":5,"markdown_text":"I will just mention two of his major contributions.","paragraph_end":true,"start":43.20484161376953,"text":"I will just mention two of his major contributions."},{"end":54.31193083127339,"index":6,"markdown_text":"The first is office automation; he was doing office automation, in particular word processing, before the terms had even been coined.","paragraph_end":false,"start":46.93333333333333,"text":"The first is office automation; he was doing office automation, in particular word processing, before the terms had even been coined."},{"end":61.009735043843584,"index":7,"markdown_text":"IBM invented the phrase, in connection with the MCST, the magnetic card selectric typewriter.","paragraph_end":false,"start":54.31193083127339,"text":"IBM invented the phrase, in connection with the MCST, the magnetic card selectric typewriter."},{"end":65.5750550587972,"index":8,"markdown_text":"Word processing was the right term, since words were all you could process.","paragraph_end":false,"start":61.009735043843584,"text":"Word processing was the right term, since words were all you could process."},{"end":71.94247334798177,"index":9,"markdown_text":"However, you were lucky if you could replace a small word with a larger word and not have it flow off the edges of the card.","paragraph_end":false,"start":65.5750550587972,"text":"However, you were lucky if you could replace a small word with a larger word and not have it flow off the edges of the card."},{"end":76.19743150075277,"index":10,"markdown_text":"At that time Doug Engelbart was really working on idea processing.","paragraph_end":false,"start":71.94247334798177,"text":"At that time Doug Engelbart was really working on idea processing."},{"end":80.36228459676107,"index":11,"markdown_text":"He was, of course, the inventor of outline processing, as it is known today.","paragraph_end":false,"start":76.19743150075277,"text":"He was, of course, the inventor of outline processing, as it is known today."},{"end":84.26683514912924,"index":12,"markdown_text":"He had links, he had text searches with a variety of wild-card options.","paragraph_end":false,"start":80.36228459676107,"text":"He had links, he had text searches with a variety of wild-card options."},{"end":91.26498692830404,"index":13,"markdown_text":"How many of today's commercial hypertext systems let you perform text searches with wild cards and all kinds of other conditions?","paragraph_end":false,"start":84.26683514912924,"text":"How many of today's commercial hypertext systems let you perform text searches with wild cards and all kinds of other conditions?"},{"end":93.04706471761068,"index":14,"markdown_text":"Not very many, I believe.","paragraph_end":false,"start":91.26498692830404,"text":"Not very many, I believe."},{"end":95.92041104634603,"index":15,"markdown_text":"He spent a great deal of time on the user interface.","paragraph_end":false,"start":93.04706471761068,"text":"He spent a great deal of time on the user interface."},{"end":106.54278844197592,"index":16,"markdown_text":"He had a variety of interesting command language shells that were at once the singular strength of his NLS system and, to those who were not willing to invest the time to learn them, also a weakness.","paragraph_end":false,"start":95.92041104634603,"text":"He had a variety of interesting command language shells that were at once the singular strength of his NLS system and, to those who were not willing to invest the time to learn them, also a weakness."},{"end":111.73333333333333,"index":17,"markdown_text":"He invented the mouse and the five-key chord input device and lots of other things.","paragraph_end":true,"start":106.54278844197592,"text":"He invented the mouse and the five-key chord input device and lots of other things."},{"end":133.87759278615317,"index":18,"markdown_text":"So there is this whole catalog of stuff that Doug's group at SRI implemented in the middle to late 1960s on a little timesharing system on the SDS 940, the kind of CPU that today would fit in your wristwatch.","paragraph_end":false,"start":111.73333333333333,"text":"So there is this whole catalog of stuff that Doug's group at SRI implemented in the middle to late 1960s on a little timesharing system on the SDS 940, the kind of CPU that today would fit in your wristwatch."},{"end":139.20000000000002,"index":19,"markdown_text":"All that functionality ran on a computer of that power!","paragraph_end":true,"start":133.87759278615317,"text":"All that functionality ran on a computer of that power!"},{"end":150.78055448532106,"index":20,"markdown_text":"The second major contribution, and the one that most people don't know at all, even if they know something about Doug's efforts toward the augmentation of human intellect, is that he is the father of software engineering in the modern sense.","paragraph_end":false,"start":139.20000000000002,"text":"The second major contribution, and the one that most people don't know at all, even if they know something about Doug's efforts toward the augmentation of human intellect, is that he is the father of software engineering in the modern sense."},{"end":157.5567295074463,"index":21,"markdown_text":"Long before scientists such as Dijkstra and Bauer started writing about formal software engineering, Doug and his crew had been living it.","paragraph_end":false,"start":150.78055448532106,"text":"Long before scientists such as Dijkstra and Bauer started writing about formal software engineering, Doug and his crew had been living it."},{"end":161.57038803100588,"index":22,"markdown_text":"This really was a bootstrap community of tool builders and tool users.","paragraph_end":false,"start":157.5567295074463,"text":"This really was a bootstrap community of tool builders and tool users."},{"end":170.97896308898927,"index":23,"markdown_text":"So on that little timesharing system on the 940, they had meta-assemblers and compiler-compilers and ways of generating special-purpose problem-oriented languages.","paragraph_end":false,"start":161.57038803100588,"text":"So on that little timesharing system on the 940, they had meta-assemblers and compiler-compilers and ways of generating special-purpose problem-oriented languages."},{"end":174.44211883544924,"index":24,"markdown_text":"They had any number of tools and understood the value of building tools.","paragraph_end":false,"start":170.97896308898927,"text":"They had any number of tools and understood the value of building tools."},{"end":176.2137348175049,"index":25,"markdown_text":"To me that was a revelation.","paragraph_end":false,"start":174.44211883544924,"text":"To me that was a revelation."},{"end":187.2337772369385,"index":26,"markdown_text":"In my group at Brown University we were assembly-language hackers, and what was important to us was efficiency and writing the tightest possible code so that we could get sophisticated programs to run in real time.","paragraph_end":false,"start":176.2137348175049,"text":"In my group at Brown University we were assembly-language hackers, and what was important to us was efficiency and writing the tightest possible code so that we could get sophisticated programs to run in real time."},{"end":192.53333333333336,"index":27,"markdown_text":"The whole idea of spending a lot of time and energy on first building tools was really novel.","paragraph_end":true,"start":187.2337772369385,"text":"The whole idea of spending a lot of time and energy on first building tools was really novel."},{"end":195.65663960774742,"index":28,"markdown_text":"So much for my paean of praise to Doug Engelbart.","paragraph_end":false,"start":192.53333333333336,"text":"So much for my paean of praise to Doug Engelbart."},{"end":209.95177224477135,"index":29,"markdown_text":"I think we are all here because of him and also because of Ted Nelson, the second trailblazer, who coined the word \"hypertext\" and dozens of other words-being wordsmith and master showman par excellence and also a polemicist of the first rank.","paragraph_end":false,"start":195.65663960774742,"text":"I think we are all here because of him and also because of Ted Nelson, the second trailblazer, who coined the word \"hypertext\" and dozens of other words-being wordsmith and master showman par excellence and also a polemicist of the first rank."},{"end":225.10781720479332,"index":30,"markdown_text":"Ted is a self-proclaimed visionary who deserves the title, and he turned on generations of people with \"Computer Lib/Dream Machines\", a landmark work that still today-I reread a lot of it just a few days ago to prepare myself for this talk- is good reading.","paragraph_end":false,"start":209.95177224477135,"text":"Ted is a self-proclaimed visionary who deserves the title, and he turned on generations of people with \"Computer Lib/Dream Machines\", a landmark work that still today-I reread a lot of it just a few days ago to prepare myself for this talk- is good reading."},{"end":231.18424847920738,"index":31,"markdown_text":"Ted coined that wonderful phrase, \"If computers are the wave of the future, displays are the surfboards.\"","paragraph_end":false,"start":225.10781720479332,"text":"Ted coined that wonderful phrase, \"If computers are the wave of the future, displays are the surfboards.\""},{"end":237.08049252827965,"index":32,"markdown_text":"Well, I've used that bon mot ever since, and I think he is absolutely right: displays are the way to go.","paragraph_end":false,"start":231.18424847920738,"text":"Well, I've used that bon mot ever since, and I think he is absolutely right: displays are the way to go."},{"end":246.15009167989098,"index":33,"markdown_text":"But one of the neat things is that we are discovering lots of other media that fit in: it's not just display technology, it's not just text and graphics any more.","paragraph_end":false,"start":237.08049252827965,"text":"But one of the neat things is that we are discovering lots of other media that fit in: it's not just display technology, it's not just text and graphics any more."},{"end":251.20000000000002,"index":34,"markdown_text":"Video, high-quality sound and other media are also available now.","paragraph_end":true,"start":246.15009167989098,"text":"Video, high-quality sound and other media are also available now."},{"end":257.7064861774445,"index":35,"markdown_text":"Another thing we should thank Ted for is that he did not just say, \"branch, link, make arbitrary associations.\"","paragraph_end":false,"start":251.20000000000002,"text":"Another thing we should thank Ted for is that he did not just say, \"branch, link, make arbitrary associations.\""},{"end":270.9897281646729,"index":36,"markdown_text":"He tried very early to impose some discipline on linking, and introduced us to such wonderful artifices as stretch text, text that elastically expands and contracts in place.","paragraph_end":false,"start":257.7064861774445,"text":"He tried very early to impose some discipline on linking, and introduced us to such wonderful artifices as stretch text, text that elastically expands and contracts in place."},{"end":286.59528465271,"index":37,"markdown_text":"In other words, you don't select something and then it blows up to an alternate statement or adds a level of indentation; no, the text should expand and contract smoothly, and you might use a lever to make things get more or less terse.","paragraph_end":false,"start":270.9897281646729,"text":"In other words, you don't select something and then it blows up to an alternate statement or adds a level of indentation; no, the text should expand and contract smoothly, and you might use a lever to make things get more or less terse."},{"end":294.0819511413575,"index":38,"markdown_text":"I have not yet seen an example of this, and it's really tough to write for, but it's a very interesting idea.","paragraph_end":true,"start":286.59528465271,"text":"I have not yet seen an example of this, and it's really tough to write for, but it's a very interesting idea."},{"end":304.89272880554205,"index":39,"markdown_text":"Ted also talked about performing hypergrams: a picture annotated with text whose components you can point to and they will perform-animate themselves, for example.","paragraph_end":false,"start":294.0819511413575,"text":"Ted also talked about performing hypergrams: a picture annotated with text whose components you can point to and they will perform-animate themselves, for example."},{"end":309.57739830017096,"index":40,"markdown_text":"This was a decade before the MIT Media Lab did this sort of thing.","paragraph_end":false,"start":304.89272880554205,"text":"This was a decade before the MIT Media Lab did this sort of thing."},{"end":314.8326377868653,"index":41,"markdown_text":"Also I really think Ted deserves the credit for thinking multimedia so early.","paragraph_end":false,"start":309.57739830017096,"text":"Also I really think Ted deserves the credit for thinking multimedia so early."},{"end":327.6000000000001,"index":42,"markdown_text":"He also talked about zippered lists, collateral text and all kinds of other weird and wacky ideas, some of which are workable, perhaps, some of which are not, but all of them are sure stimulating!","paragraph_end":true,"start":314.8326377868653,"text":"He also talked about zippered lists, collateral text and all kinds of other weird and wacky ideas, some of which are workable, perhaps, some of which are not, but all of them are sure stimulating!"},{"end":339.19188985824593,"index":43,"markdown_text":"One of the most important things he taught me was that this is a new medium and you really can't be constrained to thinking about it in the old ways.","paragraph_end":false,"start":327.6000000000001,"text":"One of the most important things he taught me was that this is a new medium and you really can't be constrained to thinking about it in the old ways."},{"end":351.41360511779794,"index":44,"markdown_text":"Don't copy old bad habits; think about new organizations, new ways of doing things, and take advantage of this new medium.","paragraph_end":true,"start":339.19188985824593,"text":"Don't copy old bad habits; think about new organizations, new ways of doing things, and take advantage of this new medium."},{"end":370.3730529785157,"index":45,"markdown_text":"The other important thing he really led me to focus on is that there is a great application for hypertext and hypermedia, not just for research, not just for maintaining your own personal database, but in teaching.","paragraph_end":false,"start":351.41360511779794,"text":"The other important thing he really led me to focus on is that there is a great application for hypertext and hypermedia, not just for research, not just for maintaining your own personal database, but in teaching."},{"end":382.4000000000001,"index":46,"markdown_text":"And that is one of my major themes here: how we have used hypertext and hypermedia in teaching at Brown University.","paragraph_end":true,"start":370.3730529785157,"text":"And that is one of my major themes here: how we have used hypertext and hypermedia in teaching at Brown University."},{"end":389.5781632900239,"index":47,"markdown_text":"Well, here we are at the first hypertext workshop and we have to ask, perhaps rhetorically, has hypertext arrived?","paragraph_end":false,"start":382.4000000000001,"text":"Well, here we are at the first hypertext workshop and we have to ask, perhaps rhetorically, has hypertext arrived?"},{"end":391.62048568725595,"index":48,"markdown_text":"has the millennium arrived?","paragraph_end":false,"start":389.5781632900239,"text":"has the millennium arrived?"},{"end":394.32355966568,"index":49,"markdown_text":"And of course there are several answers to those questions.","paragraph_end":false,"start":391.62048568725595,"text":"And of course there are several answers to those questions."},{"end":400.24028911590585,"index":50,"markdown_text":"The state of the art is reviewed in Jeff Conklin's excellent article in IEEE Computer of September 1987.","paragraph_end":false,"start":394.32355966568,"text":"The state of the art is reviewed in Jeff Conklin's excellent article in IEEE Computer of September 1987."},{"end":404.6853431701661,"index":51,"markdown_text":"There are also articles in the press hyping hypertext, and about the hype in hypertext.","paragraph_end":false,"start":400.24028911590585,"text":"There are also articles in the press hyping hypertext, and about the hype in hypertext."},{"end":413.084895515442,"index":52,"markdown_text":"Conversely, some of the recent major books on computing in the humanities don't mention hypertext, don't mention hypermedia, don't really deal with the issue of branching texts.","paragraph_end":false,"start":404.6853431701661,"text":"Conversely, some of the recent major books on computing in the humanities don't mention hypertext, don't mention hypermedia, don't really deal with the issue of branching texts."},{"end":417.96044006347665,"index":53,"markdown_text":"They are more concerned with typography, telecommunications and other issues that are very important.","paragraph_end":false,"start":413.084895515442,"text":"They are more concerned with typography, telecommunications and other issues that are very important."},{"end":424.50788536071786,"index":54,"markdown_text":"Even this 1986 book by Eugene Provenzo, \"Beyond the Gutenberg Galaxy\", which is delightful reading, does not mention it.","paragraph_end":false,"start":417.96044006347665,"text":"Even this 1986 book by Eugene Provenzo, \"Beyond the Gutenberg Galaxy\", which is delightful reading, does not mention it."},{"end":437.0666666666668,"index":55,"markdown_text":"And the forthcoming book by Christopher Turk about humanities computing, \"The Computer and the Scholar\", does not devote a chapter to this phenomenon, although electronic communication is certainly mentioned a lot, as are tools for processing text.","paragraph_end":true,"start":424.50788536071786,"text":"And the forthcoming book by Christopher Turk about humanities computing, \"The Computer and the Scholar\", does not devote a chapter to this phenomenon, although electronic communication is certainly mentioned a lot, as are tools for processing text."},{"end":448.4198718706768,"index":56,"markdown_text":"When you look at the publicity and at systems such as Xerox's NoteCards, Owl's Guide, and especially Apple's HyperCard, you get the impression that we are about to go over the knee of the exponential curve.","paragraph_end":false,"start":437.0666666666668,"text":"When you look at the publicity and at systems such as Xerox's NoteCards, Owl's Guide, and especially Apple's HyperCard, you get the impression that we are about to go over the knee of the exponential curve."},{"end":450.1318631807964,"index":57,"markdown_text":"I really believe we are.","paragraph_end":false,"start":448.4198718706768,"text":"I really believe we are."},{"end":457.8508415857952,"index":58,"markdown_text":"HyperCard in particular, despite all its limitations, is beautifully engineered, and has a wonderful user interface, especially for hypertext-style linking.","paragraph_end":false,"start":450.1318631807964,"text":"HyperCard in particular, despite all its limitations, is beautifully engineered, and has a wonderful user interface, especially for hypertext-style linking."},{"end":460.9744749704998,"index":59,"markdown_text":"It will really acculturate our computer user community.","paragraph_end":false,"start":457.8508415857952,"text":"It will really acculturate our computer user community."},{"end":466.35072809855154,"index":60,"markdown_text":"It is simple enough, despite its complexity, that a lot of people can get access to it at a relatively simple level.","paragraph_end":false,"start":460.9744749704998,"text":"It is simple enough, despite its complexity, that a lot of people can get access to it at a relatively simple level."},{"end":470.46551424662283,"index":61,"markdown_text":"There is a lot of traffic on networks already about it and people are exchanging stackware.","paragraph_end":false,"start":466.35072809855154,"text":"There is a lot of traffic on networks already about it and people are exchanging stackware."},{"end":474.59031206766775,"index":62,"markdown_text":"I think it will be a mass-media cult phenomenon, rather like MacPaint and MacDraw.","paragraph_end":false,"start":470.46551424662283,"text":"I think it will be a mass-media cult phenomenon, rather like MacPaint and MacDraw."},{"end":487.0848456064861,"index":63,"markdown_text":"I think Apple has done a really brilliant job of getting it out there, and although it's a fraction of what Doug and Ted and others of us believe to be the potential of hypertext or hypermedia, I think it's very strong and will do a lot to get people interested in our field.","paragraph_end":false,"start":474.59031206766775,"text":"I think Apple has done a really brilliant job of getting it out there, and although it's a fraction of what Doug and Ted and others of us believe to be the potential of hypertext or hypermedia, I think it's very strong and will do a lot to get people interested in our field."},{"end":490.5333333333334,"index":64,"markdown_text":"Presumably, it will be improved in future generations.","paragraph_end":true,"start":487.0848456064861,"text":"Presumably, it will be improved in future generations."},{"end":498.7828851064047,"index":65,"markdown_text":"The success of this workshop also says we are about to go over the knee of the exponential curve.","paragraph_end":false,"start":490.5333333333334,"text":"The success of this workshop also says we are about to go over the knee of the exponential curve."},{"end":508.96467450459807,"index":66,"markdown_text":"There is a staggering amount of information in the participant statements and in the papers, and many good and interesting papers.","paragraph_end":false,"start":498.7828851064047,"text":"There is a staggering amount of information in the participant statements and in the papers, and many good and interesting papers."},{"end":514.7613854726156,"index":67,"markdown_text":"I learned a lot from just browsing through them and reading a few carefully.","paragraph_end":false,"start":508.96467450459807,"text":"I learned a lot from just browsing through them and reading a few carefully."},{"end":526.8044026692709,"index":68,"markdown_text":"Frank Halasz's paper is especially recommended, in terms of stating problem areas and an agenda for future problems we ought to be tackling.","paragraph_end":true,"start":514.7613854726156,"text":"Frank Halasz's paper is especially recommended, in terms of stating problem areas and an agenda for future problems we ought to be tackling."},{"end":547.4883511861166,"index":69,"markdown_text":"So, while hypertext is not in the humanities computing books yet, which means that humanities scholars by and large do not yet know it exists, it will come through the HyperCard phenomenon, through the proceedings of this workshop, and the networking that this workshop will engender.","paragraph_end":false,"start":526.8044026692709,"text":"So, while hypertext is not in the humanities computing books yet, which means that humanities scholars by and large do not yet know it exists, it will come through the HyperCard phenomenon, through the proceedings of this workshop, and the networking that this workshop will engender."},{"end":556.5333333333334,"index":70,"markdown_text":"So my summary is that no, the millennium has not arrived yet, but we are about to go over the knee.","paragraph_end":true,"start":547.4883511861166,"text":"So my summary is that no, the millennium has not arrived yet, but we are about to go over the knee."},{"end":560.5571973641714,"index":71,"markdown_text":"Next, let's ask what is different about hypertext?","paragraph_end":false,"start":556.5333333333334,"text":"Next, let's ask what is different about hypertext?"},{"end":563.0395810921988,"index":72,"markdown_text":"Is there really anything new to it?","paragraph_end":false,"start":560.5571973641714,"text":"Is there really anything new to it?"},{"end":569.6759538968405,"index":73,"markdown_text":"You can trivialize it and say, \"Nothing new, we've had network databases all our lives, what's the big deal?\"","paragraph_end":false,"start":563.0395810921988,"text":"You can trivialize it and say, \"Nothing new, we've had network databases all our lives, what's the big deal?\""},{"end":573.8799910863241,"index":74,"markdown_text":"Or you can hype it and say that it is an intellectual breakthrough.","paragraph_end":false,"start":569.6759538968405,"text":"Or you can hype it and say that it is an intellectual breakthrough."},{"end":583.4091410954794,"index":75,"markdown_text":"Or you can simply say there are lots of interesting ideas, but there is also a lot of hard work to do to make it really happen on a broad scale.","paragraph_end":false,"start":573.8799910863241,"text":"Or you can simply say there are lots of interesting ideas, but there is also a lot of hard work to do to make it really happen on a broad scale."},{"end":593.3333333333334,"index":76,"markdown_text":"Hypertext is basically clay, and we have to mold it; that is what this workshop is all about: starting to mold that clay.","paragraph_end":true,"start":583.4091410954794,"text":"Hypertext is basically clay, and we have to mold it; that is what this workshop is all about: starting to mold that clay."},{"end":603.0771931012472,"index":77,"markdown_text":"Why did it take so long to have this workshop, to have HyperCard, when the technology certainly has been out there and there have been a lot of proof-of-concept demonstrations?","paragraph_end":false,"start":593.3333333333334,"text":"Why did it take so long to have this workshop, to have HyperCard, when the technology certainly has been out there and there have been a lot of proof-of-concept demonstrations?"},{"end":606.5821789105734,"index":78,"markdown_text":"Well, the first reason is the classical inertia problem.","paragraph_end":false,"start":603.0771931012472,"text":"Well, the first reason is the classical inertia problem."},{"end":611.2087596257528,"index":79,"markdown_text":"Why did it take twenty years for Doug Engelbart's mouse to be commercialized?","paragraph_end":false,"start":606.5821789105734,"text":"Why did it take twenty years for Doug Engelbart's mouse to be commercialized?"},{"end":615.5649560292562,"index":80,"markdown_text":"One reason is there is tremendous inertia in this so-called progressive field.","paragraph_end":false,"start":611.2087596257528,"text":"One reason is there is tremendous inertia in this so-called progressive field."},{"end":618.6293147404989,"index":81,"markdown_text":"New ideas take forever to be popularized.","paragraph_end":false,"start":615.5649560292562,"text":"New ideas take forever to be popularized."},{"end":621.8138449986776,"index":82,"markdown_text":"The second reason is, of course, that there are technology problems.","paragraph_end":false,"start":618.6293147404989,"text":"The second reason is, of course, that there are technology problems."},{"end":631.7880318959554,"index":83,"markdown_text":"It takes a long time to develop something as cheap and as user-friendly as the Macintosh, for example, and to displace the idiosyncratic interfaces we have all created and been forced to live with.","paragraph_end":false,"start":621.8138449986776,"text":"It takes a long time to develop something as cheap and as user-friendly as the Macintosh, for example, and to displace the idiosyncratic interfaces we have all created and been forced to live with."},{"end":637.2,"index":84,"markdown_text":"Now the technology is definitely here, and there is certainly no excuse for waiting any longer.","paragraph_end":true,"start":631.7880318959554,"text":"Now the technology is definitely here, and there is certainly no excuse for waiting any longer."},{"end":643.7489814281464,"index":85,"markdown_text":"Next I'm going to give you my own personal view of some hypertext chronology at Brown University and then do some wrapping up.","paragraph_end":false,"start":637.2,"text":"Next I'm going to give you my own personal view of some hypertext chronology at Brown University and then do some wrapping up."},{"end":654.2233459472657,"index":86,"markdown_text":"I ran into Ted Nelson completely by accident at the 1967 Spring Joint Computer Conference, and gossiped with him about what we had both been doing since we left Swarthmore College.","paragraph_end":false,"start":643.7489814281464,"text":"I ran into Ted Nelson completely by accident at the 1967 Spring Joint Computer Conference, and gossiped with him about what we had both been doing since we left Swarthmore College."},{"end":663.4459945678711,"index":87,"markdown_text":"He told me about his ideas on hypertext, and one thing led to another and Ted started coming to Providence, using, as he is proud to say in Computer Lib, his own money.","paragraph_end":false,"start":654.2233459472657,"text":"He told me about his ideas on hypertext, and one thing led to another and Ted started coming to Providence, using, as he is proud to say in Computer Lib, his own money."},{"end":668.1824905395508,"index":88,"markdown_text":"We started working on the Hypertext Editing System, which was essentially dual-purpose.","paragraph_end":false,"start":663.4459945678711,"text":"We started working on the Hypertext Editing System, which was essentially dual-purpose."},{"end":678.777018737793,"index":89,"markdown_text":"One purpose was to produce printed documents nicely and efficiently, since at that time the technology on IBM/360 systems was batch cards for editing (mag card selectrics were not yet common).","paragraph_end":false,"start":668.1824905395508,"text":"One purpose was to produce printed documents nicely and efficiently, since at that time the technology on IBM/360 systems was batch cards for editing (mag card selectrics were not yet common)."},{"end":682.6666666666667,"index":90,"markdown_text":"But the main purpose was to explore this hypertext concept.","paragraph_end":true,"start":678.777018737793,"text":"But the main purpose was to explore this hypertext concept."},{"end":687.2713362375896,"index":91,"markdown_text":"I want to mention a couple of numbers, just so that you can size the system.","paragraph_end":false,"start":682.6666666666667,"text":"I want to mention a couple of numbers, just so that you can size the system."},{"end":701.3856493632,"index":92,"markdown_text":"We ran our 2250 graphics display application in a 128K partition of a multiprogrammed operating system, on an IBM/360 Model 50 with 512K of memory, our mainframe at that time.","paragraph_end":false,"start":687.2713362375896,"text":"We ran our 2250 graphics display application in a 128K partition of a multiprogrammed operating system, on an IBM/360 Model 50 with 512K of memory, our mainframe at that time."},{"end":706.6109482447307,"index":93,"markdown_text":"An IBM/360 Model 50 is slower than a vanilla Mac and has less memory.","paragraph_end":false,"start":701.3856493632,"text":"An IBM/360 Model 50 is slower than a vanilla Mac and has less memory."},{"end":713.8182570139568,"index":94,"markdown_text":"Yet in that one partition we ran the Hypertext Editing System, and there was a complete timesharing system in another partition.","paragraph_end":false,"start":706.6109482447307,"text":"Yet in that one partition we ran the Hypertext Editing System, and there was a complete timesharing system in another partition."},{"end":721.7062555948894,"index":95,"markdown_text":"There was no virtual memory, everything was done with System as a bootleg graphics project were paid by my IBM graphics contract.","paragraph_end":false,"start":713.8182570139568,"text":"There was no virtual memory, everything was done with System as a bootleg graphics project were paid by my IBM graphics contract."},{"end":730.8355147043865,"index":96,"markdown_text":"When our project monitor, Sam Matsa, saw it, he liked it, so we came out of the closet and started showing it around at a variety of sites where IBM had large customers.","paragraph_end":false,"start":721.7062555948894,"text":"When our project monitor, Sam Matsa, saw it, he liked it, so we came out of the closet and started showing it around at a variety of sites where IBM had large customers."},{"end":734.1488730112712,"index":97,"markdown_text":"It was also ported to a number of university sites.","paragraph_end":false,"start":730.8355147043865,"text":"It was also ported to a number of university sites."},{"end":750.4000000000001,"index":98,"markdown_text":"Even after the project was frozen and we went on to the next-generation system, it was sold by IBM (unbeknownst to me and Ted and others who had worked on it) to the Apollo mission team at the Houston Manned Spacecraft Center and used to produce documentation that went up with Apollo, I'm proud to say.","paragraph_end":true,"start":734.1488730112712,"text":"Even after the project was frozen and we went on to the next-generation system, it was sold by IBM (unbeknownst to me and Ted and others who had worked on it) to the Apollo mission team at the Houston Manned Spacecraft Center and used to produce documentation that went up with Apollo, I'm proud to say."},{"end":753.4536798238755,"index":99,"markdown_text":"Here are some technical features of that early system.","paragraph_end":false,"start":750.4000000000001,"text":"Here are some technical features of that early system."},{"end":762.1641768455506,"index":100,"markdown_text":"It had arbitrary-length strings rather than fixed-length lines or statements, and edits with arbitrary-length scope, for example for insert, delete, move and copy.","paragraph_end":false,"start":753.4536798238755,"text":"It had arbitrary-length strings rather than fixed-length lines or statements, and edits with arbitrary-length scope, for example for insert, delete, move and copy."},{"end":765.8886646270753,"index":101,"markdown_text":"It had unidirectional branches automatically arranged in menus.","paragraph_end":false,"start":762.1641768455506,"text":"It had unidirectional branches automatically arranged in menus."},{"end":771.8057950973512,"index":102,"markdown_text":"It had splices that were branches invisible to on-line users that allowed the printer to go through a branching text.","paragraph_end":false,"start":765.8886646270753,"text":"It had splices that were branches invisible to on-line users that allowed the printer to go through a branching text."},{"end":773.5979541778565,"index":103,"markdown_text":"It had text instances.","paragraph_end":false,"start":771.8057950973512,"text":"It had text instances."},{"end":777.4125513076783,"index":104,"markdown_text":"Some of the papers here discuss the differences between inclusion and reference.","paragraph_end":false,"start":773.5979541778565,"text":"Some of the papers here discuss the differences between inclusion and reference."},{"end":786.563579940796,"index":105,"markdown_text":"Instances are references, so that if you changed, for example, a piece of legal boilerplate that was referenced in multiple places, the change would show up in all the places that referenced it.","paragraph_end":false,"start":777.4125513076783,"text":"Instances are references, so that if you changed, for example, a piece of legal boilerplate that was referenced in multiple places, the change would show up in all the places that referenced it."},{"end":790.9333333333334,"index":106,"markdown_text":"Instances are a standard idea from computer graphics-no big deal.","paragraph_end":true,"start":786.563579940796,"text":"Instances are a standard idea from computer graphics-no big deal."},{"end":795.7590905984243,"index":107,"markdown_text":"Our data structure was a pointer-rich data structure on arbitrary-length pages.","paragraph_end":false,"start":790.9333333333334,"text":"Our data structure was a pointer-rich data structure on arbitrary-length pages."},{"end":800.6148838361105,"index":108,"markdown_text":"Edits were done by pointer manipulation, not, in general, by character manipulation.","paragraph_end":false,"start":795.7590905984243,"text":"Edits were done by pointer manipulation, not, in general, by character manipulation."},{"end":808.6744994481405,"index":109,"markdown_text":"This technique was, in effect, a precursor of the piece-table technique, where you work with pointers to text rather than the raw text itself.","paragraph_end":false,"start":800.6148838361105,"text":"This technique was, in effect, a precursor of the piece-table technique, where you work with pointers to text rather than the raw text itself."},{"end":815.2423352559408,"index":110,"markdown_text":"We did software paging of arbitrary-length pages in this 128K partition, and that turned out to be too complex.","paragraph_end":false,"start":808.6744994481405,"text":"We did software paging of arbitrary-length pages in this 128K partition, and that turned out to be too complex."},{"end":820.1682128270468,"index":111,"markdown_text":"Page-replacement algorithms when the slots have variable size are just not very manageable.","paragraph_end":false,"start":815.2423352559408,"text":"Page-replacement algorithms when the slots have variable size are just not very manageable."},{"end":825.7048177083334,"index":112,"markdown_text":"We used Text/360, which was a batch formatter rather like MlT's Runoff, to produce hard copy.","paragraph_end":false,"start":820.1682128270468,"text":"We used Text/360, which was a batch formatter rather like MlT's Runoff, to produce hard copy."},{"end":831.8666666666667,"index":113,"markdown_text":"And so we could fulfill both of our objectives, producing hard-copy documents and fooling around with hypertext.","paragraph_end":true,"start":825.7048177083334,"text":"And so we could fulfill both of our objectives, producing hard-copy documents and fooling around with hypertext."},{"end":836.0202346960704,"index":114,"markdown_text":"Let me tell you a little bit about the fooling around with hypertext.","paragraph_end":false,"start":831.8666666666667,"text":"Let me tell you a little bit about the fooling around with hypertext."},{"end":842.5258234659831,"index":115,"markdown_text":"Ted's schematic of his hypertext of patents had a kind of hierarchical structure and then cross-references.","paragraph_end":false,"start":836.0202346960704,"text":"Ted's schematic of his hypertext of patents had a kind of hierarchical structure and then cross-references."},{"end":855.5169838587443,"index":116,"markdown_text":"These implemented the cross-references in the patents, and we also had various forms of indices; the real diagram was about the size of a large blueprint, as I remember, and hard to navigate on paper and on-line.","paragraph_end":false,"start":842.5258234659831,"text":"These implemented the cross-references in the patents, and we also had various forms of indices; the real diagram was about the size of a large blueprint, as I remember, and hard to navigate on paper and on-line."},{"end":866.3863199869792,"index":117,"markdown_text":"We had already come to the point where Ted, who designed it, was able to go through the hypertext pretty well, but some of the rest of us had difficulty following it-it was not exactly obvious where you were.","paragraph_end":false,"start":855.5169838587443,"text":"We had already come to the point where Ted, who designed it, was able to go through the hypertext pretty well, but some of the rest of us had difficulty following it-it was not exactly obvious where you were."},{"end":876.2347811381022,"index":118,"markdown_text":"This, of course, is the classical lost-in hyperspace problem, which has been mentioned by one and all; I won't elaborate on it here because it is amply discussed in the Proceedings.","paragraph_end":false,"start":866.3863199869792,"text":"This, of course, is the classical lost-in hyperspace problem, which has been mentioned by one and all; I won't elaborate on it here because it is amply discussed in the Proceedings."},{"end":881.8996466318766,"index":119,"markdown_text":"We already started getting the notion that the richer the hypertext, the greater the navigational problem.","paragraph_end":false,"start":876.2347811381022,"text":"We already started getting the notion that the richer the hypertext, the greater the navigational problem."},{"end":888.4,"index":120,"markdown_text":"But we arranged careful demos in which we knew exactly where we had to go, and people were impressed.","paragraph_end":true,"start":881.8996466318766,"text":"But we arranged careful demos in which we knew exactly where we had to go, and people were impressed."},{"end":897.5185045242309,"index":121,"markdown_text":"In early 1968 we made the rounds of a number of large customers for IBM equipment, for example, The New York Times and Time/Life.","paragraph_end":false,"start":888.4,"text":"In early 1968 we made the rounds of a number of large customers for IBM equipment, for example, The New York Times and Time/Life."},{"end":902.3830417633056,"index":122,"markdown_text":"And we found that our system was essentially too complex for them to understand.","paragraph_end":false,"start":897.5185045242309,"text":"And we found that our system was essentially too complex for them to understand."},{"end":908.2585214614868,"index":123,"markdown_text":"Remember that these people were producing magazines and newspapers and other forms of printed material.","paragraph_end":false,"start":902.3830417633056,"text":"Remember that these people were producing magazines and newspapers and other forms of printed material."},{"end":914.67450466156,"index":124,"markdown_text":"At most they had typographic programs that set type and maybe some software that did display ad management.","paragraph_end":false,"start":908.2585214614868,"text":"At most they had typographic programs that set type and maybe some software that did display ad management."},{"end":924.9641021728515,"index":125,"markdown_text":"But the idea of sitting on-line behind a tube and actually authoring and editing and rearranging and cross-referencing really was more than they were willing to believe you needed to do or should do.","paragraph_end":false,"start":914.67450466156,"text":"But the idea of sitting on-line behind a tube and actually authoring and editing and rearranging and cross-referencing really was more than they were willing to believe you needed to do or should do."},{"end":926.805818939209,"index":126,"markdown_text":"It was \"very interesting.\"","paragraph_end":false,"start":924.9641021728515,"text":"It was \"very interesting.\""},{"end":940.5333333333333,"index":127,"markdown_text":"It was futury and researchy, and I remember this particular demo we did at Time/Life when our audience said, \"That's great, but it will take us at least 10 years before people will be willing to sit down behind tubes and do anything on-line.\"","paragraph_end":true,"start":926.805818939209,"text":"It was futury and researchy, and I remember this particular demo we did at Time/Life when our audience said, \"That's great, but it will take us at least 10 years before people will be willing to sit down behind tubes and do anything on-line.\""},{"end":962.2010321935018,"index":128,"markdown_text":"Fortunately, they were wrong, and by the mid 1970s such places as Newsday on Long Island had bought precursors of the ATEX text-editing systems, and, much sooner than anyone would have predicted, this very conservative field of newspaper and magazine publishing switched over to editing on-line.","paragraph_end":false,"start":940.5333333333333,"text":"Fortunately, they were wrong, and by the mid 1970s such places as Newsday on Long Island had bought precursors of the ATEX text-editing systems, and, much sooner than anyone would have predicted, this very conservative field of newspaper and magazine publishing switched over to editing on-line."},{"end":975.4666666666666,"index":129,"markdown_text":"All those people who sat down and typed with two fingers did in fact learn to organize their thoughts on-line on a VDT, despite dire predictions that they never would.","paragraph_end":true,"start":962.2010321935018,"text":"All those people who sat down and typed with two fingers did in fact learn to organize their thoughts on-line on a VDT, despite dire predictions that they never would."},{"end":983.1051759401956,"index":130,"markdown_text":"The other thing I learned was something about the art of giving demos: use progressive disclosure, don't show it to them all at once.","paragraph_end":false,"start":975.4666666666666,"text":"The other thing I learned was something about the art of giving demos: use progressive disclosure, don't show it to them all at once."},{"end":994.6180014292398,"index":131,"markdown_text":"We used a standard 32-key IBM function keyboard, used in every computer-aided design installation in the world, and all the engineers were perfectly used to it, loved it, had no problems with it.","paragraph_end":false,"start":983.1051759401956,"text":"We used a standard 32-key IBM function keyboard, used in every computer-aided design installation in the world, and all the engineers were perfectly used to it, loved it, had no problems with it."},{"end":1006.5212616602579,"index":132,"markdown_text":"But when we gave demos to people whose business was words, not engineering designs, they would freak out- they couldn't handle all those editing buttons, one of which brought in another overlay of 32 formatting functions.","paragraph_end":false,"start":994.6180014292398,"text":"But when we gave demos to people whose business was words, not engineering designs, they would freak out- they couldn't handle all those editing buttons, one of which brought in another overlay of 32 formatting functions."},{"end":1015.681466547648,"index":133,"markdown_text":"So I learned very early to make a plastic overlay which I essentially used to cover up all but five of the editing buttons: insert, delete, move, copy and jump.","paragraph_end":false,"start":1006.5212616602579,"text":"So I learned very early to make a plastic overlay which I essentially used to cover up all but five of the editing buttons: insert, delete, move, copy and jump."},{"end":1023.2198633829752,"index":134,"markdown_text":"Then we would do an entire demo for half an hour or so with that, let people play, and then we would say, \"But wait, there's more . . . \".","paragraph_end":false,"start":1015.681466547648,"text":"Then we would do an entire demo for half an hour or so with that, let people play, and then we would say, \"But wait, there's more . . . \"."},{"end":1029.3266653696696,"index":135,"markdown_text":"And then we would play peek-a-boo, strip off the first overlay and, lo and behold, there was another row of function keys.","paragraph_end":false,"start":1023.2198633829752,"text":"And then we would play peek-a-boo, strip off the first overlay and, lo and behold, there was another row of function keys."},{"end":1037.2,"index":136,"markdown_text":"And so by doing progressive disclosure with a sequence of increasingly revealing overlays we managed not to swamp and panic people.","paragraph_end":true,"start":1029.3266653696696,"text":"And so by doing progressive disclosure with a sequence of increasingly revealing overlays we managed not to swamp and panic people."},{"end":1041.5538794517518,"index":137,"markdown_text":"The last lesson learned during that period: real estate, screen real estate.","paragraph_end":false,"start":1037.2,"text":"The last lesson learned during that period: real estate, screen real estate."},{"end":1056.0067569732666,"index":138,"markdown_text":"We saw that people would sit behind a 2250 Mod 4 display with software character generation, where they could put up teeny tiny 8- or 10-point text with the screen flickering wildly-three, four frames a second, sometimes two.","paragraph_end":false,"start":1041.5538794517518,"text":"We saw that people would sit behind a 2250 Mod 4 display with software character generation, where they could put up teeny tiny 8- or 10-point text with the screen flickering wildly-three, four frames a second, sometimes two."},{"end":1063.4333745956421,"index":139,"markdown_text":"And they would prefer that to a smaller screen or larger, steadier characters, simply because context is so extremely important.","paragraph_end":false,"start":1056.0067569732666,"text":"And they would prefer that to a smaller screen or larger, steadier characters, simply because context is so extremely important."},{"end":1073.1220066070557,"index":140,"markdown_text":"It drives me wild to sit behind a small-screen Mac and be restricted to this little 3\" x 5\" card image, not even able to scroll around on a drawing to get more of a view.","paragraph_end":false,"start":1063.4333745956421,"text":"It drives me wild to sit behind a small-screen Mac and be restricted to this little 3\" x 5\" card image, not even able to scroll around on a drawing to get more of a view."},{"end":1081.6295883178711,"index":141,"markdown_text":"We have to deal with this problem of getting more screen real estate so that it feels like something we normally work with, even something as limited as 8 1/2\" x 11\".","paragraph_end":false,"start":1073.1220066070557,"text":"We have to deal with this problem of getting more screen real estate so that it feels like something we normally work with, even something as limited as 8 1/2\" x 11\"."},{"end":1089.4265357971192,"index":142,"markdown_text":"We have to get bigger displays, and we must have easier ways of moving around on the displays we do have, because these little tiny windows just drive you crazy.","paragraph_end":false,"start":1081.6295883178711,"text":"We have to get bigger displays, and we must have easier ways of moving around on the displays we do have, because these little tiny windows just drive you crazy."},{"end":1091.7333333333333,"index":143,"markdown_text":"I'm going to come back to that.","paragraph_end":true,"start":1089.4265357971192,"text":"I'm going to come back to that."},{"end":1104.2396538098653,"index":144,"markdown_text":"In 1968, I finally met Doug Engelbart and experienced his landmark demonstration at the Fall Joint Computer Conference, about as gutsy and risky a demo as I have ever seen.","paragraph_end":false,"start":1091.7333333333333,"text":"In 1968, I finally met Doug Engelbart and experienced his landmark demonstration at the Fall Joint Computer Conference, about as gutsy and risky a demo as I have ever seen."},{"end":1111.9296901067098,"index":145,"markdown_text":"He was doing multiperson collaboration, using all of his tools on-line interactively-it was a tour de force.","paragraph_end":false,"start":1104.2396538098653,"text":"He was doing multiperson collaboration, using all of his tools on-line interactively-it was a tour de force."},{"end":1127.859434636434,"index":146,"markdown_text":"He did outline processing, browsing and jumping around through multiple files with text and graphics, using key words and other view specs to act as viewing filters over his data, using text-searching capabilities, and so on.","paragraph_end":true,"start":1111.9296901067098,"text":"He did outline processing, browsing and jumping around through multiple files with text and graphics, using key words and other view specs to act as viewing filters over his data, using text-searching capabilities, and so on."},{"end":1134.728397878011,"index":147,"markdown_text":"Later that year I went on with my students to design FRESS, a File Retrieval and Editing System.","paragraph_end":false,"start":1127.859434636434,"text":"Later that year I went on with my students to design FRESS, a File Retrieval and Editing System."},{"end":1150.338770421346,"index":148,"markdown_text":"My design goal was to steal or improve on the best ideas from Doug's NLS and put in some things we really liked from the Hypertext Editing System-a more freeform editing style, no limits to statement size, for example.","paragraph_end":false,"start":1134.728397878011,"text":"My design goal was to steal or improve on the best ideas from Doug's NLS and put in some things we really liked from the Hypertext Editing System-a more freeform editing style, no limits to statement size, for example."},{"end":1155.6,"index":149,"markdown_text":"But the intellectual debt is clearly to Doug's NLS.","paragraph_end":true,"start":1150.338770421346,"text":"But the intellectual debt is clearly to Doug's NLS."},{"end":1164.089188671112,"index":150,"markdown_text":"One of the things I worked very hard on was output-input device independence and the idea of a logical device.","paragraph_end":false,"start":1155.6,"text":"One of the things I worked very hard on was output-input device independence and the idea of a logical device."},{"end":1178.6149116516112,"index":151,"markdown_text":"We wanted to get this system to run on anything from teletypewriters, which were very common at that time, up to and including minicomputers with multiple windows on vector displays.","paragraph_end":false,"start":1164.089188671112,"text":"We wanted to get this system to run on anything from teletypewriters, which were very common at that time, up to and including minicomputers with multiple windows on vector displays."},{"end":1190.6570800781249,"index":152,"markdown_text":"We had a 16-Kbyte IMLAC mini with a vector display that was used very extensively-a single one, because that was all we could afford.","paragraph_end":true,"start":1178.6149116516112,"text":"We had a 16-Kbyte IMLAC mini with a vector display that was used very extensively-a single one, because that was all we could afford."},{"end":1199.3064407348631,"index":153,"markdown_text":"So we developed the notion of virtual output and input devices, along the lines of Fortran logical l/O units.","paragraph_end":false,"start":1190.6570800781249,"text":"So we developed the notion of virtual output and input devices, along the lines of Fortran logical l/O units."},{"end":1213.1514266967772,"index":154,"markdown_text":"Virtual input devices were an important part of a graphics subroutine package called GPGS that we designed in 1971 in the Netherlands as part of a three-university consortium.","paragraph_end":false,"start":1199.3064407348631,"text":"Virtual input devices were an important part of a graphics subroutine package called GPGS that we designed in 1971 in the Netherlands as part of a three-university consortium."},{"end":1232.2666666666664,"index":155,"markdown_text":"And that idea went into the CORE, GKS, and PHIGS standard graphics packages and now into PHIGS+, the latest graphics package specified by an ad hoc standards group in 1987, almost two decades later.","paragraph_end":true,"start":1213.1514266967772,"text":"And that idea went into the CORE, GKS, and PHIGS standard graphics packages and now into PHIGS+, the latest graphics package specified by an ad hoc standards group in 1987, almost two decades later."},{"end":1241.1454985300697,"index":156,"markdown_text":"FRESS was of course multiterminal, it supported outline processing, arbitrary-length strings, edits, etc.; it had no size limitations.","paragraph_end":false,"start":1232.2666666666664,"text":"FRESS was of course multiterminal, it supported outline processing, arbitrary-length strings, edits, etc.; it had no size limitations."},{"end":1245.7600891749062,"index":157,"markdown_text":"I really believe in that-I think it is important not to feel yourself constrained.","paragraph_end":false,"start":1241.1454985300697,"text":"I really believe in that-I think it is important not to feel yourself constrained."},{"end":1252.5968897501625,"index":158,"markdown_text":"One of the really important ways in which unconstrained size and scope ought to work is that it should not interfere with performance.","paragraph_end":false,"start":1245.7600891749062,"text":"One of the really important ways in which unconstrained size and scope ought to work is that it should not interfere with performance."},{"end":1262.736976877848,"index":159,"markdown_text":"In FRESS, to a first approximation, you could not tell the difference between working with a two-page printed file and a 200-page printed file because of the software paging scheme we used.","paragraph_end":false,"start":1252.5968897501625,"text":"In FRESS, to a first approximation, you could not tell the difference between working with a two-page printed file and a 200-page printed file because of the software paging scheme we used."},{"end":1272.1963865915932,"index":160,"markdown_text":"And yes, of course, some tables grow with file size, but in general the system was just as peppy with large files as with small files, and I think that is really important for users.","paragraph_end":false,"start":1262.736976877848,"text":"And yes, of course, some tables grow with file size, but in general the system was just as peppy with large files as with small files, and I think that is really important for users."},{"end":1281.1999999999998,"index":161,"markdown_text":"While keeping a lot of small files may be a feature for some people, it's a bug for many others, and the system should not force you into an unnatural usage pattern.","paragraph_end":true,"start":1272.1963865915932,"text":"While keeping a lot of small files may be a feature for some people, it's a bug for many others, and the system should not force you into an unnatural usage pattern."},{"end":1290.0496832847593,"index":162,"markdown_text":"We also went from unidirectional links in Hypertext Editing System to bidirectional links with explainers in FRESS.","paragraph_end":false,"start":1281.1999999999998,"text":"We also went from unidirectional links in Hypertext Editing System to bidirectional links with explainers in FRESS."},{"end":1296.2664858818052,"index":163,"markdown_text":"I think bidirectionality is important: the 'come from' is as important as the 'go to.'","paragraph_end":false,"start":1290.0496832847593,"text":"I think bidirectionality is important: the 'come from' is as important as the 'go to.'"},{"end":1302.3631565093992,"index":164,"markdown_text":"Key words were possible on every element, both for on-line and off-line trails.","paragraph_end":false,"start":1296.2664858818052,"text":"Key words were possible on every element, both for on-line and off-line trails."},{"end":1305.75687046051,"index":165,"markdown_text":"Links could be \"typed\" with these key words.","paragraph_end":false,"start":1302.3631565093992,"text":"Links could be \"typed\" with these key words."},{"end":1320.0124694824217,"index":166,"markdown_text":"We also experimented with protection down to the character level, and every single one of a hundred-odd functions could have a bit in a mask that said whether you could perform that function on this block of text or not.","paragraph_end":false,"start":1305.75687046051,"text":"We also experimented with protection down to the character level, and every single one of a hundred-odd functions could have a bit in a mask that said whether you could perform that function on this block of text or not."},{"end":1326.3985824584959,"index":167,"markdown_text":"It was overkill, and we haven't done it since, but it certainly was interesting.","paragraph_end":true,"start":1320.0124694824217,"text":"It was overkill, and we haven't done it since, but it certainly was interesting."},{"end":1337.00018119812,"index":168,"markdown_text":"We had an ability to see the structure space, a visualization of all the structure in the text, the outline structure and the cross-reference structure.","paragraph_end":false,"start":1326.3985824584959,"text":"We had an ability to see the structure space, a visualization of all the structure in the text, the outline structure and the cross-reference structure."},{"end":1347.0411682128904,"index":169,"markdown_text":"You could do structural rearrangements in that structure space in a quick overview mode and you would thereby induce those same edits in the text itself.","paragraph_end":false,"start":1337.00018119812,"text":"You could do structural rearrangements in that structure space in a quick overview mode and you would thereby induce those same edits in the text itself."},{"end":1352.3469734191892,"index":170,"markdown_text":"And of course edits made in the text would also appear in the structure space.","paragraph_end":false,"start":1347.0411682128904,"text":"And of course edits made in the text would also appear in the structure space."},{"end":1357.0666666666664,"index":171,"markdown_text":"That duality was a very useful and popular feature.","paragraph_end":true,"start":1352.3469734191892,"text":"That duality was a very useful and popular feature."},{"end":1361.1412664095558,"index":172,"markdown_text":"The most popular feature, however, was undo.","paragraph_end":false,"start":1357.0666666666664,"text":"The most popular feature, however, was undo."},{"end":1366.6975384394325,"index":173,"markdown_text":"I will claim that, to the best of my knowledge, FRESS was the first system to have an undo.","paragraph_end":false,"start":1361.1412664095558,"text":"I will claim that, to the best of my knowledge, FRESS was the first system to have an undo."},{"end":1374.4162521998085,"index":174,"markdown_text":"We saved every edit in a shadow version of the data structure, and that allowed us to do both an autosave and an undo.","paragraph_end":false,"start":1366.6975384394325,"text":"We saved every edit in a shadow version of the data structure, and that allowed us to do both an autosave and an undo."},{"end":1381.5643215815223,"index":175,"markdown_text":"I think the most important feature in any system built today has to be indefinite undo and redo.","paragraph_end":false,"start":1374.4162521998085,"text":"I think the most important feature in any system built today has to be indefinite undo and redo."},{"end":1387.77132803599,"index":176,"markdown_text":"One level is better than zero, but not enough, and wholly inadequate for serious work.","paragraph_end":false,"start":1381.5643215815223,"text":"One level is better than zero, but not enough, and wholly inadequate for serious work."},{"end":1397.0108545939124,"index":177,"markdown_text":"It doesn't matter how it's done, whether it's journaling, transcripting done with inverses, whatever, but you've got to have it.","paragraph_end":true,"start":1387.77132803599,"text":"It doesn't matter how it's done, whether it's journaling, transcripting done with inverses, whatever, but you've got to have it."},{"end":1403.3680323282874,"index":178,"markdown_text":"We had escapes to the command shell, so that you could do some useful work outside the system.","paragraph_end":false,"start":1397.0108545939124,"text":"We had escapes to the command shell, so that you could do some useful work outside the system."},{"end":1418.7999999999997,"index":179,"markdown_text":"That is another theme I want to return to: whether you should have a self-contained, self-sufficient hyperuniverse or should be able to go outside and do things you need to do that it does not (and should not) provide.","paragraph_end":true,"start":1403.3680323282874,"text":"That is another theme I want to return to: whether you should have a self-contained, self-sufficient hyperuniverse or should be able to go outside and do things you need to do that it does not (and should not) provide."},{"end":1427.6894090652463,"index":180,"markdown_text":"I want to tell you a little about the sociopolitical climate then, because these really are the barefoot-in-the-snow stories that most of you, fortunately, have never been exposed to.","paragraph_end":false,"start":1418.7999999999997,"text":"I want to tell you a little about the sociopolitical climate then, because these really are the barefoot-in-the-snow stories that most of you, fortunately, have never been exposed to."},{"end":1435.3074720382688,"index":181,"markdown_text":"When we were doing this work at Brown University, nobody said \"Hey, it's great you're building tools for humanists, that's wonderful, when can we have it?\"","paragraph_end":false,"start":1427.6894090652463,"text":"When we were doing this work at Brown University, nobody said \"Hey, it's great you're building tools for humanists, that's wonderful, when can we have it?\""},{"end":1436.9291885375974,"index":182,"markdown_text":"In fact, quite the reverse.","paragraph_end":false,"start":1435.3074720382688,"text":"In fact, quite the reverse."},{"end":1439.4318378448484,"index":183,"markdown_text":"Those were the days of accounting on mainframes.","paragraph_end":false,"start":1436.9291885375974,"text":"Those were the days of accounting on mainframes."},{"end":1444.8976219177243,"index":184,"markdown_text":"You got a certain amount of 'funny money' allocated every year and you had to make it last, and if you ran out, tough.","paragraph_end":false,"start":1439.4318378448484,"text":"You got a certain amount of 'funny money' allocated every year and you had to make it last, and if you ran out, tough."},{"end":1447.6004827499387,"index":185,"markdown_text":"Maybe you could argue for a little more and maybe you couldn't.","paragraph_end":false,"start":1444.8976219177243,"text":"Maybe you could argue for a little more and maybe you couldn't."},{"end":1454.0973594665525,"index":186,"markdown_text":"So it was extremely important to make our system efficient so that people could afford to use it on their funny-money budget.","paragraph_end":false,"start":1447.6004827499387,"text":"So it was extremely important to make our system efficient so that people could afford to use it on their funny-money budget."},{"end":1463.517330932617,"index":187,"markdown_text":"I had serious warfare with the vice president in charge of computing about whether the software should even be allowed on the system, because if it were on the system, then people would use it.","paragraph_end":false,"start":1454.0973594665525,"text":"I had serious warfare with the vice president in charge of computing about whether the software should even be allowed on the system, because if it were on the system, then people would use it."},{"end":1469.083222198486,"index":188,"markdown_text":"And that would subvert the true purpose of computers, which was to produce numbers for engineers and scientists.","paragraph_end":false,"start":1463.517330932617,"text":"And that would subvert the true purpose of computers, which was to produce numbers for engineers and scientists."},{"end":1473.067436981201,"index":189,"markdown_text":"He said, literally, \"If you want to screw around with text, use a typewriter.\"","paragraph_end":false,"start":1469.083222198486,"text":"He said, literally, \"If you want to screw around with text, use a typewriter.\""},{"end":1483.7333333333331,"index":190,"markdown_text":"I essentially had to blackmail him by saying
