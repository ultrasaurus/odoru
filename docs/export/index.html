they could put up teeny tiny 8- or 10-point text with the screen flickering wildly-three, four frames a second, sometimes two. And they would prefer that to a smaller screen or larger, steadier characters, simply because context is so extremely important. It drives me wild to sit behind a small-screen Mac and be restricted to this little 3\" x 5\" card image, not even able to scroll around on a drawing to get more of a view. We have to deal with this problem of getting more screen real estate so that it feels like something we normally work with, even something as limited as 8 1/2\" x 11\". We have to get bigger displays, and we must have easier ways of moving around on the displays we do have, because these little tiny windows just drive you crazy. I'm going to come back to that.\n\nIn 1968, I finally met Doug Engelbart and experienced his landmark demonstration at the Fall Joint Computer Conference, about as gutsy and risky a demo as I have ever seen. He was doing multiperson collaboration, using all of his tools on-line interactively-it was a tour de force. He did outline processing, browsing and jumping around through multiple files with text and graphics, using key words and other view specs to act as viewing filters over his data, using text-searching capabilities, and so on.\n\nLater that year I went on with my students to design FRESS, a File Retrieval and Editing System. My design goal was to steal or improve on the best ideas from Doug's NLS and put in some things we really liked from the Hypertext Editing System-a more freeform editing style, no limits to statement size, for example. But the intellectual debt is clearly to Doug's NLS.\n\nOne of the things I worked very hard on was output-input device independence and the idea of a logical device. We wanted to get this system to run on anything from teletypewriters, which were very common at that time, up to and including minicomputers with multiple windows on vector displays. We had a 16-Kbyte IMLAC mini with a vector display that was used very extensively-a single one, because that was all we could afford.\n\nSo we developed the notion of virtual output and input devices, along the lines of Fortran logical l/O units. Virtual input devices were an important part of a graphics subroutine package called GPGS that we designed in 1971 in the Netherlands as part of a three-university consortium. And that idea went into the CORE, GKS, and PHIGS standard graphics packages and now into PHIGS+, the latest graphics package specified by an ad hoc standards group in 1987, almost two decades later.\n\nFRESS was of course multiterminal, it supported outline processing, arbitrary-length strings, edits, etc.; it had no size limitations. I really believe in that-I think it is important not to feel yourself constrained. One of the really important ways in which unconstrained size and scope ought to work is that it should not interfere with performance. In FRESS, to a first approximation, you could not tell the difference between working with a two-page printed file and a 200-page printed file because of the software paging scheme we used. And yes, of course, some tables grow with file size, but in general the system was just as peppy with large files as with small files, and I think that is really important for users. While keeping a lot of small files may be a feature for some people, it's a bug for many others, and the system should not force you into an unnatural usage pattern.\n\nWe also went from unidirectional links in Hypertext Editing System to bidirectional links with explainers in FRESS. I think bidirectionality is important: the 'come from' is as important as the 'go to.' Key words were possible on every element, both for on-line and off-line trails. Links could be \"typed\" with these key words. We also experimented with protection down to the character level, and every single one of a hundred-odd functions could have a bit in a mask that said whether you could perform that function on this block of text or not. It was overkill, and we haven't done it since, but it certainly was interesting.\n\nWe had an ability to see the structure space, a visualization of all the structure in the text, the outline structure and the cross-reference structure. You could do structural rearrangements in that structure space in a quick overview mode and you would thereby induce those same edits in the text itself. And of course edits made in the text would also appear in the structure space. That duality was a very useful and popular feature.\n\nThe most popular feature, however, was undo. I will claim that, to the best of my knowledge, FRESS was the first system to have an undo. We saved every edit in a shadow version of the data structure, and that allowed us to do both an autosave and an undo. I think the most important feature in any system built today has to be indefinite undo and redo. One level is better than zero, but not enough, and wholly inadequate for serious work. It doesn't matter how it's done, whether it's journaling, transcripting done with inverses, whatever, but you've got to have it.\n\nWe had escapes to the command shell, so that you could do some useful work outside the system. That is another theme I want to return to: whether you should have a self-contained, self-sufficient hyperuniverse or should be able to go outside and do things you need to do that it does not (and should not) provide.\n\nI want to tell you a little about the sociopolitical climate then, because these really are the barefoot-in-the-snow stories that most of you, fortunately, have never been exposed to. When we were doing this work at Brown University, nobody said \"Hey, it's great you're building tools for humanists, that's wonderful, when can we have it?\" In fact, quite the reverse. Those were the days of accounting on mainframes. You got a certain amount of 'funny money' allocated every year and you had to make it last, and if you ran out, tough. Maybe you could argue for a little more and maybe you couldn't. So it was extremely important to make our system efficient so that people could afford to use it on their funny-money budget. I had serious warfare with the vice president in charge of computing about whether the software should even be allowed on the system, because if it were on the system, then people would use it. And that would subvert the true purpose of computers, which was to produce numbers for engineers and scientists. He said, literally, \"If you want to screw around with text, use a typewriter.\" I essentially had to blackmail him by saying there would be a revolution by the humanists on campus if they found out how much the engineers and scientists were spending on computing when they couldn't have any.\n\nThese were the best of times, these were the worst of times. They were the best of times in that there were a lot of technology and \"proof of concept\" systems out there. They were the worst of times because we really had to fight to get these ideas recognized as legitimate fields of inquiry and to get real users. In about 1972, I watched Doug do his standard 90-minute pitch with video and live demos to a group of DARPA contractors who were the best and the brightest in the country at that time. And one of the very best people said, basically, \"Doug, I don't see what you're doing there that I can't do on my glass teletype with a good line editor.\" But Doug, fortunately, kept going, we kept going, other people did. And by the mid 1970s we finally got around to doing what I had always wanted to do since Ted first tuned me in to the idea, which was try out this on-line stuff in education.\n\nSo, very briefly, I'll describe two experiments. In one, funded by the Exxon Education Foundation, a physicist and I did a course called Man, Energy and Environment. Students did a lot of reading of hypertext on-line about the subject, but no writing.\n\nThen we did a much more ambitious experiment in the following two years, funded by the National Endowment for the Humanities. For this English poetry course we used a very large hypertext with well over a thousand links. Three times a week students had to sign up for an hour each on our one and only Imlac graphics workstation and do their reading and their commenting on-line, following trails, making trails. We used a kind of progressive disclosure: the first time through they saw the poem they were supposed to critique and analyze, with no references. The second time they saw it with a few links to other poems on the same subject or by the same poet. There would also be some word glosses, some professional analyses, but still not very much context. And they would be reviewing what other students had written on the first pass, and the teacher's and TAs' comments as well, and then they would form a new opinion of what they had read. And then they would do that a third time, when they had yet more access to what people had written communally and what had previously been put in the database. It was very interesting. People loved it, despite the fact the system went down a lot, that it was hard to get at it, that you had to schedule time. And this \"communal text,\" as it was called by the poetry people who wrote about it later, became very rich in additional annotations. Electronic graffiti, as I thought of them.\n\nThe reason I encouraged such annotations was that I remembered that when I was in college with Ted, I would always grab the dirtiest copy of a book in the library, rather than the cleanest one, because the dirtiest ones had the most marginalia, which I found very helpful. It really worked here: on average, students wrote three times as much for both analyses and informal discourse as they did in the control group, and that pleased the faculty who were very much concerned with encouraging oral and written expression. One of the things we found is that people express themselves differently. Some people who were very articulate in a classroom setting were pretty silent once they got behind the tube. And vice versa, so a lot of shy violets really became vocal once they got behind the tube.\n\nWhat we discovered from that experiment is that people could follow trails and enjoyed it. But what we did not see was a lot of people blazing trails. There wasn't enough time, the interface wasn't good enough, response wasn't fast enough-a variety of reasons. So we never really proved a central hypothesis, that people can and will blaze trails, not just follow them. I will make a statement that says, despite the experience with Xerox's NoteCards system, despite whatever other experiences there are out there with programming environment browsers and so on, by and large the hypothesis remains unproven that, with little guidance, people can construct really good trails, really good webs that help them and help other readers. I think we still need to test that hypothesis in a major way.\n\nThe next thing we did after FRESS was put to bed in the late 1970s was to make a rather different hypertext system, our third by that time. What we were interested in then was power tools for producing primarily graphical documents. I want to describe to you very quickly some of the things we did in our electronic document project.\n\nThere were three components to the system. One was a viewer's component in which prepared screen pages could be viewed. Figure 1 shows four iconic buttons, each one a composite of individual images drawn by hand and then, with the help of the authoring component, put together on a screen page and buttonized. This is typical of what a maintenance and repair technician would see as a typical page in the little maintenance and repair Dynabook icon. The other two components were for the author. The first was for making graphics for individual pages or their parts, a MacDraw-MacPaint combination. The component most interesting for this audience, shown in Figure 2, was the hypertext creation component for constructing pages, chapters and links. It was multiwindow, so that a page under construction could occupy either the entire screen or a portion of it. This allowed multiple pages or even chapters to be visible simultaneously so that you could create links from one to another. The whole interface is manipulated directly: there's almost no typing and lots of pointing at objects and manipulating them. This was back in 1979 when that was not so common.\n\nWe spent a lot of time figuring out how to elide, that is, hide, information graphically. We had a 'detail button' that let us view things at varying levels of detail. So the author could move these windows around, look at pages and chapters at arbitrary levels of detail, iconically create various kinds of buttons and specify actions to take place when the reader invoked a button. Such actions could include animation and taking a link to another page. The model for this hypertext is more a finite-state automaton in which transitions take you from one mode to the other rather than of a static hypertext with static links. In particular, using a keywording facility, you could cause different parts to appear on the same page as a function of the keywords encountered during traversal. So on two successive accesses a page might look quite different through hiding information or showing new buttons.\n\nThe system had three automatically created navigation aids. First, it had a time line, as shown in Figure 3, that you could use to travel back in time, consisting of buttons of miniature page icons stamped with time and date, with color coding keying you to chapters. This is little bit like the 'recent page' in HyperCard, but here we are time traveling: we are not just going back to an image, we are going back to the state that accompanied our view of that image, because a page, as you remember, can change over time. Another was the 'neighbors' display: the current page is displayed in context with (on the left) a filmstrip of all the places you could have come from, and (on the right) all the places you could go to, and again you can pick any of these miniatures and go there directly. In general, this could be an arbitrarily complicated display with dozens of sources and destinations; then you use iconic scroll bars to move over these filmstrips. The third navigation aid was a visual index of buttons of page miniatures arranged by key words, color-coded by chapter.\n\nWe learned some new lessons from this third system. It had great power tools for the author, but it still involved a tremendous amount of hand work. What you really would like in making fairly regular documents, like maintenance and repair manuals, is to drive the creation of the pictorial or textual, audio, video, etc., explanations directly from deep knowledge about the problem domain, the particular problem to be solved, the design rules for creating explanations in the various media, and the user of the manual. You want, in effect, to produce an automated authoring capability in which most of these things can be driven from these knowledge bases. Steve Feiner's Ph.D. dissertation and his work since then describes such automated authoring.\n\nThe next system I would like to mention briefly is not a hypertext system, but it formed our thinking about ingredients at the nodes of a hypertext. This is the BALSA (Brown ALgorithm Simulator and Animator) environment, created in 1983 by Bob Sedgewick, who is now chairman of computer science at Princeton University, and Marc Brown, who last year received an ACM distinguished dissertation award for this work. In the course of a lecture we use BALSA on a network of workstations in the classroom to look at dynamic visualizations of programs implementing algorithms and data structures. If a picture is worth a thousand words, a dynamic picture of time-varying objects is worth a thousand static ones. We need dynamics at the nodes, not just static pictures and text. Something one learns quickly about user-controlled real-time animation is that hardware power is really essential. If it takes 10 seconds to put up the next picture because that's how long the hardware needs, you do not have kinesthetic feedback, you do not have smoothness and visual continuity, it is not responsive. It makes a great demo, but it drives you crazy in real life.\n\nWe have been using electronically assisted teaching now for five years and our new building contains two workstation auditoriums. BALSA has been integrated into a variety of courses in computer science and math, as well as in neural science and even political science. These experiences led to Brown's wholesale commitment to workstations and in fact to the creation in 1983 of IRIS, our Institute for Research on Information and Scholarship. IRIS not only creates scholars' workstation software but also has a completely symmetrical program evaluation branch where social scientists with an interest in this area study needs, requirements and impact of this technology on scholarly work. And by the way, 'scholarly work' to us is not just the work of faculty members but also that of students-we're all scholars on this bus.\n\nWe set up IRIS at a time when there was a lot of enthusiasm in front-running universities for buying into the workstation revolution, looking at the Xerox PARC model of distributed computation and saying, \"We want to deliver tools that really take advantage of the expressive power of such workstations.\" So IRIS and other organizations on other campuses were created to develop scholarly tools. I think, though, that there is still a paucity of such scholarly tools and we are at the very beginning of understanding what they might be.\n\nI'm going to sum up what I think are some key areas we all ought to be looking at. Here are nine quick items. My first concern is that systems may develop great infrastructure, great hypertext glue, but what's at the nodes? As with the 2D animation in BALSA, I think we should be aiming at user-controlled 3D animation, where the interactive user has control over what is being shown, the level of detail, the visualizations employed, and so on. This is just a wide-open area that needs a lot of study, not to mention vast hardware power.\n\nSecond, Ted talks a lot about the docuverse, a mythical entity out there that is all-inclusive and contains everything. But instead, right now we are building docu-islands; none of our systems talk to each other, they are wholly incompatible. So we are all working the same agenda, more or less, but we can't exchange stuff; there is no exchange format, there is no universality, and furthermore, our systems are closed systems. In a sense, they are making the same mistake as the all-in-one environments in personal computing. Yes, they give you a word processor and a spreadsheet editor and a business graphics package, etc., but none of them are really satisfactory. And our experience with FRESS, where we had to escape to command language, showed that it is really important to be able to go outside. So it's not enough to bundle the HyperCard package with every Mac you buy. It really ought to be migrated down, become part of the toolbox, so that application programmers can take their applications and take advantage of a standard linking protocol that works within and between applications.\n\nSo I'm going to raise a red-flag word: standards. I'm a firm believer in standards. And everybody will say it is absolutely premature to standardize when we don't even know what the hell we're talking about. We are still in the experimental phase. I believe that. But if we don't start thinking about standards, five years from now we are going to have a wealth of these little docu-islands which are totally incompatible, and that's crazy.\n\nPoint number three is size. We are still in the toy problem stage. There has not been a decent-sized hypertext built yet. And we won't know what it is like until we deal with the kinds of documentation problems that people in the real world deal with. People have graphed the number of pages of technical manuals for fighter aircraft against time. In World War II, we had 1K page documentation per fighter aircraft; in Korea, 10K; in Vietnam, 100K. It's an exponential curve. The F-16 has 600K pages, and the advanced tactical fighter will probably have somewhere around a million and a half pages of technical documentation. It is, in effect, a giant hypertext that should be linked, and done with change control.\n\nAnd that is my fourth point. We have to do something about versioning and change control in the large. But we won't have a fighting chance to kill paper and become an on-line community until we tackle the kinds of problems that paper solves for us today. Paper is convenient, you can carry it around and versions are easily created and maintained. Hypertext is not as accessible as paper, and it certainly isn't prepared to deal with the size problems as paper does.\n\nThe fifth problem is navigation, lost in hyperspace. Some people say we need content and structure query, we need virtual structures, composites; others say we need pruning. All of this is true. I find the notion of dynamically constructing a hypertext very intriguing, but very difficult to do in general. My point of view is that in a sense hypertext gives us a goto, and a goto, as we all know, produces spaghetti. At most we have invented the if-then-else-if, with hierarchy. That's our one structured flow-of-control concept, where you have some sense of what you are looking at in your hyperdocument. Well, we need to discover what the equivalents of other constructs are. As Ted did at the start, we have to invent other document forms that somehow become standard so that people have pattern recognition and say, \"Ah, yes, I know how that one works.\" So we need new forms, new flow of control kinds of constructs besides just unbridled goto-ness of directed graph structures.\n\nThe other navigation aid we need is a tell-me-what you've-got, which probably entails AI. Instead of just syntax, we need some notion of semantics at the nodes. We need to be able to derive new knowledge from old, using inference engines. Just storing billions and billions of facts that are tied together is not going to do it for us; that will just drown us in associations.\n\nThe sixth point is that we need hypermedia designers. Remember how crazy everybody went when they got the ability to print multiple fonts? We got 'fontitis.' Then people discovered color screens and we got 'coloritis,' without any rules, without any design discipline. Now we've got linkitis,' and people with no graphic design experience or talent are going to throw stuff together and it will look terrible. You all know that one of the interesting things that happened after Gutenberg was typography. For a while after Gutenberg, type designers were using manuscript letterforms. And they were using erasers and paintbrushes to doctor the stuff the typesetting machine had set so it would look more like an old-fashioned manuscript and people would be familiar with it. It took a long while for people to understand that this new medium demanded a new style, a new typography. So typography is an invention, and it is nearly as important as the printing press in the first place. We don't want to mimic the old manuscript form in our hypertexts.\n\nAldus Manutius discovered modern pages. And pages gave us a new way to cross-reference, to talk about content, to index, and that technology took a while, but it made information a great deal more accessible. So we need people who are concerned about layout and design and typography of hypermedia and can think about classification and indexing and how we put things together.\n\nBut we don't want to put things together in such a way that there is one point of view, because if we've learned one thing from interactive tools up to now is that multiview is the way people work. You can not have it just one way. We need an update to Larry Tesler's \"Don't mode me in.\" Jim Foley and I recently came up with \"Don't metaphor me in.\" Don't give me a little card image and say, \"That's all you've got, because that's what I thought you should want for your virtual shoebox.\" There have got to be multiple modalities and the designers have to be able to deal with that. So that was issue number seven: don't metaphor me in, don't give me only one way of looking at things.\n\nPoint eight: accessibility, portability-I want a laptop Dynabook. And I also want wallscreen-size displays. I want my whiteboard-sized hypertext display, and not until it's that big do I think we can really start working with hypertext. Hoker performs the following experiment. Take The Wall Street Journal and move around a little cutout the size of a Mac screen and see how happy you are with The Wall Street Journal, versus looking at a page of it in its entirety and immediately picking up what you might be interested in reading. A very persuasive point.\n\nAnd finally, point number nine: we must think about the sociopolitico-economic problems. We have not come to grips with issues of intellectual property rights and compensation. Congress and the U.S. Patent Office and copyright lawyers and so on do not understand what is involved here and need to be educated. If we shrink away from those issues and leave it to them, there is going to be absolute chaos. Ted, again, has written extensively on this issue and has postulated some interesting mechanisms for coping with the problems.\n\nSo there are essentially three classes of people. There are the visionary hypers who say, not only is the glass not half empty, it's overflowing with opportunities and possibilities and technology push of CD ROMs, 100 megabytes and 100 MIPS on your personal computer in just a few years, and so on. They are saying everything is great and we have a wonderful universe to explore.\n\nThen there are the skeptics who say, not only is the glass not half full, but there was probably never any water in it to begin with. And I'm a third type sitting on the fence somewhere in between these two extremes, saying, I've used a lot of hypertext systems and I think they are neat and show a lot of potential. I think we are just at the very beginning and it's too early to rush to judgment, but it's clear that collectively we have a lot of hard but exciting work to do to make this technology work and to create what has been called the electronic Alexandria.\n\nAuthor's Present Address: Andries van Dam, Brown University, Dept. of Computer Science, 115 Waterman St., Providence, RI 02912.\n\nPermission to copy without fee all or part of this material is granted provided that the copies are not made or distributed for direct commercial advantage, the ACM copyright notice and the title of the publication and its date appear, and notice is given that copying is by permission of the Association for Computing Machinery. To copy otherwise, or to republish, requires a fee and/or specific permission.\n\nCopyright 1996 ACM 1072-5520/96/0300 $3.50\n\nText extracted from the article printed in Communications of the ACM (Vol. 31, No. 7). Printed by permission of ACM."}},"manifest":[{"authors":["Andries van Dam"],"date":"1987-11-13","has_audio":true,"slug":"1987-11-13-hypertext-87-keynote-address","title":"Hypertext '87 Keynote Address"},{"authors":["Christina Engelbart","Doug Engelbart Institute"],"date":"1884-02-27","description":"Visit the Doug Engelbart Institute to explore his remarkable legacy and all it inspires (official site)","has_audio":true,"slug":"1884-02-27-authorship-provisions-in-augment-1984-oad2250","source_url":"https://www.dougengelbart.org/content/view/148/","title":"Authorship Provisions in AUGMENT - 1984 (OAD,2250,)"},{"authors":["Emily Dickenson"],"date":"1891-11-09","has_audio":true,"slug":"1891-11-09-hope-is-the-thing-with-feathers","title":"“Hope” is the thing with feathers"}],"sentence_blocks":{"1884-02-27-authorship-provisions-in-augment-1984-oad2250":[1,9,1,3,3,3,3,1,2,1,1,1,5,4,1,3,2,1,3,1,1,3,2,1,2,3,5,1,2,3,4,3,1,3,1,1,5,3,3,1,3,1,4,4,2,1,1,1,1,1,1,3,1,1,5,4,3,1,2,1,2,1,4,3,3,1,2,1,2,2,5,1,2,3,3,2,1,3,4,4,1,2,2,3,1,1,5,1,3,3,2,2,2,1,3,1,4,3,4,5,2,2,6,4,5,3,6,3,3,3,3,1,3,3,1,3,1,3,2,3,1,4,3,9,6,2,4,1,1,4,6,4,3,4,3,4,3],"1891-11-09-hope-is-the-thing-with-feathers":[1,1,1,1,1],"1987-11-13-hypertext-87-keynote-address":[6,12,2,8,7,4,4,2,2,9,9,4,2,6,8,6,8,8,7,7,7,2,7,7,3,3,3,3,6,6,4,6,2,11,7,3,12,5,6,3,11,7,6,5,8,5,3,5,8,6,9,5,10,4,11,3,7,6,6,3,3,1,2,1,3]},"transcripts":{"1884-02-27-authorship-provisions-in-augment-1984-oad2250":[{"end":1.8711351931095124,"index":0,"markdown_text":"Abstract","paragraph_end":true,"start":0.0,"text":"Abstract"},{"end":7.487087059020996,"index":1,"markdown_text":"AUGMENT is a text processing system marketed by Tymshare for a multi-user, network environment.","paragraph_end":false,"start":1.8711351931095124,"text":"AUGMENT is a text processing system marketed by Tymshare for a multi-user, network environment."},{"end":15.895998764038087,"index":2,"markdown_text":"In AUGMENT's frontend is a User Interface System that facilitates flexible evolution of command languages and provides optional command recognition features.","paragraph_end":false,"start":7.487087059020996,"text":"In AUGMENT's frontend is a User Interface System that facilitates flexible evolution of command languages and provides optional command recognition features."},{"end":23.744316864013673,"index":3,"markdown_text":"Exceptionally fast and flexible control of interactive operations is enabled by concurrent action of mouse and optional one-handed chord keyset.","paragraph_end":false,"start":15.895998764038087,"text":"Exceptionally fast and flexible control of interactive operations is enabled by concurrent action of mouse and optional one-handed chord keyset."},{"end":30.731721687316895,"index":4,"markdown_text":"Files are hierarchically structured, and textual address expressions can flexibly specify any text entity in any file.","paragraph_end":false,"start":23.744316864013673,"text":"Files are hierarchically structured, and textual address expressions can flexibly specify any text entity in any file."},{"end":36.257578659057614,"index":5,"markdown_text":"The screen may be divided into arbitrary, rectangular windows, allowing cross-file editing between windows.","paragraph_end":false,"start":30.731721687316895,"text":"The screen may be divided into arbitrary, rectangular windows, allowing cross-file editing between windows."},{"end":44.206003952026364,"index":6,"markdown_text":"Many options exist for controlling the \"view\" of a file's text in a window, e.g.: level clipping, paragraph truncation, and content filtering.","paragraph_end":false,"start":36.257578659057614,"text":"Many options exist for controlling the \"view\" of a file's text in a window, e.g.: level clipping, paragraph truncation, and content filtering."},{"end":48.76082878112793,"index":7,"markdown_text":"Structural study and modification of on-line documents are especially facilitated.","paragraph_end":false,"start":44.206003952026364,"text":"Structural study and modification of on-line documents are especially facilitated."},{"end":54.41682319641113,"index":8,"markdown_text":"A Journal system and \"Shared Screen Teleconferencing\" support collaboration among authors and their colleagues.","paragraph_end":false,"start":48.76082878112793,"text":"A Journal system and \"Shared Screen Teleconferencing\" support collaboration among authors and their colleagues."},{"end":58.85067520141601,"index":9,"markdown_text":"Graphic illustrations may be embedded in the same file with text.","paragraph_end":true,"start":54.41682319641113,"text":"Graphic illustrations may be embedded in the same file with text."},{"end":60.69177856445312,"index":10,"markdown_text":"Introduction","paragraph_end":true,"start":58.85067520141601,"text":"Introduction"},{"end":64.38569297790526,"index":11,"markdown_text":"AUGMENT was designed for augmenting human intellectual capabilities.","paragraph_end":false,"start":60.69177856445312,"text":"AUGMENT was designed for augmenting human intellectual capabilities."},{"end":73.63549652099609,"index":12,"markdown_text":"It was targeted particularly toward the core work of professionals engaged in \"tough knowledge work\" -- e.g., planning, analyzing, and designing in complex problem domains.","paragraph_end":false,"start":64.38569297790526,"text":"It was targeted particularly toward the core work of professionals engaged in \"tough knowledge work\" -- e.g., planning, analyzing, and designing in complex problem domains."},{"end":79.86666666666666,"index":13,"markdown_text":"And special attention was paid to augmenting group collaboration among workers pursuing common goals.","paragraph_end":true,"start":73.63549652099609,"text":"And special attention was paid to augmenting group collaboration among workers pursuing common goals."},{"end":88.76651655832926,"index":14,"markdown_text":"Authorship has received a great deal of attention in AUGMENT's evolution, as one of the central human activities to be augmented.","paragraph_end":false,"start":79.86666666666666,"text":"Authorship has received a great deal of attention in AUGMENT's evolution, as one of the central human activities to be augmented."},{"end":104.09347998301187,"index":15,"markdown_text":"An important set of provisions within AUGMENT -- in its architecture, design principles, and specific features -- is directly aimed toward bringing high performance to the authorship activities of knowledge workers.","paragraph_end":false,"start":88.76651655832926,"text":"An important set of provisions within AUGMENT -- in its architecture, design principles, and specific features -- is directly aimed toward bringing high performance to the authorship activities of knowledge workers."},{"end":112.06141249338785,"index":16,"markdown_text":"For the purposes of this paper, we thus speak interchangeably of \"knowledge worker\" and \"author.\"","paragraph_end":true,"start":104.09347998301187,"text":"For the purposes of this paper, we thus speak interchangeably of \"knowledge worker\" and \"author.\""},{"end":122.86336771647134,"index":17,"markdown_text":"We recognize explicitly that highly skilled workers in any field, and knowledge work is no exception, are those with good command of their tools.","paragraph_end":false,"start":112.06141249338785,"text":"We recognize explicitly that highly skilled workers in any field, and knowledge work is no exception, are those with good command of their tools."},{"end":131.40281931559244,"index":18,"markdown_text":"Our basic design goal was to provide a set of tools that would not themselves limit the capabilities of the people using them.","paragraph_end":false,"start":122.86336771647134,"text":"Our basic design goal was to provide a set of tools that would not themselves limit the capabilities of the people using them."},{"end":142.79999999999998,"index":19,"markdown_text":"A system designed to encourage more skilled workers will always enable higher human performance than one designed to support less skilled workers.","paragraph_end":true,"start":131.40281931559244,"text":"A system designed to encourage more skilled workers will always enable higher human performance than one designed to support less skilled workers."},{"end":155.75239448547362,"index":20,"markdown_text":"In this regard, our design goal was to provide as much capability as possible for each level of system usage skill, and a continuous evolution path between skill levels.","paragraph_end":false,"start":142.79999999999998,"text":"In this regard, our design goal was to provide as much capability as possible for each level of system usage skill, and a continuous evolution path between skill levels."},{"end":163.66997127532957,"index":21,"markdown_text":"We believe firmly that knowledge workers are motivated to grow in knowledge and skill and that provisions in system design should support this.","paragraph_end":false,"start":155.75239448547362,"text":"We believe firmly that knowledge workers are motivated to grow in knowledge and skill and that provisions in system design should support this."},{"end":180.73553619384762,"index":22,"markdown_text":"As the rest of the paper reveals, this approach translates into a rich set of AUGMENT provisions, aimed at providing speed and flexibility for skilled workers in organizing and pursuing their core knowledge work -- in which \"authorship\" is a primary activity.","paragraph_end":true,"start":163.66997127532957,"text":"As the rest of the paper reveals, this approach translates into a rich set of AUGMENT provisions, aimed at providing speed and flexibility for skilled workers in organizing and pursuing their core knowledge work -- in which \"authorship\" is a primary activity."},{"end":203.5966457366943,"index":23,"markdown_text":"An explicit sub-goal in AUGMENT's development was to \"augment\" the development, production and control of complex technical documentation -- through the whole cycle of gathering information, planning, creating, collaborating, reviewing, editing, controlling versions, designing layout, and producing the final documents.","paragraph_end":true,"start":180.73553619384762,"text":"An explicit sub-goal in AUGMENT's development was to \"augment\" the development, production and control of complex technical documentation -- through the whole cycle of gathering information, planning, creating, collaborating, reviewing, editing, controlling versions, designing layout, and producing the final documents."},{"end":208.2711185455322,"index":24,"markdown_text":"This paper concentrates upon the development phase of this cycle.","paragraph_end":false,"start":203.5966457366943,"text":"This paper concentrates upon the development phase of this cycle."},{"end":216.13333333333333,"index":25,"markdown_text":"AUGMENT has well-developed tools to support the later, production phase, but their discussion is not included here.","paragraph_end":true,"start":208.2711185455322,"text":"AUGMENT has well-developed tools to support the later, production phase, but their discussion is not included here."},{"end":244.80302041371664,"index":26,"markdown_text":"Studying another's work provides a well-recognized challenge, but one of the toughest jobs is to study one's own work during its development: to see what it really says about Issue X; to see if it does provide for Concept Y; to see if it is reasonably organized and structured -- and to do these over a body of material before it is \"polished\", i.e., before it is well structured, coherently worded, non-redundant and consistently termed.","paragraph_end":true,"start":216.13333333333333,"text":"Studying another's work provides a well-recognized challenge, but one of the toughest jobs is to study one's own work during its development: to see what it really says about Issue X; to see if it does provide for Concept Y; to see if it is reasonably organized and structured -- and to do these over a body of material before it is \"polished\", i.e., before it is well structured, coherently worded, non-redundant and consistently termed."},{"end":246.8643643697103,"index":27,"markdown_text":"Some Background","paragraph_end":true,"start":244.80302041371664,"text":"Some Background"},{"end":248.64540913899742,"index":28,"markdown_text":"History","paragraph_end":true,"start":246.8643643697103,"text":"History"},{"end":255.54275563557945,"index":29,"markdown_text":"AUGMENT is an integrated system of knowledge-worker tools that is marketed by Tymshare's Office Automation Division.","paragraph_end":false,"start":248.64540913899742,"text":"AUGMENT is an integrated system of knowledge-worker tools that is marketed by Tymshare's Office Automation Division."},{"end":264.43222478230797,"index":30,"markdown_text":"The system was developed at SRI International over an extended period under the sponsorship of NASA, DARPA, and RADC.","paragraph_end":false,"start":255.54275563557945,"text":"The system was developed at SRI International over an extended period under the sponsorship of NASA, DARPA, and RADC."},{"end":274.4228673299154,"index":31,"markdown_text":"Commercial rights were transferred to Tymshare in 1978 (where the system has since been renamed from NLS to AUGMENT) and its evolution continued.","paragraph_end":false,"start":264.43222478230797,"text":"Commercial rights were transferred to Tymshare in 1978 (where the system has since been renamed from NLS to AUGMENT) and its evolution continued."},{"end":282.04098180135094,"index":32,"markdown_text":"A short history of AUGMENT's development may be found in &lt;Ref-1&gt;, along with a summary of system characteristics and features.","paragraph_end":false,"start":274.4228673299154,"text":"A short history of AUGMENT's development may be found in <Ref-1>, along with a summary of system characteristics and features."},{"end":289.33333333333337,"index":33,"markdown_text":"The general R&D philosophy and the design principles behind AUGMENT'S development are laid out in &lt;Ref-2&gt;.","paragraph_end":true,"start":282.04098180135094,"text":"The general R&D philosophy and the design principles behind AUGMENT'S development are laid out in <Ref-2>."},{"end":296.1206668217977,"index":34,"markdown_text":"The system evolved on time-shared, mainframe computers, and in a packet-switched network environment.","paragraph_end":false,"start":289.33333333333337,"text":"The system evolved on time-shared, mainframe computers, and in a packet-switched network environment."},{"end":306.4718507130941,"index":35,"markdown_text":"In 1970 our computer was the second to be attached to the ARPANET, and since 1978 we have also operated extensively in the TYMNET environment.","paragraph_end":false,"start":296.1206668217977,"text":"In 1970 our computer was the second to be attached to the ARPANET, and since 1978 we have also operated extensively in the TYMNET environment."},{"end":318.9253066380819,"index":36,"markdown_text":"We have benefited directly from both the time-sharing and the network environments in matters that are important to the authorship process -- especially in dealing with large documents and multi-party documentation activities.","paragraph_end":false,"start":306.4718507130941,"text":"We have benefited directly from both the time-sharing and the network environments in matters that are important to the authorship process -- especially in dealing with large documents and multi-party documentation activities."},{"end":330.8673440297445,"index":37,"markdown_text":"In 1976-77 we conducted some applied studies for the Air Force, as reported in &lt;Ref-3&gt; and &lt;Ref-4&gt;, which concentrated upon this latter application.","paragraph_end":true,"start":318.9253066380819,"text":"In 1976-77 we conducted some applied studies for the Air Force, as reported in <Ref-3> and <Ref-4>, which concentrated upon this latter application."},{"end":334.0999726613363,"index":38,"markdown_text":"Relevant Architectural Features","paragraph_end":true,"start":330.8673440297445,"text":"Relevant Architectural Features"},{"end":347.57453053792324,"index":39,"markdown_text":"Perhaps AUGMENT's most unique architectural feature is its User Interface System (UIS), a special software module, which handles the human/computer interfaces to all interactive programs.","paragraph_end":false,"start":334.0999726613363,"text":"Perhaps AUGMENT's most unique architectural feature is its User Interface System (UIS), a special software module, which handles the human/computer interfaces to all interactive programs."},{"end":367.34589284261074,"index":40,"markdown_text":"It takes care of all command-language dialog and connection protocols, and provides a framework for building a coherent and integrated user environment while supporting flexible evolution on both sides: on the user's side, with evolution of command function and terminology; and on the technology side, with evolving hardware and software.","paragraph_end":false,"start":347.57453053792324,"text":"It takes care of all command-language dialog and connection protocols, and provides a framework for building a coherent and integrated user environment while supporting flexible evolution on both sides: on the user's side, with evolution of command function and terminology; and on the technology side, with evolving hardware and software."},{"end":373.0666666666667,"index":41,"markdown_text":"(Design details are outlined in &lt;Ref-5&gt;; rationale and utilization in &lt;Ref-6&gt;.)","paragraph_end":true,"start":367.34589284261074,"text":"(Design details are outlined in <Ref-5>; rationale and utilization in <Ref-6>.)"},{"end":383.59005600611374,"index":42,"markdown_text":"The UIS provides a reach-through service to non-AUGMENT systems, and can optionally translate back and forth to a foreign program's command language.","paragraph_end":false,"start":373.0666666666667,"text":"The UIS provides a reach-through service to non-AUGMENT systems, and can optionally translate back and forth to a foreign program's command language."},{"end":391.1586674372356,"index":43,"markdown_text":"It also supports the shared-screen, remote collaboration capability discussed below.","paragraph_end":true,"start":383.59005600611374,"text":"It also supports the shared-screen, remote collaboration capability discussed below."},{"end":401.6109482447307,"index":44,"markdown_text":"AUGMENT's architecture provides for open-ended expansion and flexible evolution of system functionality and worker command languages.","paragraph_end":true,"start":391.1586674372356,"text":"AUGMENT's architecture provides for open-ended expansion and flexible evolution of system functionality and worker command languages."},{"end":415.25831286112475,"index":45,"markdown_text":"It is assumed that for any class of knowledge workers, specialized application systems developed by other parties, perhaps running on other computers, will provide services worth integrating.","paragraph_end":false,"start":401.6109482447307,"text":"It is assumed that for any class of knowledge workers, specialized application systems developed by other parties, perhaps running on other computers, will provide services worth integrating."},{"end":419.33349672953295,"index":46,"markdown_text":"The \"author class\" of worker should be no exception.","paragraph_end":false,"start":415.25831286112475,"text":"The \"author class\" of worker should be no exception."},{"end":429.4753832499187,"index":47,"markdown_text":"Continuing evolution toward the \"author workshop of the future\" will certainly depend upon some such features in workshop architecture.","paragraph_end":true,"start":419.33349672953295,"text":"Continuing evolution toward the \"author workshop of the future\" will certainly depend upon some such features in workshop architecture."},{"end":440.13333333333344,"index":48,"markdown_text":"It provides adaptation for different terminal characteristics, enabling application programers to work as though with a virtual terminal.","paragraph_end":true,"start":429.4753832499187,"text":"It provides adaptation for different terminal characteristics, enabling application programers to work as though with a virtual terminal."},{"end":442.89578413565965,"index":49,"markdown_text":"File Characteristics","paragraph_end":true,"start":440.13333333333344,"text":"File Characteristics"},{"end":458.3550900777182,"index":50,"markdown_text":"AUGMENT employs explicitly structured files, with hierarchically organized nodes; each node can contain either or all of: up to 2,000 characters of text, a graphic structure, or other forms of useful data (e.g., digitized speech).","paragraph_end":false,"start":442.89578413565965,"text":"AUGMENT employs explicitly structured files, with hierarchically organized nodes; each node can contain either or all of: up to 2,000 characters of text, a graphic structure, or other forms of useful data (e.g., digitized speech)."},{"end":479.53153508504244,"index":51,"markdown_text":"The worker has a definite model in mind for the structuring of any file that he works with; in composing and modifying it he can organize and modify structure using the same verbs as for working with text strings (e.g. Insert, Replace, Move, Copy, Delete), with appropriate structural-entity nouns (e.g., Statement, Branch, Group, Plex).","paragraph_end":false,"start":458.3550900777182,"text":"The worker has a definite model in mind for the structuring of any file that he works with; in composing and modifying it he can organize and modify structure using the same verbs as for working with text strings (e.g. Insert, Replace, Move, Copy, Delete), with appropriate structural-entity nouns (e.g., Statement, Branch, Group, Plex)."},{"end":491.4554269154868,"index":52,"markdown_text":"For any existing hierarchical structure, he has many flexible alternatives for addressing its entities, modifying its organization, jumping around within it, and viewing it in a most beneficial manner.","paragraph_end":true,"start":479.53153508504244,"text":"For any existing hierarchical structure, he has many flexible alternatives for addressing its entities, modifying its organization, jumping around within it, and viewing it in a most beneficial manner."},{"end":501.15754292806,"index":53,"markdown_text":"(Note: AUGMENT workers generally use the term \"statement\" to refer to a file node, which is natural enough since the terminology became established before we added the graphic capability.","paragraph_end":false,"start":491.4554269154868,"text":"(Note: AUGMENT workers generally use the term \"statement\" to refer to a file node, which is natural enough since the terminology became established before we added the graphic capability."},{"end":507.60000000000014,"index":54,"markdown_text":"Now an AUGMENT \"statement\" can contain either or both a text statement and a graphic diagram.)","paragraph_end":true,"start":501.15754292806,"text":"Now an AUGMENT \"statement\" can contain either or both a text statement and a graphic diagram.)"},{"end":511.94402840137496,"index":55,"markdown_text":"Controlling the Tools","paragraph_end":true,"start":507.60000000000014,"text":"Controlling the Tools"},{"end":524.1178654670716,"index":56,"markdown_text":"Many of AUGMENT's unique author-support provisions address basic operations common to almost every task, things done over and over again.","paragraph_end":false,"start":511.94402840137496,"text":"Many of AUGMENT's unique author-support provisions address basic operations common to almost every task, things done over and over again."},{"end":550.6871578216553,"index":57,"markdown_text":"These operations, executed with speed and flexibility, provide for composing and modifying one's working material, and for studying what is there over a wide range of substantive levels -- from a single text passage to a collection of end-product draft documents and their associated set of working notes, reference material, and recorded-message dialog (assuming all to be on line).","paragraph_end":true,"start":524.1178654670716,"text":"These operations, executed with speed and flexibility, provide for composing and modifying one's working material, and for studying what is there over a wide range of substantive levels -- from a single text passage to a collection of end-product draft documents and their associated set of working notes, reference material, and recorded-message dialog (assuming all to be on line)."},{"end":562.2002422332764,"index":58,"markdown_text":"In the early stages of our program at SRI, we did a great deal of detailed work on what we called the \"control interface\" -- how users control the functional application of their tools.","paragraph_end":false,"start":550.6871578216553,"text":"In the early stages of our program at SRI, we did a great deal of detailed work on what we called the \"control interface\" -- how users control the functional application of their tools."},{"end":569.4985382080079,"index":59,"markdown_text":"These details can be very important to \"low-level\" interactions which are done hundreds of times during a working day.","paragraph_end":false,"start":562.2002422332764,"text":"These details can be very important to \"low-level\" interactions which are done hundreds of times during a working day."},{"end":575.6,"index":60,"markdown_text":"Some of these details are quite relevant to bringing high performance to the authorship process.","paragraph_end":true,"start":569.4985382080079,"text":"Some of these details are quite relevant to bringing high performance to the authorship process."},{"end":584.7908106803894,"index":61,"markdown_text":"AUGMENT commands are expressed with verbs, nouns, and appropriate qualifier words; every command word is designated by entering one or more characters.","paragraph_end":false,"start":575.6,"text":"AUGMENT commands are expressed with verbs, nouns, and appropriate qualifier words; every command word is designated by entering one or more characters."},{"end":594.1818567276001,"index":62,"markdown_text":"The UIS recognizes the command word from these characters according to the command-recognition options designated in each individual's \"profile file.\"","paragraph_end":false,"start":584.7908106803894,"text":"The UIS recognizes the command word from these characters according to the command-recognition options designated in each individual's \"profile file.\""},{"end":602.8019968032837,"index":63,"markdown_text":"Users seem to migrate fairly rapidly to \"expert\" recognition modes, where a minimum number of characters will elicit recognition of command words.","paragraph_end":false,"start":594.1818567276001,"text":"Users seem to migrate fairly rapidly to \"expert\" recognition modes, where a minimum number of characters will elicit recognition of command words."},{"end":609.1895099639893,"index":64,"markdown_text":"The fully spelled-out command words are presented in the Command Feedback Window as soon as they are recognized.","paragraph_end":false,"start":602.8019968032837,"text":"The fully spelled-out command words are presented in the Command Feedback Window as soon as they are recognized."},{"end":615.095514678955,"index":65,"markdown_text":"The Backspace Key will cause backup, one command word at a time.","paragraph_end":true,"start":609.1895099639893,"text":"The Backspace Key will cause backup, one command word at a time."},{"end":642.997393798828,"index":66,"markdown_text":"Of the system requirements behind our choice of this noun-verb command form, two are particularly relevant here: (1) The \"vocabulary\" of the functions of the tools, and of the entities they operate upon, must be as extensible as is a natural language; (2) Textual lists of commands must conveniently lend themselves to writing, documenting, and executing as \"macro\" commands.","paragraph_end":true,"start":615.095514678955,"text":"Of the system requirements behind our choice of this noun-verb command form, two are particularly relevant here: (1) The \"vocabulary\" of the functions of the tools, and of the entities they operate upon, must be as extensible as is a natural language; (2) Textual lists of commands must conveniently lend themselves to writing, documenting, and executing as \"macro\" commands."},{"end":645.9008094787597,"index":67,"markdown_text":"Screen selection is done with a mouse.","paragraph_end":false,"start":642.997393798828,"text":"Screen selection is done with a mouse."},{"end":658.4,"index":68,"markdown_text":"If the command's noun is a single, defined text or structure entity, e.g., a \"word\", then there is only one selection needed (e.g., to pick any character in the designated word).","paragraph_end":true,"start":645.9008094787597,"text":"If the command's noun is a single, defined text or structure entity, e.g., a \"word\", then there is only one selection needed (e.g., to pick any character in the designated word)."},{"end":668.3791374206543,"index":69,"markdown_text":"Besides using a standard keyboard for character entry, an AUGMENT user may optionally use a five-key, one-hand, chord keyset.","paragraph_end":false,"start":658.4,"text":"Besides using a standard keyboard for character entry, an AUGMENT user may optionally use a five-key, one-hand, chord keyset."},{"end":675.2854608535766,"index":70,"markdown_text":"Remarkably little practice is required in order to enter alphabetic characters, one hand-stroke per character.","paragraph_end":false,"start":668.3791374206543,"text":"Remarkably little practice is required in order to enter alphabetic characters, one hand-stroke per character."},{"end":692.3603641510009,"index":71,"markdown_text":"With less than five hours practice, a person can begin profitably working in a two-handed, concurrent mode -- operating the mouse with one hand and simultaneously entering command characters and short literal strings with the other hand.","paragraph_end":true,"start":675.2854608535766,"text":"With less than five hours practice, a person can begin profitably working in a two-handed, concurrent mode -- operating the mouse with one hand and simultaneously entering command characters and short literal strings with the other hand."},{"end":699.2066337585449,"index":72,"markdown_text":"Here is an example of a low-level action which reveals some basic characteristics of high-performance execution.","paragraph_end":false,"start":692.3603641510009,"text":"Here is an example of a low-level action which reveals some basic characteristics of high-performance execution."},{"end":707.5142375946044,"index":73,"markdown_text":"It is a very simple situation, but representative of what is met over and over and over again in doing hard knowledge work.","paragraph_end":false,"start":699.2066337585449,"text":"It is a very simple situation, but representative of what is met over and over and over again in doing hard knowledge work."},{"end":716.3223049163818,"index":74,"markdown_text":"The worker is composing or modifying something in one area of the screen, when his eye catches a one-character typo in another area.","paragraph_end":false,"start":707.5142375946044,"text":"The worker is composing or modifying something in one area of the screen, when his eye catches a one-character typo in another area."},{"end":734.1333333333333,"index":75,"markdown_text":"For a skilled AUGMENT worker, the typo could be corrected in less time than it would take someone to point it out to him -- with three quick strokes of the keyset hand during a casual flick of the mouse hand, and an absolute minimum of visual and mental attention taken from the other ongoing task.","paragraph_end":true,"start":716.3223049163818,"text":"For a skilled AUGMENT worker, the typo could be corrected in less time than it would take someone to point it out to him -- with three quick strokes of the keyset hand during a casual flick of the mouse hand, and an absolute minimum of visual and mental attention taken from the other ongoing task."},{"end":743.7616640408834,"index":76,"markdown_text":"Fast, flexible, graceful, low effort -- these are important to all high-frequency, low-level, knowledge-work actions.","paragraph_end":false,"start":734.1333333333333,"text":"Fast, flexible, graceful, low effort -- these are important to all high-frequency, low-level, knowledge-work actions."},{"end":754.2607489903768,"index":77,"markdown_text":"This same kind of speed and flexibility are achieved by skilled AUGMENT workers in executing all of the other functional features described below.","paragraph_end":false,"start":743.7616640408834,"text":"This same kind of speed and flexibility are achieved by skilled AUGMENT workers in executing all of the other functional features described below."},{"end":761.2661179860432,"index":78,"markdown_text":"Description of mouse and keyset, and their concurrent employment, may be found in &lt;Ref-7&gt;.","paragraph_end":true,"start":754.2607489903768,"text":"Description of mouse and keyset, and their concurrent employment, may be found in <Ref-7>."},{"end":764.5382573445637,"index":79,"markdown_text":"Addressing the Working Materials","paragraph_end":true,"start":761.2661179860432,"text":"Addressing the Working Materials"},{"end":776.398519261678,"index":80,"markdown_text":"There is a consistent set of addressing features that a worker may use in any command to designate a particular structural node or some element of text or graphics attached to that node.","paragraph_end":false,"start":764.5382573445637,"text":"There is a consistent set of addressing features that a worker may use in any command to designate a particular structural node or some element of text or graphics attached to that node."},{"end":789.1595609029133,"index":81,"markdown_text":"It adds appreciably to the power and flexibility of the system commands to have a rich, universally applicable vocabulary for directly addressing particular entities within the working files.","paragraph_end":false,"start":776.398519261678,"text":"It adds appreciably to the power and flexibility of the system commands to have a rich, universally applicable vocabulary for directly addressing particular entities within the working files."},{"end":791.8666666666666,"index":82,"markdown_text":"Below are some examples.","paragraph_end":true,"start":789.1595609029133,"text":"Below are some examples."},{"end":794.6789300243058,"index":83,"markdown_text":"Explicit Statement Addresses","paragraph_end":true,"start":791.8666666666666,"text":"Explicit Statement Addresses"},{"end":799.8738734404244,"index":84,"markdown_text":"There are four \"handles\" by which a given statement may be directly addressed:","paragraph_end":true,"start":794.6789300243058,"text":"There are four \"handles\" by which a given statement may be directly addressed:"},{"end":801.8561029116311,"index":85,"markdown_text":"Structural Statement Number.","paragraph_end":false,"start":799.8738734404244,"text":"Structural Statement Number."},{"end":805.7504830042519,"index":86,"markdown_text":"This designates the current \"structural location\" of the statement.","paragraph_end":false,"start":801.8561029116311,"text":"This designates the current \"structural location\" of the statement."},{"end":815.5314840952553,"index":87,"markdown_text":"It is assigned by the system, depending upon where the worker installs or moves a statement within an existing structure, or how that structure might have been re-organized subsequently.","paragraph_end":false,"start":805.7504830042519,"text":"It is assigned by the system, depending upon where the worker installs or moves a statement within an existing structure, or how that structure might have been re-organized subsequently."},{"end":824.8219341913857,"index":88,"markdown_text":"It is usually expressed as an alternating sequence of number-letter fields -- e.g. \"1\", \"1a\", \"1a1\", \"1a2\", and \"1b\".","paragraph_end":false,"start":815.5314840952553,"text":"It is usually expressed as an alternating sequence of number-letter fields -- e.g. \"1\", \"1a\", \"1a1\", \"1a2\", and \"1b\"."},{"end":838.4463598887123,"index":89,"markdown_text":"At a worker's option, these same statement numbers could be shown as \"1\", \"1.1\", \"1.1.1\", \"1.1.2\", or \"1.2\", but this bulkier alternative is seldom chosen.","paragraph_end":true,"start":824.8219341913857,"text":"At a worker's option, these same statement numbers could be shown as \"1\", \"1.1\", \"1.1.1\", \"1.1.2\", or \"1.2\", but this bulkier alternative is seldom chosen."},{"end":841.109354273478,"index":90,"markdown_text":"Statement Identifier (or SID).","paragraph_end":false,"start":838.4463598887123,"text":"Statement Identifier (or SID)."},{"end":853.523317591349,"index":91,"markdown_text":"This is a unique integer, assigned in sequential order by the system as each statement is first inserted, and which stays with a statement no matter how much its content may be altered or where it may be moved in its file structure.","paragraph_end":false,"start":841.109354273478,"text":"This is a unique integer, assigned in sequential order by the system as each statement is first inserted, and which stays with a statement no matter how much its content may be altered or where it may be moved in its file structure."},{"end":873.1999999999998,"index":92,"markdown_text":"To make it uniquely recognizable for what it is, a SID is always displayed, printed, or designated with a prefixed \"0\" -- e.g., \"012\", \"0417\", etc. SIDs are particularly useful for referencing passages in a document while it is evolving.","paragraph_end":true,"start":853.523317591349,"text":"To make it uniquely recognizable for what it is, a SID is always displayed, printed, or designated with a prefixed \"0\" -- e.g., \"012\", \"0417\", etc. SIDs are particularly useful for referencing passages in a document while it is evolving."},{"end":877.495501232147,"index":93,"markdown_text":"Worker-Assigned Statement Name (or label).","paragraph_end":false,"start":873.1999999999998,"text":"Worker-Assigned Statement Name (or label)."},{"end":891.8739149093626,"index":94,"markdown_text":"For any statement or part of the file structure, an author can designate as \"name delimiters\" a pair of characters that indicate to the system when the first word of a statement is to be treated as a name for that statement.","paragraph_end":false,"start":877.495501232147,"text":"For any statement or part of the file structure, an author can designate as \"name delimiters\" a pair of characters that indicate to the system when the first word of a statement is to be treated as a name for that statement."},{"end":909.9360218048093,"index":95,"markdown_text":"For instance, if \"(\" and \")\" are set by the author as name delimiters for a specified part of the file, any parenthesized first word in a statement would be recognized by the system as that statement's name.","paragraph_end":true,"start":891.8739149093626,"text":"For instance, if \"(\" and \")\" are set by the author as name delimiters for a specified part of the file, any parenthesized first word in a statement would be recognized by the system as that statement's name."},{"end":919.7575767517087,"index":96,"markdown_text":"(Note: It is optional whether to have any of the above three identifiers displayed or printed with the statements' text.)","paragraph_end":true,"start":909.9360218048093,"text":"(Note: It is optional whether to have any of the above three identifiers displayed or printed with the statements' text.)"},{"end":922.7213733673093,"index":97,"markdown_text":"A Direct Screen Selection.","paragraph_end":false,"start":919.7575767517087,"text":"A Direct Screen Selection."},{"end":938.161145019531,"index":98,"markdown_text":"When a statement to be designated is displayed in a window, usually the best way to \"address\" it is to use the mouse to position the cursor anywhere on the statement and depress the mouse's \"Select\" key (indicated below by \"&lt;Select&gt;\").","paragraph_end":false,"start":922.7213733673093,"text":"When a statement to be designated is displayed in a window, usually the best way to \"address\" it is to use the mouse to position the cursor anywhere on the statement and depress the mouse's \"Select\" key (indicated below by \"<Select>\")."},{"end":954.6666666666664,"index":99,"markdown_text":"This mode is generally used for text manipulation -- selecting characters, words, numbers, visibles, invisibles, etc. (any of the text entities which have been made system recognizable).","paragraph_end":true,"start":938.161145019531,"text":"This mode is generally used for text manipulation -- selecting characters, words, numbers, visibles, invisibles, etc. (any of the text entities which have been made system recognizable)."},{"end":956.7479210774101,"index":100,"markdown_text":"Markers","paragraph_end":true,"start":954.6666666666664,"text":"Markers"},{"end":967.4784269014991,"index":101,"markdown_text":"As one \"holds a place\" in a book by leaving a temporary place marker in it, an author can place \"markers\" at arbitrary locations within an AUGMENT file.","paragraph_end":false,"start":956.7479210774101,"text":"As one \"holds a place\" in a book by leaving a temporary place marker in it, an author can place \"markers\" at arbitrary locations within an AUGMENT file."},{"end":974.5453457514442,"index":102,"markdown_text":"When placing a marker, he attaches it to a specific character in the text and gives it a name or label.","paragraph_end":false,"start":967.4784269014991,"text":"When placing a marker, he attaches it to a specific character in the text and gives it a name or label."},{"end":977.5482859293617,"index":103,"markdown_text":"Marker names are local to each file.","paragraph_end":false,"start":974.5453457514442,"text":"Marker names are local to each file."},{"end":989.0988104502356,"index":104,"markdown_text":"Simple commands provide for displaying where one's markers are located and what their names are, for deleting or moving a marker, or for installing a new one.","paragraph_end":true,"start":977.5482859293617,"text":"Simple commands provide for displaying where one's markers are located and what their names are, for deleting or moving a marker, or for installing a new one."},{"end":996.3559172312415,"index":105,"markdown_text":"A marker name may be included in an address expression, to provide another way of designating an address.","paragraph_end":false,"start":989.0988104502356,"text":"A marker name may be included in an address expression, to provide another way of designating an address."},{"end":1003.9033053080237,"index":106,"markdown_text":"A marker name can designate not only a particular statement, but a specific character within that statement.","paragraph_end":false,"start":996.3559172312415,"text":"A marker name can designate not only a particular statement, but a specific character within that statement."},{"end":1017.4665854136146,"index":107,"markdown_text":"For example, \"Copy Word #x (to follow word) &lt;Select&gt;\" would designate that a word located somewhere in the file and marked with an \"x\" is to be copied to follow the cursor-selected word.","paragraph_end":false,"start":1003.9033053080237,"text":"For example, \"Copy Word #x (to follow word) <Select>\" would designate that a word located somewhere in the file and marked with an \"x\" is to be copied to follow the cursor-selected word."},{"end":1026.3999999999996,"index":108,"markdown_text":"There are many unique ways in which markers may be employed by an author who has integrated their artful use into her working methodology.","paragraph_end":true,"start":1017.4665854136146,"text":"There are many unique ways in which markers may be employed by an author who has integrated their artful use into her working methodology."},{"end":1052.7405256271359,"index":109,"markdown_text":"As a comparative example of some of the foregoing addressing forms, consider a statement whose SID is \"069\", whose statement number is \"3b5\", that has statement-name delimiters designated for it as \"NULL\" and \":\", that starts with the text \"Capacity: For every ...\", and that has a marker named \"x\" positioned on one of its characters.","paragraph_end":false,"start":1026.3999999999996,"text":"As a comparative example of some of the foregoing addressing forms, consider a statement whose SID is \"069\", whose statement number is \"3b5\", that has statement-name delimiters designated for it as \"NULL\" and \":\", that starts with the text \"Capacity: For every ...\", and that has a marker named \"x\" positioned on one of its characters."},{"end":1057.7253753662105,"index":110,"markdown_text":"A command to move this statement could optionally be expressed as:","paragraph_end":true,"start":1052.7405256271359,"text":"A command to move this statement could optionally be expressed as:"},{"end":1060.1873016357417,"index":111,"markdown_text":"\"Move Statement &lt;Select&gt; ...\",","paragraph_end":true,"start":1057.7253753662105,"text":"\"Move Statement <Select> ...\","},{"end":1062.959587860107,"index":112,"markdown_text":"\"Move Statement 3b5 ...\",","paragraph_end":true,"start":1060.1873016357417,"text":"\"Move Statement 3b5 ...\","},{"end":1066.1423488616938,"index":113,"markdown_text":"\"Move Statement 069 ...\",","paragraph_end":true,"start":1062.959587860107,"text":"\"Move Statement 069 ...\","},{"end":1069.8657363891596,"index":114,"markdown_text":"\"Move Statement Capacity ...\", or","paragraph_end":true,"start":1066.1423488616938,"text":"\"Move Statement Capacity ...\", or"},{"end":1072.6179973602289,"index":115,"markdown_text":"\"Move Statement #x ...\".","paragraph_end":true,"start":1069.8657363891596,"text":"\"Move Statement #x ...\"."},{"end":1075.9909801483147,"index":116,"markdown_text":"Relative-Address Extensions","paragraph_end":true,"start":1072.6179973602289,"text":"Relative-Address Extensions"},{"end":1084.0202846527093,"index":117,"markdown_text":"A sequence of characters may be appended to the address of a given statement to specify an address of a position \"relative\" to that statement.","paragraph_end":false,"start":1075.9909801483147,"text":"A sequence of characters may be appended to the address of a given statement to specify an address of a position \"relative\" to that statement."},{"end":1101.4004249572747,"index":118,"markdown_text":"A major class of these designations deals with relative structural location, such as: Up a level, Down a level, Successor at same level, Predecessor at same level, Head at this level, Tail at this level, and End statement at last and lowest position in this branch.","paragraph_end":false,"start":1084.0202846527093,"text":"A major class of these designations deals with relative structural location, such as: Up a level, Down a level, Successor at same level, Predecessor at same level, Head at this level, Tail at this level, and End statement at last and lowest position in this branch."},{"end":1114.3999999999994,"index":119,"markdown_text":"A period (\".\") in the address string indicates that relative addressing is beginning, and each of these relative-location designators is indicated with a directly mnemonic, one-letter designation.","paragraph_end":true,"start":1101.4004249572747,"text":"A period (\".\") in the address string indicates that relative addressing is beginning, and each of these relative-location designators is indicated with a directly mnemonic, one-letter designation."},{"end":1133.9117004394525,"index":120,"markdown_text":"For example, \"Move Statement 0609 (to follow statement) 4b.dt\" would move Statement 0609 to follow the tail statement of the substructure one level down from Statement 4b -- or, to conceptualize the associated address-location pathway, \"go to 4b, then Down a level and to the Tail\".","paragraph_end":true,"start":1114.3999999999994,"text":"For example, \"Move Statement 0609 (to follow statement) 4b.dt\" would move Statement 0609 to follow the tail statement of the substructure one level down from Statement 4b -- or, to conceptualize the associated address-location pathway, \"go to 4b, then Down a level and to the Tail\"."},{"end":1136.9442892074578,"index":121,"markdown_text":"Embedded Citation Links","paragraph_end":true,"start":1133.9117004394525,"text":"Embedded Citation Links"},{"end":1143.5519523620599,"index":122,"markdown_text":"A special use of address expressions is within an explicit text entity that we call a \"Citation Link\" (or \"Link\" for short).","paragraph_end":false,"start":1136.9442892074578,"text":"A special use of address expressions is within an explicit text entity that we call a \"Citation Link\" (or \"Link\" for short)."},{"end":1148.4175949096673,"index":123,"markdown_text":"Links are used as textual citations to some specific file item within the workshop domain.","paragraph_end":false,"start":1143.5519523620599,"text":"Links are used as textual citations to some specific file item within the workshop domain."},{"end":1155.6459789276116,"index":124,"markdown_text":"A link is delimited by parentheses or angle brackets and contains a valid address string whose path leads to the cited file entity.","paragraph_end":false,"start":1148.4175949096673,"text":"A link is delimited by parentheses or angle brackets and contains a valid address string whose path leads to the cited file entity."},{"end":1160.1011447906487,"index":125,"markdown_text":"For example, \"(0306)\" or \"(4b.dt)\" are valid links.","paragraph_end":false,"start":1155.6459789276116,"text":"For example, \"(0306)\" or \"(4b.dt)\" are valid links."},{"end":1175.3333333333326,"index":126,"markdown_text":"Also, the reference items at the end of this paper are statements named \"Ref-1\", \"Ref-2\", etc., and as such can be cited with links \"&lt;Ref-1&gt;\", \"&lt;Ref-2&gt;\", etc. An AUGMENT reader may travel via such a link directly to the referenced bibliographic citation.","paragraph_end":true,"start":1160.1011447906487,"text":"Also, the reference items at the end of this paper are statements named \"Ref-1\", \"Ref-2\", etc., and as such can be cited with links \"<Ref-1>\", \"<Ref-2>\", etc. An AUGMENT reader may travel via such a link directly to the referenced bibliographic citation."},{"end":1181.1395181020093,"index":127,"markdown_text":"A special feature in AUGMENT's link provisions is the use of \"indirect link referencing\".","paragraph_end":false,"start":1175.3333333333326,"text":"A special feature in AUGMENT's link provisions is the use of \"indirect link referencing\"."},{"end":1190.939957459767,"index":128,"markdown_text":"In path-following terms, including \".l\" in an address string stipulates, \"scan forward from this point to the next link, and follow that link to its target.\"","paragraph_end":false,"start":1181.1395181020093,"text":"In path-following terms, including \".l\" in an address string stipulates, \"scan forward from this point to the next link, and follow that link to its target.\""},{"end":1201.0807593663526,"index":129,"markdown_text":"For example, to follow the path prescribed by link \"(4b.l)\", one would \"go to 4b, then find the first link in that statement and follow the path that it specifies.\"","paragraph_end":false,"start":1190.939957459767,"text":"For example, to follow the path prescribed by link \"(4b.l)\", one would \"go to 4b, then find the first link in that statement and follow the path that it specifies.\""},{"end":1215.7154961903882,"index":130,"markdown_text":"This latter path in turn could prescribe use of another link, etc. There is no intrinsic limit to the number of these indirect links that may be employed in a given path -- only a natural caution against such a path looping back upon itself.","paragraph_end":true,"start":1201.0807593663526,"text":"This latter path in turn could prescribe use of another link, etc. There is no intrinsic limit to the number of these indirect links that may be employed in a given path -- only a natural caution against such a path looping back upon itself."},{"end":1224.6950608571362,"index":131,"markdown_text":"As an example, note that \"&lt;Ref-1&gt;\" is a link to the statement named \"Ref-1\", a bibliographic citation at the end of this paper.","paragraph_end":false,"start":1215.7154961903882,"text":"As an example, note that \"<Ref-1>\" is a link to the statement named \"Ref-1\", a bibliographic citation at the end of this paper."},{"end":1236.9981671651196,"index":132,"markdown_text":"In that citation, there is a link to the original source document of the referenced publication, permanently stored in the AUGMENT Journal as Item 71279 (the Journal is described below).","paragraph_end":false,"start":1224.6950608571362,"text":"In that citation, there is a link to the original source docum
