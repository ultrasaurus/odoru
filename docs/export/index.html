ent of the referenced publication, permanently stored in the AUGMENT Journal as Item 71279 (the Journal is described below)."},{"end":1246.9333333333325,"index":133,"markdown_text":"The point to be made here is that with the link \"&lt;Ref-1.l&gt;\", I can reference the original source document -- and a Jump Link command would \"take me there.\"","paragraph_end":true,"start":1236.9981671651196,"text":"The point to be made here is that with the link \"<Ref-1.l>\", I can reference the original source document -- and a Jump Link command would \"take me there.\""},{"end":1251.1566415866207,"index":134,"markdown_text":"Text and Content Addressing","paragraph_end":true,"start":1246.9333333333325,"text":"Text and Content Addressing"},{"end":1264.1491978009533,"index":135,"markdown_text":"Other addressing options include scanning for a content match, and/or stepping backward and forward a given number of characters or words (or other text entities).","paragraph_end":false,"start":1251.1566415866207,"text":"Other addressing options include scanning for a content match, and/or stepping backward and forward a given number of characters or words (or other text entities)."},{"end":1288.7421918233226,"index":136,"markdown_text":"For instance, the foregoing link could have involved a bit more smarts in designating which link to follow: e.g., the path for '(4b \"*D\" .l)' would be \"to 4b, scan for first occurrence of \"*D\", then follow the next link found in that statement.\"","paragraph_end":true,"start":1264.1491978009533,"text":"For instance, the foregoing link could have involved a bit more smarts in designating which link to follow: e.g., the path for '(4b \"*D\" .l)' would be \"to 4b, scan for first occurrence of \"*D\", then follow the next link found in that statement.\""},{"end":1291.55413754781,"index":137,"markdown_text":"Other-File Addressing","paragraph_end":true,"start":1288.7421918233226,"text":"Other-File Addressing"},{"end":1306.8989651997874,"index":138,"markdown_text":"By preceding an in-file address string with a file address, and separating the two strings with a comma, one obtains a composite address designating a given entity within a given file.","paragraph_end":false,"start":1291.55413754781,"text":"By preceding an in-file address string with a file address, and separating the two strings with a comma, one obtains a composite address designating a given entity within a given file."},{"end":1321.2020169575999,"index":139,"markdown_text":"Extending this principle lets one prefix the file name with a directory name in which the file is to be found; and further, one can prefix this with a host-computer name.","paragraph_end":true,"start":1306.8989651997874,"text":"Extending this principle lets one prefix the file name with a directory name in which the file is to be found; and further, one can prefix this with a host-computer name."},{"end":1341.8666666666657,"index":140,"markdown_text":"For example, '(Office-5, Program-Documentation, Sequence-Doc, Specifications \"Journal\")' specifies the path: to the Office-5 host computer, to its Program-Documentation file directory, to its Sequence-Doc file, to its statement named \"Specifications\", and then scan to the location of the text \"Journal\".","paragraph_end":true,"start":1321.2020169575999,"text":"For example, '(Office-5, Program-Documentation, Sequence-Doc, Specifications \"Journal\")' specifies the path: to the Office-5 host computer, to its Program-Documentation file directory, to its Sequence-Doc file, to its statement named \"Specifications\", and then scan to the location of the text \"Journal\"."},{"end":1351.569518438974,"index":141,"markdown_text":"If a person were working on the Office-5 host, he would only have to specify '(Program-Documentation, Sequence-Doc, Specifications \"Journal\")'.","paragraph_end":false,"start":1341.8666666666657,"text":"If a person were working on the Office-5 host, he would only have to specify '(Program-Documentation, Sequence-Doc, Specifications \"Journal\")'."},{"end":1362.4839743296295,"index":142,"markdown_text":"If he were already working within a file with its \"link default\" set to the Program-Documentation directory, he would only have to specify '(Sequence-Doc, Specifications \"Journal\")'.","paragraph_end":false,"start":1351.569518438974,"text":"If he were already working within a file with its \"link default\" set to the Program-Documentation directory, he would only have to specify '(Sequence-Doc, Specifications \"Journal\")'."},{"end":1369.443192354837,"index":143,"markdown_text":"And if he were already working within the Sequence-Doc file, he would only have to specify '(Specifications \"Journal\")'.","paragraph_end":false,"start":1362.4839743296295,"text":"And if he were already working within the Sequence-Doc file, he would only have to specify '(Specifications \"Journal\")'."},{"end":1383.8666666666657,"index":144,"markdown_text":"And if he were planning to reference items relative to the Statement named \"Specifications\" very often, he could affix a marker (e.g., named \"s\") to its front and would then only have to specify '(#s \"Journal\")'.","paragraph_end":true,"start":1369.443192354837,"text":"And if he were planning to reference items relative to the Statement named \"Specifications\" very often, he could affix a marker (e.g., named \"s\") to its front and would then only have to specify '(#s \"Journal\")'."},{"end":1407.828370920816,"index":145,"markdown_text":"Or, suppose he were working in another file in a different directory on Office-5 and wanted to reference items relative to that same \"far off\" statement with special ease: in some temporary place in that file he could install a statement named \"Ref\" (for example) containing the textual link, \"(Program-Documentation, Sequence-Doc, Specifications)\".","paragraph_end":false,"start":1383.8666666666657,"text":"Or, suppose he were working in another file in a different directory on Office-5 and wanted to reference items relative to that same \"far off\" statement with special ease: in some temporary place in that file he could install a statement named \"Ref\" (for example) containing the textual link, \"(Program-Documentation, Sequence-Doc, Specifications)\"."},{"end":1412.7928675333649,"index":146,"markdown_text":"He could then cite the above reference with the link, '(Ref.l \"Journal\")'.","paragraph_end":false,"start":1407.828370920816,"text":"He could then cite the above reference with the link, '(Ref.l \"Journal\")'."},{"end":1429.0168387095123,"index":147,"markdown_text":"This path description is: go to the statement in this file named \"Ref\", take the first link that you find there (traveling across intervening directories and files and statements), and beginning in the statement on the other end of that link, scan forward to the string \"Journal\".","paragraph_end":true,"start":1412.7928675333649,"text":"This path description is: go to the statement in this file named \"Ref\", take the first link that you find there (traveling across intervening directories and files and statements), and beginning in the statement on the other end of that link, scan forward to the string \"Journal\"."},{"end":1436.4735933939605,"index":148,"markdown_text":"This is only a cursory treatment, but should illustrate well enough what is meant by \"a rich and flexible addressing vocabulary.\"","paragraph_end":false,"start":1429.0168387095123,"text":"This is only a cursory treatment, but should illustrate well enough what is meant by \"a rich and flexible addressing vocabulary.\""},{"end":1450.2060343424469,"index":149,"markdown_text":"As with other high-performance features in AUGMENT, a beginner is not forced to become involved in the larger vocabulary in order to do useful work (with productivity on at least a par with some other, restricted-vocabulary system).","paragraph_end":false,"start":1436.4735933939605,"text":"As with other high-performance features in AUGMENT, a beginner is not forced to become involved in the larger vocabulary in order to do useful work (with productivity on at least a par with some other, restricted-vocabulary system)."},{"end":1460.399999999999,"index":150,"markdown_text":"But an AUGMENT worker interested in higher performance can steadily pick up more of the optional vocabulary and skills in a smooth, upward-compatible progression.","paragraph_end":true,"start":1450.2060343424469,"text":"But an AUGMENT worker interested in higher performance can steadily pick up more of the optional vocabulary and skills in a smooth, upward-compatible progression."},{"end":1463.3725427508343,"index":151,"markdown_text":"Controlling the Views","paragraph_end":true,"start":1460.399999999999,"text":"Controlling the Views"},{"end":1475.7370140075673,"index":152,"markdown_text":"A user of a book, or of most on-line text systems, is constrained to viewing the text as though he had a window through which he sees a fixed, formatted document.","paragraph_end":false,"start":1463.3725427508343,"text":"A user of a book, or of most on-line text systems, is constrained to viewing the text as though he had a window through which he sees a fixed, formatted document."},{"end":1484.0858488082874,"index":153,"markdown_text":"But as described below, our worker can view a section of text in many ways, depending upon his need of the moment.","paragraph_end":true,"start":1475.7370140075673,"text":"But as described below, our worker can view a section of text in many ways, depending upon his need of the moment."},{"end":1487.3487318038929,"index":154,"markdown_text":"Multiple Windows","paragraph_end":true,"start":1484.0858488082874,"text":"Multiple Windows"},{"end":1503.5877388000476,"index":155,"markdown_text":"For whatever total screen area is available to the worker, his general performance will be improved significantly if he can flexibly allocate that area into arbitrary-sized windows whose contents can be independently controlled.","paragraph_end":false,"start":1487.3487318038929,"text":"For whatever total screen area is available to the worker, his general performance will be improved significantly if he can flexibly allocate that area into arbitrary-sized windows whose contents can be independently controlled."},{"end":1521.9683147430408,"index":156,"markdown_text":"AUGMENT has long provided this basic capability, along with the provision that material from any accessible file may be shown in any window, and also that screen-select copying or moving can be done across the different windows.","paragraph_end":true,"start":1503.5877388000476,"text":"AUGMENT has long provided this basic capability, along with the provision that material from any accessible file may be shown in any window, and also that screen-select copying or moving can be done across the different windows."},{"end":1530.2279792785632,"index":157,"markdown_text":"(Note: Cross-file editing can be done at any time, between any two legally accessible files.","paragraph_end":false,"start":1521.9683147430408,"text":"(Note: Cross-file editing can be done at any time, between any two legally accessible files."},{"end":1545.1999999999987,"index":158,"markdown_text":"If one or the other file's material or destination is not being displayed in any of the windows, one may always opt to employ a textual address expression instead of a &lt;Select&gt; within any editing command.)","paragraph_end":true,"start":1530.2279792785632,"text":"If one or the other file's material or destination is not being displayed in any of the windows, one may always opt to employ a textual address expression instead of a <Select> within any editing command.)"},{"end":1550.1252130985247,"index":159,"markdown_text":"User-adjustable parameters are used to control the view presented on the display.","paragraph_end":false,"start":1545.1999999999987,"text":"User-adjustable parameters are used to control the view presented on the display."},{"end":1556.0815169334398,"index":160,"markdown_text":"Adjusting one's view parameters is a constantly used AUGMENT feature that has solidly proved its value.","paragraph_end":false,"start":1550.1252130985247,"text":"Adjusting one's view parameters is a constantly used AUGMENT feature that has solidly proved its value."},{"end":1564.5404703140246,"index":161,"markdown_text":"To facilitate their quick and flexible use, the view-specification actions evolved into cryptic, single-character codes, called \"viewspecs.\"","paragraph_end":false,"start":1556.0815169334398,"text":"To facilitate their quick and flexible use, the view-specification actions evolved into cryptic, single-character codes, called \"viewspecs.\""},{"end":1577.4241077423083,"index":162,"markdown_text":"The syntax of all Jump commands (used for traveling) includes the option of designating new viewspecs, and a special combination of mouse buttons enables quick, concurrent, keyset action to change the viewspecs for a given window.","paragraph_end":false,"start":1564.5404703140246,"text":"The syntax of all Jump commands (used for traveling) includes the option of designating new viewspecs, and a special combination of mouse buttons enables quick, concurrent, keyset action to change the viewspecs for a given window."},{"end":1581.6577415466295,"index":163,"markdown_text":"Here are a few of the frequently used view controls:","paragraph_end":true,"start":1577.4241077423083,"text":"Here are a few of the frequently used view controls:"},{"end":1583.5388858795152,"index":164,"markdown_text":"Window Views","paragraph_end":true,"start":1581.6577415466295,"text":"Window Views"},{"end":1584.7902095794664,"index":165,"markdown_text":"Structure Cutoff.","paragraph_end":false,"start":1583.5388858795152,"text":"Structure Cutoff."},{"end":1598.273633575438,"index":166,"markdown_text":"Show only the statements that lie \"below\" this statement in the structure (i.e., this \"branch\"); or show only those following statements that are at this level or deeper; or show all of the following statements that will fit in this window.","paragraph_end":true,"start":1584.7902095794664,"text":"Show only the statements that lie \"below\" this statement in the structure (i.e., this \"branch\"); or show only those following statements that are at this level or deeper; or show all of the following statements that will fit in this window."},{"end":1599.585021591185,"index":167,"markdown_text":"Level Clipping.","paragraph_end":false,"start":1598.273633575438,"text":"Level Clipping."},{"end":1604.5702968597398,"index":168,"markdown_text":"For the designated structure cutoff, show only the statements down to a specified level.","paragraph_end":false,"start":1599.585021591185,"text":"For the designated structure cutoff, show only the statements down to a specified level."},{"end":1612.533333333332,"index":169,"markdown_text":"Lower-level statements are \"clipped\" from the view; the worker can thus view just a selected number of the upper levels of his document/file.","paragraph_end":true,"start":1604.5702968597398,"text":"Lower-level statements are \"clipped\" from the view; the worker can thus view just a selected number of the upper levels of his document/file."},{"end":1615.0858375151938,"index":170,"markdown_text":"Statement Truncation.","paragraph_end":false,"start":1612.533333333332,"text":"Statement Truncation."},{"end":1622.3429575284308,"index":171,"markdown_text":"For those statements brought into view (as selected by other view specifications), show only their first n lines.","paragraph_end":false,"start":1615.0858375151938,"text":"For those statements brought into view (as selected by other view specifications), show only their first n lines."},{"end":1629.5192135175055,"index":172,"markdown_text":"Truncation to one line is often used, along with level clipping, in order to get an effective overview.","paragraph_end":true,"start":1622.3429575284308,"text":"Truncation to one line is often used, along with level clipping, in order to get an effective overview."},{"end":1633.102729161579,"index":173,"markdown_text":"Inter-Statement Separation.","paragraph_end":false,"start":1629.5192135175055,"text":"Inter-Statement Separation."},{"end":1639.7184344609564,"index":174,"markdown_text":"For viewing ease -- blank lines can be optionally installed between statements.","paragraph_end":true,"start":1633.102729161579,"text":"For viewing ease -- blank lines can be optionally installed between statements."},{"end":1649.2169694264715,"index":175,"markdown_text":"(Note: The foregoing view controls are extremely helpful when studying and modifying a document's structural organization.)","paragraph_end":true,"start":1639.7184344609564,"text":"(Note: The foregoing view controls are extremely helpful when studying and modifying a document's structural organization.)"},{"end":1652.3700608571355,"index":176,"markdown_text":"Statement Numbers and Names.","paragraph_end":false,"start":1649.2169694264715,"text":"Statement Numbers and Names."},{"end":1661.9694794972722,"index":177,"markdown_text":"Optionally, for a given window, show the Statement Number (or the SID) of each statement -- with an option for showing them at either the right or at the left margin.","paragraph_end":false,"start":1652.3700608571355,"text":"Optionally, for a given window, show the Statement Number (or the SID) of each statement -- with an option for showing them at either the right or at the left margin."},{"end":1667.7743909200017,"index":178,"markdown_text":"Independently, the showing of statement names may be turned on or off.","paragraph_end":true,"start":1661.9694794972722,"text":"Independently, the showing of statement names may be turned on or off."},{"end":1669.5961778004948,"index":179,"markdown_text":"Frozen Statements.","paragraph_end":false,"start":1667.7743909200017,"text":"Frozen Statements."},{"end":1675.6020715077702,"index":180,"markdown_text":"A worker may select a number of statements, in random order, and designate them as \"frozen.\"","paragraph_end":false,"start":1669.5961778004948,"text":"A worker may select a number of statements, in random order, and designate them as \"frozen.\""},{"end":1685.1114003499333,"index":181,"markdown_text":"One of the view-specification options is to have the frozen statements appear at the top of the frame, with the rest of that window left for normal viewing and editing.","paragraph_end":false,"start":1675.6020715077702,"text":"One of the view-specification options is to have the frozen statements appear at the top of the frame, with the rest of that window left for normal viewing and editing."},{"end":1692.5333333333317,"index":182,"markdown_text":"The frozen statements may be edited, or even cross-edited between any other displayed (or addressable) statements.","paragraph_end":true,"start":1685.1114003499333,"text":"The frozen statements may be edited, or even cross-edited between any other displayed (or addressable) statements."},{"end":1695.5761344750706,"index":183,"markdown_text":"User-Specified Content Filters.","paragraph_end":false,"start":1692.5333333333317,"text":"User-Specified Content Filters."},{"end":1704.6544919331852,"index":184,"markdown_text":"A simple content-analysis language may be used in a \"Set Content Pattern\" command, which compiles a little content-checking program.","paragraph_end":false,"start":1695.5761344750706,"text":"A simple content-analysis language may be used in a \"Set Content Pattern\" command, which compiles a little content-checking program."},{"end":1721.079612286884,"index":185,"markdown_text":"One of the view-specification options will cause the system to display only those statements which satisfy both the structure and level conditions imposed by other viewspecs, and which also pass the content-analysis test applied by this program.","paragraph_end":false,"start":1704.6544919331852,"text":"One of the view-specification options will cause the system to display only those statements which satisfy both the structure and level conditions imposed by other viewspecs, and which also pass the content-analysis test applied by this program."},{"end":1732.1790936787907,"index":186,"markdown_text":"Where desired, very sophisticated content-analysis programs may be written, using a full-blown programming language, and placed on call for any user.","paragraph_end":true,"start":1721.079612286884,"text":"Where desired, very sophisticated content-analysis programs may be written, using a full-blown programming language, and placed on call for any user."},{"end":1736.1720334370914,"index":187,"markdown_text":"User-Specified Sequence Generators","paragraph_end":true,"start":1732.1790936787907,"text":"User-Specified Sequence Generators"},{"end":1753.2977982838931,"index":188,"markdown_text":"In the foregoing, a \"view\" is created by beginning at a designated location in a document (file) and selecting certain of the the \"following\" statements for display, according to the viewing parameters -- possibly suppressing statements that don't pass the test of a content-analysis program.","paragraph_end":false,"start":1736.1720334370914,"text":"In the foregoing, a \"view\" is created by beginning at a designated location in a document (file) and selecting certain of the the \"following\" statements for display, according to the viewing parameters -- possibly suppressing statements that don't pass the test of a content-analysis program."},{"end":1768.666666666665,"index":189,"markdown_text":"This is essentially a \"parameterized sequence generator,\" and provides very useful options for selectively viewing statements within a document; however, it works only by selectively discarding statements from a sequence provided in standard order.","paragraph_end":true,"start":1753.2977982838931,"text":"This is essentially a \"parameterized sequence generator,\" and provides very useful options for selectively viewing statements within a document; however, it works only by selectively discarding statements from a sequence provided in standard order."},{"end":1776.9249922434472,"index":190,"markdown_text":"Application programmers can provide alternate sequence-generator programs, which any user can invoke in a straightforward manner.","paragraph_end":false,"start":1768.666666666665,"text":"Application programmers can provide alternate sequence-generator programs, which any user can invoke in a straightforward manner."},{"end":1798.6961340586327,"index":191,"markdown_text":"In such a case, the apparent structure being presented to the user could be generated from a sequence of candidate statements according to any rules one may invent -- and the actual views could be further controlled by the above-described viewspecs for level clipping, truncation, content filtering, etc.","paragraph_end":true,"start":1776.9249922434472,"text":"In such a case, the apparent structure being presented to the user could be generated from a sequence of candidate statements according to any rules one may invent -- and the actual views could be further controlled by the above-described viewspecs for level clipping, truncation, content filtering, etc."},{"end":1816.984570948281,"index":192,"markdown_text":"Perhaps the most commonly used, special sequence generator is one that provides an \"Include\" feature, where specially tagged links embedded in the text will cause their cited passages to be \"included\" in place of the Include-Link statements, as though they were part of this file.","paragraph_end":false,"start":1798.6961340586327,"text":"Perhaps the most commonly used, special sequence generator is one that provides an \"Include\" feature, where specially tagged links embedded in the text will cause their cited passages to be \"included\" in place of the Include-Link statements, as though they were part of this file."},{"end":1827.705378977456,"index":193,"markdown_text":"This provision enables arbitrary assemblage of text and formatting directives, from a wide collection of files, to represent a virtual, one-document, super file.","paragraph_end":false,"start":1816.984570948281,"text":"This provision enables arbitrary assemblage of text and formatting directives, from a wide collection of files, to represent a virtual, one-document, super file."},{"end":1837.5999999999983,"index":194,"markdown_text":"For instance, the whole assemblage could be passed to the formatter, by means of a single user action, to generate a composite, photo-typeset document.","paragraph_end":true,"start":1827.705378977456,"text":"For instance, the whole assemblage could be passed to the formatter, by means of a single user action, to generate a composite, photo-typeset document."},{"end":1840.3619778990728,"index":195,"markdown_text":"Traveling Through the Working Files","paragraph_end":true,"start":1837.5999999999983,"text":"Traveling Through the Working Files"},{"end":1857.3783266067487,"index":196,"markdown_text":"An important provision in AUGMENT enables an author to freely \"travel around\" in his on-line file space to reach a particular \"view point\" of his choice -- i.e., the position within a file from which the system develops the desired form of \"view\" according to the currently invoked view specifications.","paragraph_end":true,"start":1840.3619778990728,"text":"An important provision in AUGMENT enables an author to freely \"travel around\" in his on-line file space to reach a particular \"view point\" of his choice -- i.e., the position within a file from which the system develops the desired form of \"view\" according to the currently invoked view specifications."},{"end":1866.5375597000104,"index":197,"markdown_text":"Traveling from one view point to another is accomplished by Jump commands, of which the simplest perhaps is a direct Jump to a statement designated by a screen selection.","paragraph_end":false,"start":1857.3783266067487,"text":"Traveling from one view point to another is accomplished by Jump commands, of which the simplest perhaps is a direct Jump to a statement designated by a screen selection."},{"end":1879.7608901977521,"index":198,"markdown_text":"Then, for a worker grown used to employing address strings, a next form would be a Jump on an embedded link, or to a statement designated by a typed-in address string -- using any combination of the addressing elements and viewspecs described above.","paragraph_end":false,"start":1866.5375597000104,"text":"Then, for a worker grown used to employing address strings, a next form would be a Jump on an embedded link, or to a statement designated by a typed-in address string -- using any combination of the addressing elements and viewspecs described above."},{"end":1889.7309429168683,"index":199,"markdown_text":"For example, the link \"&lt;4b:mi&gt;\" points to the Statement 4b, while invoking viewspecs \"m\" and \"I\" which cause the statements' SIDs to be displayed.","paragraph_end":false,"start":1879.7608901977521,"text":"For example, the link \"<4b:mi>\" points to the Statement 4b, while invoking viewspecs \"m\" and \"I\" which cause the statements' SIDs to be displayed."},{"end":1904.3757087707502,"index":200,"markdown_text":"The link \"&lt;Ref-1.l:i;LL&gt;\" points to the document referenced by the link in the statement named \"Ref-1\", invoking viewspec \"i\" for user content filtering, and sets the filter to \"LL\" to show only those statements beginning with a lower-case letter.","paragraph_end":false,"start":1889.7309429168683,"text":"The link \"<Ref-1.l:i;LL>\" points to the document referenced by the link in the statement named \"Ref-1\", invoking viewspec \"i\" for user content filtering, and sets the filter to \"LL\" to show only those statements beginning with a lower-case letter."},{"end":1907.3333333333317,"index":201,"markdown_text":"The applications are effectively endless.","paragraph_end":true,"start":1904.3757087707502,"text":"The applications are effectively endless."},{"end":1910.4462946136775,"index":202,"markdown_text":"Modifying the Document Structures","paragraph_end":true,"start":1907.3333333333317,"text":"Modifying the Document Structures"},{"end":1917.7957044919315,"index":203,"markdown_text":"Given the array of capabilities described above, it is very simple also to provide for very flexible manipulation of the file structure.","paragraph_end":false,"start":1910.4462946136775,"text":"Given the array of capabilities described above, it is very simple also to provide for very flexible manipulation of the file structure."},{"end":1933.535856374103,"index":204,"markdown_text":"For operating on a small, basic set of structure-entity nouns, essentially the same basic verbs may be used as for text manipulation -- i.e. Insert, Delete, Move, Copy, Replace, and Transpose are quite sufficient for most cases.","paragraph_end":false,"start":1917.7957044919315,"text":"For operating on a small, basic set of structure-entity nouns, essentially the same basic verbs may be used as for text manipulation -- i.e. Insert, Delete, Move, Copy, Replace, and Transpose are quite sufficient for most cases."},{"end":1951.2074555714908,"index":205,"markdown_text":"For instance, \"Move Branch 2b (to follow) 3c\" immediately moves Statement 2b and all of its substatements to follow Statement 3c -- and their statement numbers are automatically changed from 2b, 2b1, etc., to 3d, 3d1, etc.","paragraph_end":true,"start":1933.535856374103,"text":"For instance, \"Move Branch 2b (to follow) 3c\" immediately moves Statement 2b and all of its substatements to follow Statement 3c -- and their statement numbers are automatically changed from 2b, 2b1, etc., to 3d, 3d1, etc."},{"end":1954.5617513020816,"index":206,"markdown_text":"A few extra verbs are useful for structure manipulation.","paragraph_end":false,"start":1951.2074555714908,"text":"A few extra verbs are useful for structure manipulation."},{"end":1963.7935704549136,"index":207,"markdown_text":"For instance, a \"Break\" command will break a given statement off at a designated point in its text string, and establish the rest of the text as a new, separate statement.","paragraph_end":false,"start":1954.5617513020816,"text":"For instance, a \"Break\" command will break a given statement off at a designated point in its text string, and establish the rest of the text as a new, separate statement."},{"end":1973.1999999999982,"index":208,"markdown_text":"And an \"Append\" command does the reverse -- i.e., it appends the text of one or more existing statements to the end of a designated statement.","paragraph_end":true,"start":1963.7935704549136,"text":"And an \"Append\" command does the reverse -- i.e., it appends the text of one or more existing statements to the end of a designated statement."},{"end":1981.589309883116,"index":209,"markdown_text":"Concurrent use of mouse and keyset also provide considerable gains in speed and flexibility for studying and modifying document structure.","paragraph_end":false,"start":1973.1999999999982,"text":"Concurrent use of mouse and keyset also provide considerable gains in speed and flexibility for studying and modifying document structure."},{"end":1999.3981847763043,"index":210,"markdown_text":"For example, if when studying the overview described in the previous paragraph, the author perceives that Statement 2b really belongs in Section 3, following Statement 3c, he can execute the necessary move command in a very quick, deft manner:","paragraph_end":true,"start":1981.589309883116,"text":"For example, if when studying the overview described in the previous paragraph, the author perceives that Statement 2b really belongs in Section 3, following Statement 3c, he can execute the necessary move command in a very quick, deft manner:"},{"end":2008.588384628294,"index":211,"markdown_text":"Keyset hand strikes \"m\" and \"b\" (for Move Branch), while the mouse hand is positioning the cursor anywhere in the text line of Statement 2b.","paragraph_end":false,"start":1999.3981847763043,"text":"Keyset hand strikes \"m\" and \"b\" (for Move Branch), while the mouse hand is positioning the cursor anywhere in the text line of Statement 2b."},{"end":2011.2504489898663,"index":212,"markdown_text":"\\[Two chord strokes.]","paragraph_end":true,"start":2008.588384628294,"text":"[Two chord strokes.]"},{"end":2025.185913848875,"index":213,"markdown_text":"The mouse hand depresses the &lt;Select&gt; button on the mouse while the cursor is on Statement 2b, then moves to Statement 3c and depresses it again, and then depresses it again to say, \"OK, do it.\"","paragraph_end":false,"start":2011.2504489898663,"text":"The mouse hand depresses the <Select> button on the mouse while the cursor is on Statement 2b, then moves to Statement 3c and depresses it again, and then depresses it again to say, \"OK, do it.\""},{"end":2035.236178970335,"index":214,"markdown_text":"\\[Three button pushes, synchronized with the mouse movement as it made two selections on easy, window-wide, whole-line targets.]","paragraph_end":true,"start":2025.185913848875,"text":"[Three button pushes, synchronized with the mouse movement as it made two selections on easy, window-wide, whole-line targets.]"},{"end":2043.599999999998,"index":215,"markdown_text":"(Note: I just had myself timed for this above operation -- an unhurried 2.5 seconds.)","paragraph_end":true,"start":2035.236178970335,"text":"(Note: I just had myself timed for this above operation -- an unhurried 2.5 seconds.)"},{"end":2061.180927848814,"index":216,"markdown_text":"In our view, interactive computer support offers an author a priceless opportunity to get away from the geometric bondage inflicted by pages, margins, and lines -- things which have very little if any bearing upon the content and organization of one's text.","paragraph_end":false,"start":2043.599999999998,"text":"In our view, interactive computer support offers an author a priceless opportunity to get away from the geometric bondage inflicted by pages, margins, and lines -- things which have very little if any bearing upon the content and organization of one's text."},{"end":2072.764716720579,"index":217,"markdown_text":"In terms of value to the authoring process, we differ sharply from those who advocate a \"What you see is what you get\" working mode during the development of a document's content and organization.","paragraph_end":false,"start":2061.180927848814,"text":"In terms of value to the authoring process, we differ sharply from those who advocate a \"What you see is what you get\" working mode during the development of a document's content and organization."},{"end":2086.209768676756,"index":218,"markdown_text":"For this kind of work, experienced users of the foregoing kind of flexible facility for addressing, viewing, and manipulating structured documents, would consider a \"What you see ...\" mode as a relative handicap.","paragraph_end":true,"start":2072.764716720579,"text":"For this kind of work, experienced users of the foregoing kind of flexible facility for addressing, viewing, and manipulating structured documents, would consider a \"What you see ...\" mode as a relative handicap."},{"end":2090.103451919554,"index":219,"markdown_text":"Supporting Multi-Party Collaboration","paragraph_end":true,"start":2086.209768676756,"text":"Supporting Multi-Party Collaboration"},{"end":2098.8138210296615,"index":220,"markdown_text":"The support that advanced technology can provide for close collaboration among knowledge workers is a very important and much under-rated possibility.","paragraph_end":false,"start":2090.103451919554,"text":"The support that advanced technology can provide for close collaboration among knowledge workers is a very important and much under-rated possibility."},{"end":2104.941113662718,"index":221,"markdown_text":"For multiple-author activities, collaborative support is an important aspect of system capability.","paragraph_end":false,"start":2098.8138210296615,"text":"For multiple-author activities, collaborative support is an important aspect of system capability."},{"end":2109.3563701629623,"index":222,"markdown_text":"Some years ago, we introduced the following provisions into AUGMENT.","paragraph_end":false,"start":2104.941113662718,"text":"Some years ago, we introduced the following provisions into AUGMENT."},{"end":2114.266666666665,"index":223,"markdown_text":"(A more complete, overview treatment of these is given in &lt;Ref-8&gt;.)","paragraph_end":true,"start":2109.3563701629623,"text":"(A more complete, overview treatment of these is given in <Ref-8>.)"},{"end":2115.7584086219454,"index":224,"markdown_text":"Electronic Mail.","paragraph_end":false,"start":2114.266666666665,"text":"Electronic Mail."},{"end":2128.2429869333887,"index":225,"markdown_text":"Its primary attributes of speed, automatic distribution, and computer-to-computer directness are well recognized -- and are generally accepted now as important to the effectiveness of knowledge workers.","paragraph_end":false,"start":2115.7584086219454,"text":"Its primary attributes of speed, automatic distribution, and computer-to-computer directness are well recognized -- and are generally accepted now as important to the effectiveness of knowledge workers."},{"end":2137.182491366067,"index":226,"markdown_text":"AUGMENT Mail has features that are beyond what most electronic mail systems offer, and which provide unique benefit to the authorship process.","paragraph_end":true,"start":2128.2429869333887,"text":"AUGMENT Mail has features that are beyond what most electronic mail systems offer, and which provide unique benefit to the authorship process."},{"end":2142.9392138163234,"index":227,"markdown_text":"AUGMENT's mail system allows one to \"send\" complete, structured documents as well as small messages.","paragraph_end":false,"start":2137.182491366067,"text":"AUGMENT's mail system allows one to \"send\" complete, structured documents as well as small messages."},{"end":2153.6917696634914,"index":228,"markdown_text":"In an authorship environment, an important role for \"electronic mail\" is for the control and distribution of documents -- where small, throw-away messages are considered to be but a special class of document.","paragraph_end":false,"start":2142.9392138163234,"text":"In an authorship environment, an important role for \"electronic mail\" is for the control and distribution of documents -- where small, throw-away messages are considered to be but a special class of document."},{"end":2163.5232496897365,"index":229,"markdown_text":"An author should be able to bundle up any combination of text and graphics, in the forms that he has been using for studying and manipulating them -- and send the bundle to other workers.","paragraph_end":false,"start":2153.6917696634914,"text":"An author should be able to bundle up any combination of text and graphics, in the forms that he has been using for studying and manipulating them -- and send the bundle to other workers."},{"end":2173.9999999999986,"index":230,"markdown_text":"In AUGMENT, such a bundle is just like any other file structure, and can be studied and manipulated, incorporated into other files (documents), saved or deleted.","paragraph_end":true,"start":2163.5232496897365,"text":"In AUGMENT, such a bundle is just like any other file structure, and can be studied and manipulated, incorporated into other files (documents), saved or deleted."},{"end":2176.992706894873,"index":231,"markdown_text":"Recorded Mail -- AUGMENT's Journal System.","paragraph_end":false,"start":2173.9999999999986,"text":"Recorded Mail -- AUGMENT's Journal System."},{"end":2183.378482818602,"index":232,"markdown_text":"When mailing a document, an AUGMENT worker may optionally specify that it be installed as a \"recorded\" item.","paragraph_end":false,"start":2176.992706894873,"text":"When mailing a document, an AUGMENT worker may optionally specify that it be installed as a \"recorded\" item."},{"end":2191.345688819884,"index":233,"markdown_text":"In this case, before distributing the item, the system will make a permanent record if it, as a file in a specified Journal collection.","paragraph_end":false,"start":2183.378482818602,"text":"In this case, before distributing the item, the system will make a permanent record if it, as a file in a specified Journal collection."},{"end":2196.890704154967,"index":234,"markdown_text":"And, just as though it had been published, this recorded Journal item cannot later be changed.","paragraph_end":false,"start":2191.345688819884,"text":"And, just as though it had been published, this recorded Journal item cannot later be changed."},{"end":2215.1865280151355,"index":235,"markdown_text":"The system assigns a straightforward accession identifier (a simple number), and any authorized worker is henceforth guaranteed access to that Journal item by specifying the name of the Journal-collection and the Journal-item number -- e.g., as specified in the link \"&lt;OAD,2237,&gt;\".","paragraph_end":true,"start":2196.890704154967,"text":"The system assigns a straightforward accession identifier (a simple number), and any authorized worker is henceforth guaranteed access to that Journal item by specifying the name of the Journal-collection and the Journal-item number -- e.g., as specified in the link \"<OAD,2237,>\"."},{"end":2220.1109836578357,"index":236,"markdown_text":"A given journal may be set up to serve multiple hosts and is much like a special library.","paragraph_end":false,"start":2215.1865280151355,"text":"A given journal may be set up to serve multiple hosts and is much like a special library."},{"end":2228.533333333332,"index":237,"markdown_text":"It has its collection of documents, and AUGMENT provides associated support processes for entry, cataloging, retrieval, and access.","paragraph_end":true,"start":2220.1109836578357,"text":"It has its collection of documents, and AUGMENT provides associated support processes for entry, cataloging, retrieval, and access."},{"end":2236.2427251656836,"index":238,"markdown_text":"Together with the linking capability described above, a Journal system provides an extremely effective form of \"recorded dialog.\"","paragraph_end":false,"start":2228.533333333332,"text":"Together with the linking capability described above, a Journal system provides an extremely effective form of \"recorded dialog.\""},{"end":2263.1999999999985,"index":239,"markdown_text":"Cross-reference links between a succession of Journal items produces an inter-linked network of collaborative contributions -- plans, outlines, document drafts, schedules, short comments, detailed critiques, reference material, etc. The on-line worker can follow these links very easily and, using multiple windows and flexible viewing options, can make very effective use of such records.","paragraph_end":true,"start":2236.2427251656836,"text":"Cross-reference links between a succession of Journal items produces an inter-linked network of collaborative contributions -- plans, outlines, document drafts, schedules, short comments, detailed critiques, reference material, etc. The on-line worker can follow these links very easily and, using multiple windows and flexible viewing options, can make very effective use of such records."},{"end":2271.0398685455307,"index":240,"markdown_text":"For instance, consider a detailed commentary directed toward a \"preliminary design\" document recorded in a given Journal collection.","paragraph_end":false,"start":2263.1999999999985,"text":"For instance, consider a detailed commentary directed toward a \"preliminary design\" document recorded in a given Journal collection."},{"end":2278.0486905097946,"index":241,"markdown_text":"The author writing the commentary could view the design document in one window and his developing commentary document in another.","paragraph_end":false,"start":2271.0398685455307,"text":"The author writing the commentary could view the design document in one window and his developing commentary document in another."},{"end":2286.4492647171005,"index":242,"markdown_text":"He can easily establish links in his commentary to cite any passage in the design document -- e.g., a statement, a term in the statement, or a diagram.","paragraph_end":false,"start":2278.0486905097946,"text":"He can easily establish links in his commentary to cite any passage in the design document -- e.g., a statement, a term in the statement, or a diagram."},{"end":2292.5970031738266,"index":243,"markdown_text":"Then this author would submit his commentary into the Journal, perhaps specifying a list of colleagues for \"distribution.\"","paragraph_end":false,"start":2286.4492647171005,"text":"Then this author would submit his commentary into the Journal, perhaps specifying a list of colleagues for \"distribution.\""},{"end":2303.75104446411,"index":244,"markdown_text":"Each listed user would automatically receive a mail item announcing this new Journal entry, giving subject, author, date, etc., and the all-important link to the new Journal file containing the commentary.","paragraph_end":false,"start":2292.5970031738266,"text":"Each listed user would automatically receive a mail item announcing this new Journal entry, giving subject, author, date, etc., and the all-important link to the new Journal file containing the commentary."},{"end":2312.666666666665,"index":245,"markdown_text":"Any such recipient can subsequently study both the commentary and its cited planning document in a similar, multi-window, link-assisted manner.","paragraph_end":true,"start":2303.75104446411,"text":"Any such recipient can subsequently study both the commentary and its cited planning document in a similar, multi-window, link-assisted manner."},{"end":2330.661125818887,"index":246,"markdown_text":"Furthermore, this second reader could develop and submit his own recorded commentary, which because of the citation power of AUGMENT links could be as short and to the point as: \"Frankly, John, I think your comment in (DDD,xxx,aa) is a mistake!","paragraph_end":false,"start":2312.666666666665,"text":"Furthermore, this second reader could develop and submit his own recorded commentary, which because of the citation power of AUGMENT links could be as short and to the point as: \"Frankly, John, I think your comment in (DDD,xxx,aa) is a mistake!"},{"end":2335.0871416727687,"index":247,"markdown_text":"Didn't you notice the earlier assumption in (DDD,xxx,bb)?","paragraph_end":false,"start":2330.661125818887,"text":"Didn't you notice the earlier assumption in (DDD,xxx,bb)?"},{"end":2341.6460577646876,"index":248,"markdown_text":"Maybe you should go back to Tom's earlier requirements document -- especially at (EEE,yy,cc).\"","paragraph_end":false,"start":2335.0871416727687,"text":"Maybe you should go back to Tom's earlier requirements document -- especially at (EEE,yy,cc).\""},{"end":2358.533333333332,"index":249,"markdown_text":"(Here, \"DDD\" and \"EEE\" represent Journal names, \"xxx\", \"yyy\", and \"zzz\" represent Journal item numbers, and \"aa\", \"bb\", and \"cc\" represent addresses pointing to specific passages in those Journal files.)","paragraph_end":true,"start":2341.6460577646876,"text":"(Here, \"DDD\" and \"EEE\" represent Journal names, \"xxx\", \"yyy\", and \"zzz\" represent Journal item numbers, and \"aa\", \"bb\", and \"cc\" represent addresses pointing to specific passages in those Journal files.)"},{"end":2369.5652323087043,"index":250,"markdown_text":"In official parlance, \"retrieval\" is the finding out about the existence of a relevant piece of information, whereas \"access\" is the subsequent process of gaining possession of the information.","paragraph_end":false,"start":2358.533333333332,"text":"In official parlance, \"retrieval\" is the finding out about the existence of a relevant piece of information, whereas \"access\" is the subsequent process of gaining possession of the information."},{"end":2376.7029309590644,"index":251,"markdown_text":"For users of AUGMENT's Journal system, retrieval is immensely facilitated by the widespread use of citation links.","paragraph_end":false,"start":2369.5652323087043,"text":"For users of AUGMENT's Journal system, retrieval is immensely facilitated by the widespread use of citation links."},{"end":2383.950747998554,"index":252,"markdown_text":"When one can follow them as easily as can a practiced AUGMENT worker, these links provide extremely effective retrieval support.","paragraph_end":false,"start":2376.7029309590644,"text":"When one can follow them as easily as can a practiced AUGMENT worker, these links provide extremely effective retrieval support."},{"end":2390.637960942585,"index":253,"markdown_text":"We have supplemented this with some simple, automatically generated catalog files, which made a rather nice balance.","paragraph_end":false,"start":2383.950747998554,"text":"We have supplemented this with some simple, automatically generated catalog files, which made a rather nice balance."},{"end":2409.9979794820138,"index":254,"markdown_text":"Access is provided by direct Jump on a reference link if the file is on line; if it isn't, AUGMENT asks the worker if she wants it retrieved, and a simple affirmative response automatically launches a request for the system operator to retrieve the file from its archive tape, after which the worker is notified of its availability via electronic mail.","paragraph_end":true,"start":2390.637960942585,"text":"Access is provided by direct Jump on a reference link if the file is on line; if it isn't, AUGMENT asks the worker if she wants it retrieved, and a simple affirmative response automatically launches a request for the system operator to retrieve the file from its archive tape, after which the worker is notified of its availability via electronic mail."},{"end":2412.8110154469796,"index":255,"markdown_text":"A private document can be submitted into a Journal.","paragraph_end":false,"start":2409.9979794820138,"text":"A private document can be submitted into a Journal."},{"end":2418.09671529134,"index":256,"markdown_text":"In this case, only those workers listed at Journal-entry time can get access to the central copy.","paragraph_end":false,"start":2412.8110154469796,"text":"In this case, only those workers listed at Journal-entry time can get access to the central copy."},{"end":2423.0666666666652,"index":257,"markdown_text":"Such a private item would not be listed or indexed in the \"public\" catalogs.","paragraph_end":true,"start":2418.09671529134,"text":"Such a private item would not be listed or indexed in the \"public\" catalogs."},{"end":2433.437069479623,"index":258,"markdown_text":"We have used the Journal system very heavily since 1970 to support AUGMENT's development activity; many customers have employed it heavily since 1975.","paragraph_end":false,"start":2423.0666666666652,"text":"We have used the Journal system very heavily since 1970 to support AUGMENT's development activity; many customers have employed it heavily since 1975."},{"end":2440.8444996515896,"index":259,"markdown_text":"There are about 100,000 entries recorded in the original Journal now (I don't know about other, newer AUGMENT Journal collections).","paragraph_end":false,"start":2433.437069479623,"text":"There are about 100,000 entries recorded in the original Journal now (I don't know about other, newer AUGMENT Journal collections)."},{"end":2447.551227633157,"index":260,"markdown_text":"We found that as workers became at home in this environment, they were increasingly free about submitting their items to the \"public.\"","paragraph_end":false,"start":2440.8444996515896,"text":"We found that as workers became at home in this environment, they were increasingly free about submitting their items to the \"public.\""},{"end":2456.4401446024563,"index":261,"markdown_text":"It became evident that the scientific tradition of active and open interchange has some solid relevance to the collaborative processes in our smaller, \"colleague communities.\"","paragraph_end":false,"start":2447.551227633157,"text":"It became evident that the scientific tradition of active and open interchange has some solid relevance to the collaborative processes in our smaller, \"colleague communities.\""},{"end":2465.4091425577785,"index":262,"markdown_text":"Time and again a worker would come across others' dialog and be able to contribute some valuable information (sometimes a one-sentence comment with a critical citation link).","paragraph_end":false,"start":2456.4401446024563,"text":"Time and again a worker would come across others' dialog and be able to contribute some valuable information (sometimes a one-sentence comment with a critical citation link)."},{"end":2471.5999999999985,"index":263,"markdown_text":"Often the payoff went the other way: the new party found immediate value in an old piece of recorded dialog.","paragraph_end":true,"start":2465.4091425577785,"text":"Often the payoff went the other way: the new party found immediate value in an old piece of recorded dialog."},{"end":2474.5436771869645,"index":264,"markdown_text":"Shared-Screen Teleconferencing.","paragraph_end":false,"start":2471.5999999999985,"text":"Shared-Screen Teleconferencing."},{"end":2484.2658220291123,"index":265,"markdown_text":"Consider a case where two people sit down to work together at a terminal, where they can both see the screen(s), and where either one can take over the controls.","paragraph_end":false,"start":2474.5436771869645,"text":"Consider a case where two people sit down to work together at a terminal, where they can both see the screen(s), and where either one can take over the controls."},{"end":2506.3423999786364,"index":266,"markdown_text":"This is being done countless times every day throughout the country, in different combinations of expert-expert, expert-novice, novice-coach, etc. When talking together on their telephones, two or more distantly separated AUGMENT users can collaborate in a manner very similar to this.","paragraph_end":true,"start":2484.2658220291123,"text":"This is being done countless times every day throughout the country, in different combinations of expert-expert, expert-novice, novice-coach, etc. When talking together on their telephones, two or more distantly separated AUGMENT users can collaborate in a manner very similar to this."},{"end":2513.9118560791003,"index":267,"markdown_text":"Suppose that two workers, Smith and Jones, want to set up and operate in a Shared-Screen Conferencing mode.","paragraph_end":false,"start":2506.3423999786364,"text":"Suppose that two workers, Smith and Jones, want to set up and operate in a Shared-Screen Conferencing mode."},{"end":2526.2372516632067,"index":268,"markdown_text":"Smith is in Princeton, working on host Office-4, and Jones is in San Francisco, working on host Office-12 -- and both of these host computers are connected to the same network.","paragraph_end":false,"start":2513.9118560791003,"text":"Smith is in Princeton, working on host Office-4, and Jones is in San Francisco, working on host Office-12 -- and both of these host computers are connected to the same network."},{"end":2536.1586486816395,"index":269,"markdown_text":"Assumedly they are in telephone contact when they decide to work in this shared-screen mode to collaborate on Smith's current job.","paragraph_end":true,"start":2526.2372516632067,"text":"Assumedly they are in telephone contact when they decide to work in this shared-screen mode to collaborate on Smith's current job."},{"end":2543.918338012694,"index":270,"markdown_text":"Jones will enter the command \"Share (display with user) SMITH!","paragraph_end":false,"start":2536.1586486816395,"text":"Jones will enter the command \"Share (display with user) SMITH!"},{"end":2548.4840423583973,"index":271,"markdown_text":"On host OF12!","paragraph_end":false,"start":2543.918338012694,"text":"On host OF12!"},{"end":2555.131347656249,"index":272,"markdown_text":"Viewing (other display)!!\"","paragraph_end":true,"start":2548.4840423583973,"text":"Viewing (other display)!!\""},{"end":2562.370391845702,"index":273,"markdown_text":"Smith will enter the command \"Share (display with user) JONES!","paragraph_end":false,"start":2555.131347656249,"text":"Smith will enter the command \"Share (display with user) JONES!"},{"end":2564.7033042907706,"index":274,"markdown_text":"On host OF4!","paragraph_end":false,"start":2562.370391845702,"text":"On host OF4!"},{"end":2571.866666666666,"index":275,"markdown_text":"Showing (this display)!!\"","paragraph_end":true,"start":2564.7033042907706,"text":"Showing (this display)!!\""},{"end":2589.4754311243687,"index":276,"markdown_text":"To give these commands, each person only entered the characters shown in upper case (entry case actually irrelevant), plus the digits, plus an \"OK Key\" action where each exclamation point is shown.","paragraph_end":true,"start":2571.866666666666,"text":"To give these commands, each person only entered the characters shown in upper case (entry case actually irrelevant), plus the digits, plus an \"OK Key\" action where each exclamation point is shown."},{"end":2602.0995232264195,"index":277,"markdown_text":"Whatever tool that Jones is currently using will continue responding to his controlling actions, as evidenced by various feedback and portrayal actions in the windows on his screen.","paragraph_end":false,"start":2589.4754311243687,"text":"Whatever tool that Jones is currently using will continue responding to his controlling actions, as evidenced by various feedback and portrayal actions in the windows on his screen."},{"end":2610.0083510080967,"index":278,"markdown_text":"Smith's screen image will clear, and be replaced with a replica of Jones' screen image -- multiple windows and all.","paragraph_end":false,"start":2602.0995232264195,"text":"Smith's screen image will clear, and be replaced with a replica of Jones' screen image -- multiple windows and all."},{"end":2620.459125010172,"index":279,"markdown_text":"For the duration of the shared-screen session, Smith's screen image will continue to replicate what is shown on Jones' screen.","paragraph_end":true,"start":2610.0083510080967,"text":"For the duration of the shared-screen session, Smith's screen image will continue to replicate what is shown on Jones' screen."},{"end":2626.4858545939123,"index":280,"markdown_text":"There are provisions for passing control back and forth between workers.","paragraph_end":false,"start":2620.459125010172,"text":"There are provisions for passing control back and forth between workers."},{"end":2634.284558741251,"index":281,"markdown_text":"For instance, Jones can pass control to Smith so that Smith can show him some material or method of work.","paragraph_end":false,"start":2626.4858545939123,"text":"For instance, Jones can pass control to Smith so that Smith can show him some material or method of work."},{"end":2641.066666666666,"index":282,"markdown_text":"There are also provisions for the subsequent entry and departure of other conference participants.","paragraph_end":true,"start":2634.284558741251,"text":"There are also provisions for the subsequent entry and departure of other conference participants."},{"end":2645.0600869576133,"index":283,"markdown_text":"Embedding the Graphic Illustrations","paragraph_end":true,"start":2641.066666666666,"text":"Embedding the Graphic Illustrations"},{"end":2654.279962412516,"index":284,"markdown_text":"For complete support of document development, it is important to provide integrated means for developing, viewing, and manipulating graphical portrayals.","paragraph_end":false,"start":2645.0600869576133,"text":"For complete support of document development, it is important to provide integrated means for developing, viewing, and manipulating graphical portrayals."},{"end":2666.953536860148,"index":285,"markdown_text":"These portrayals should be part of the working files from the very start, to be studied, passed about in mail, shared in Conferencing mode, edited, captioned, labelled, and moved about within the document structure.","paragraph_end":false,"start":2654.279962412516,"text":"These portrayals should be part of the working files from the very start, to be studied, passed about in mail, shared in Conferencing mode, edited, captioned, labelled, and moved about within the document structure."},{"end":2681.017742792765,"index":286,"markdown_text":"Furthermore, active, relevant citation links pointing to these graphical constructs would be installed in and followed from textual passages throughout the associated set of documents (including Mail and Journal documents).","paragraph_end":true,"start":2666.953536860148,"text":"Furthermore, active, relevant citation links pointing to these graphical constructs would be installed in and followed from textual passages throughout the associated set of documents (including Mail and Journal documents)."},{"end":2689.976481882731,"index":287,"markdown_text":"AUGMENT's architecture and file structure were designed for this end, and a good bit of the associated implementation is in place.","paragraph_end":true,"start":2681.017742792765,"text":"AUGMENT's architecture and file structure were designed for this end, and a good bit of the associated implementation is in place."},{"end":2700.217450586955,"index":288,"markdown_text":"A graphical data structure can be attached to any given file node, and there are basic capabilities for composing, studying, and modifying graphical diagrams.","paragraph_end":false,"start":2689.976481882731,"text":"A graphical data structure can be attached to any given file node, and there are basic capabilities for composing, studying, and modifying graphical diagrams."},{"end":2709.957881418864,"index":289,"markdown_text":"When formatting for a suitably equipped photo-typesetting device, there are formatting directives to designate the position and scale for placing these diagrams on a page.","paragraph_end":false,"start":2700.217450586955,"text":"When formatting for a suitably equipped photo-typesetting device, there are formatting directives to designate the position and scale for placing these diagrams on a page."},{"end":2720.133333333333,"index":290,"markdown_text":"An AUGMENT file with integrated text and graphics can thus be mapped automatically onto a high-quality document whose pages contain both text and line drawings.","paragraph_end":true,"start":2709.957881418864,"text":"An AUGMENT file with integrated text and graphics can thus be mapped automatically onto a high-quality document whose pages contain both text and line drawings."},{"end":2734.7201343854267,"index":291,"markdown_text":"Our goal here was for what we call an \"illustrative graphics\" capability -- basic to which is a command that, when directed toward any conventional \"plotter\" file, will translate it into a diagram attached to a designated node.","paragraph_end":false,"start":2720.133333333333,"text":"Our goal here was for what we call an \"illustrative graphics\" capability -- basic to which is a command that, when directed toward any conventional \"plotter\" file, will translate it into a diagram attached to a designated node."},{"end":2746.863200124105,"index":292,"markdown_text":"In this way we can make use of graphic constructs developed within almost any applications system, most of which have provision for outputting \"conventional\" plotter files.","paragraph_end":true,"start":2734.7201343854267,"text":"In this way we can make use of graphic constructs developed within almost any applications system, most of which have provision for outputting \"conventional\" plotter files."},{"end":2757.955977376302,"index":293,"markdown_text":"The most important next step is to adapt a bit-mapped display as an AUGMENT workstation, so the integrated text and graphics can be viewed and manipulated on the same screen.","paragraph_end":false,"start":2746.863200124105,"text":"The most important next step is to adapt a bit-mapped display as an AUGMENT workstation, so the integrated text and graphics can be viewed and manipulated on the same screen."},{"end":2770.0298833211264,"index":294,"markdown_text":"Heretofore, to do graphic work, an author has had to attach a Tektronix 4014 storage-tube display to the special printer/graphic port of her AUGMENT workstation.","paragraph_end":false,"start":2757.955977376302,"text":"Heretofore, to do graphic work, an author has had to attach a Tektronix 4014 storage-tube display to the special printer/graphic port of her AUGMENT workstation."},{"end":2780.6666666666665,"index":295,"markdown_text":"This has made use of AUGMENT graphics slow and expensive enough to limit the number of user groups who have developed the integrated use of mixed text and graphics.","paragraph_end":true,"start":2770.0298833211264,"text":"This has made use of AUGMENT graphics slow and expensive enough to limit the number of user groups who have developed the integrated use of mixed text and graphics."},{"end":2782.7481981197993,"index":296,"markdown_text":"Conclusion","paragraph_end":true,"start":2780.6666666666665,"text":"Conclusion"},{"end":2789.095783917109,"index":297,"markdown_text":"AUGMENT's unique provisions stemmed for the most part from the conceptual framework within which AUGMENT was developed.","paragraph_end":false,"start":2782.7481981197993,"text":"AUGMENT's unique provisions stemmed for the most part from the conceptual framework within which AUGMENT was developed."},{"end":2795.7237043062846,"index":298,"markdown_text":"For instance, consider the pervasive and significant changes in the environment in which humans will be doing their knowledge work.","paragraph_end":false,"start":2789.095783917109,"text":"For instance, consider the pervasive and significant changes in the environment in which humans will be doing their knowledge work."},{"end":2809.249867884318,"index":299,"markdown_text":"Note that the habits, methods, conventions, intuitions, etc., that comprise the \"ways\" in which we think, work and collaborate, are for the most part products of many centuries of cultural evolution -- in a radically different environment.","paragraph_end":false,"start":2795.7237043062846,"text":"Note that the habits, methods, conventions, intuitions, etc., that comprise the \"ways\" in which we think, work and collaborate, are for the most part products of many centuries of cultural evolution -- in a radically different environment."},{"end":2817.618913904826,"index":300,"markdown_text":"With a radically different environment, this constant process of cultural evolution can be expected to take some radical turns.","paragraph_end":true,"start":2809.249867884318,"text":"With a radically different environment, this constant process of cultural evolution can be expected to take some radical turns."},{"end":2826.1090586344403,"index":301,"markdown_text":"The AUGMENT developmental framework assumed that many of these \"ways\" are candidates now for change in directions that heretofore would not have been beneficial.","paragraph_end":false,"start":2817.618913904826,"text":"The AUGMENT developmental framework assumed that many of these \"ways\" are candidates now for change in directions that heretofore would not have been beneficial."},{"end":2840.8366587320966,"index":302,"markdown_text":"The AUGMENT system emerged as a first step in considering a few such changes, which perhaps can improve human capability for doing knowledge work because their new \"ways\" will enable us more effectively to harness the new tools toward more effective basic capability.","paragraph_end":false,"start":2826.1090586344403,"text":"The AUGMENT system emerged as a first step in considering a few such changes, which perhaps can improve human capability for doing knowledge work because their new \"ways\" will enable us more effectively to harness the new tools toward more effective basic capability."},{"end":2845.4666666666667,"index":303,"markdown_text":"(This is very different from trying to \"automate\" our old \"ways\" of doing things.)","paragraph_end":true,"start":2840.8366587320966,"text":"(This is very different from trying to \"automate\" our old \"ways\" of doing things.)"},{"end":2850.611355272929,"index":304,"markdown_text":"As an example, consider the \"What You See Is What You Get\" (WYSIWYG) syndrome.","paragraph_end":false,"start":2845.4666666666667,"text":"As an example, consider the \"What You See Is What You Get\" (WYSIWYG) syndrome."},{"end":2853.8242835680644,"index":305,"markdown_text":"It is a highly touted feature for many vendors.","paragraph_end":false,"start":2850.611355272929,"text":"It is a highly touted feature for many vendors."},{"end":2861.1509613672893,"index":306,"markdown_text":"It provides a definite advantage for the final process of converting a computer-held document to a nicely formatted hard copy.","paragraph_end":false,"start":2853.8242835680644,"text":"It provides a definite advantage for the final process of converting a computer-held document to a nicely formatted hard copy."},{"end":2863.1928219477336,"index":307,"markdown_text":"But what does it do for authorship?","paragraph_end":false,"start":2861.1509613672893,"text":"But what does it do for authorship?"},{"end":2865.895285097758,"index":308,"markdown_text":"Well, in our framework, it has a negative impact.","paragraph_end":false,"start":2863.1928219477336,"text":"Well, in our framework, it has a negative impact."},{"end":2874.0126824061076,"index":309,"markdown_text":"We were happy to abandon those constraints of lines and pages and other formatting geometry which did not contribute to matters of content and structure.","paragraph_end":false,"start":2865.895285097758,"text":"We were happy to abandon those constraints of lines and pages and other formatting geometry which did not contribute to matters of content and structure."},{"end":2887.745198694865,"index":310,"markdown_text":"We have chosen instead to provide the authorship process with structured files, flexible addressing, flexible window-size viewing, level and truncation viewspecs, etc. -- things that would be awkward or impossible to provide in a WYSIWYG environment.","paragraph_end":false,"start":2874.0126824061076,"text":"We have chosen instead to provide the authorship process with structured files, flexible addressing, flexible window-size viewing, level and truncation viewspecs, etc. -- things that would be awkward or impossible to provide in a WYSIWYG environment."},{"end":2896.2929892222087,"index":311,"markdown_text":"This provides the authorship phase with flexibility and power for studying and manipulating content and structure that we wouldn't consider trading off for WYSIWYG.","paragraph_end":false,"start":2887.745198694865,"text":"This provides the authorship phase with flexibility and power for studying and manipulating content and structure that we wouldn't consider trading off for WYSIWYG."},{"end":2898.8,"index":312,"markdown_text":"Save it for the production phase.","paragraph_end":true,"start":2896.2929892222087,"text":"Save it for the production phase."},{"end":2902.7449028968813,"index":313,"markdown_text":"Here is another bit of culture that deserves re-examination.","paragraph_end":false,"start":2898.8,"text":"Here is another bit of culture that deserves re-examination."},{"end":2907.5208390235903,"index":314,"markdown_text":"Consider the dictum, \"Easy to learn, and natural to use.\"","paragraph_end":false,"start":2902.7449028968813,"text":"Consider the dictum, \"Easy to learn, and natural to use.\""},{"end":2909.703551578522,"index":315,"markdown_text":"Or, \"User friendly.\"","paragraph_end":false,"start":2907.5208390235903,"text":"Or, \"User friendly.\""},{"end":2916.6521881103517,"index":316,"markdown_text":"The question is, for whom are you judging that things will be easy, or natural, or friendly?","paragraph_end":false,"start":2909.703551578522,"text":"The question is, for whom are you judging that things will be easy, or natural, or friendly?"},{"end":2931.1101568222048,"index":317,"markdown_text":"For designers of craft-work tool systems, very different perceptions of this issue are warranted between a system for the occasional, weekend do-it-yourself person and a system to be heavily used day after day by professionals.","paragraph_end":false,"start":2916.6521881103517,"text":"For designers of craft-work tool systems, very different perceptions of this issue are warranted between a system for the occasional, weekend do-it-yourself person and a system to be heavily used day after day by professionals."},{"end":2938.2179962158207,"index":318,"markdown_text":"The AUGMENT User Interface System enables us easily to configure either kind of a tool collection.","paragraph_end":true,"start":2931.1101568222048,"text":"The AUGMENT User Interface System enables us easily to configure either kind of a tool collection."},{"end":2945.587155914307,"index":319,"markdown_text":"This paper describes part of what is provided to professional knowledge workers who do a significant amount of authorship work.","paragraph_end":false,"start":2938.2179962158207,"text":"This paper describes part of what is provided to professional knowledge workers who do a significant amount of authorship work."},{"end":2960.4000000000005,"index":320,"markdown_text":"We observe no more difficulty in their learning how to employ this relatively large collection of tools than one would expect for professional woodworkers in their learning about the relatively large collection of chisels and other tools of their trade.","paragraph_end":true,"start":2945.587155914307,"text":"We observe no more difficulty in their learning how to employ this relatively large collection of tools than one would expect for professional woodworkers in their learning about the relatively large collection of chisels and other tools of their trade."},{"end":2970.6707781791692,"index":321,"markdown_text":"It is a basic part of our framework that, to augment human knowledge workers, attention must be given not only to tools, but to methods and skills as well.","paragraph_end":false,"start":2960.4000000000005,"text":"It is a basic part of our framework that, to augment human knowledge workers, attention must be given not only to tools, but to methods and skills as well."},{"end":2980.3609470367437,"index":322,"markdown_text":"Because of space limitations, the scope of this paper was restricted to a summary of those tool provisions within AUGMENT that especially facilitate the authorship process.","paragraph_end":false,"start":2970.6707781791692,"text":"Because of space limitations, the scope of this paper was restricted to a summary of those tool provisions within AUGMENT that especially facilitate the authorship process."},{"end":2992.4035839080816,"index":323,"markdown_text":"A full description of \"How to use AUGMENT to ...\" would definitely need to include methods of work that effectively harness these tool provisions, and the special kinds of skills that yield unique payoff in executing these methods.","paragraph_end":false,"start":2980.3609470367437,"text":"A full description of \"How to use AUGMENT to ...\" would definitely need to include methods of work that effectively harness these tool provisions, and the special kinds of skills that yield unique payoff in executing these methods."},{"end":3002.853713226319,"index":324,"markdown_text":"This is true for every tool system, of course, but it seems especially true in this case because many AUGMENT provisions do not fit into the general cultural background of our authorship process.","paragraph_end":true,"start":2992.4035839080816,"text":"This is true for every tool system, of course, but it seems especially true in this case because many AUGMENT provisions do not fit into the general cultural background of our authorship process."},{"end":3014.000000000001,"index":325,"markdown_text":"Perhaps the best way for very brief summarization of what AUGMENT's users feel about its unique features is simply to say that those who leave its working environment really miss them.","paragraph_end":true,"start":3002.853713226319,"text":"Perhaps the best way for very brief summarization of what AUGMENT's users feel about its unique features is simply to say that those who leave its working environment really miss them."},{"end":3015.7410088062297,"index":326,"markdown_text":"References","paragraph_end":true,"start":3014.000000000001,"text":"References"},{"end":3018.5139817476283,"index":327,"markdown_text":"Ref-1: Engelbart, D.","paragraph_end":false,"start":3015.7410088062297,"text":"Ref-1: Engelbart, D."},{"end":3031.6080186843883,"index":328,"markdown_text":"C., \"Toward Integrated, Evolutionary Office Automation Systems,\" Proceedings of the 26th Joint Engineering Management Conference, Denver, CO, Oct. 16-18, 1978, pp.","paragraph_end":false,"start":3018.5139817476283,"text":"C., \"Toward Integrated, Evolutionary Office Automation Systems,\" Proceedings of the 26th Joint Engineering Management Conference, Denver, CO, Oct. 16-18, 1978, pp."},{"end":3033.179704475404,"index":329,"markdown_text":"63-68.","paragraph_end":false,"start":3031.6080186843883,"text":"63-68."},{"end":3036.4023014068616,"index":330,"markdown_text":"(AUGMENT,71279,)","paragraph_end":true,"start":3033.179704475404,"text":"(AUGMENT,71279,)"},{"end":3038.5445991516126,"index":331,"markdown_text":"Ref-2: Engelbart, D.","paragraph_end":false,"start":3036.4023014068616,"text":"Ref-2: Engelbart, D."},{"end":3039.3054138183606,"index":332,"markdown_text":"C., R.","paragraph_end":false,"start":3038.5445991516126,"text":"C., R."},{"end":3040.6668735504163,"index":333,"markdown_text":"W. Watson and J.","paragraph_end":false,"start":3039.3054138183606,"text":"W. Watson and J."},{"end":3047.1037746429456,"index":334,"markdown_text":"C. Norton, \"The Augmented Knowledge Workshop,\" AFIPS 66912842,"text":"Ref-6: Watson, Richard W., \"User Interface Design Issues for a Large Interactive System,\" AFIPS Conference Proceedings, Volume 45, AFIPS Press, 1976, Montvale, NJ, pp."},{"end":3153.9448822021504,"index":349,"markdown_text":"357-364.","paragraph_end":false,"start":3151.7325103759786,"text":"357-364."},{"end":3157.0974060058616,"index":350,"markdown_text":"(AUGMENT,27171,)","paragraph_end":true,"start":3153.9448822021504,"text":"(AUGMENT,27171,)"},{"end":3158.9594055175803,"index":351,"markdown_text":"Ref-7: Engelbart, D.","paragraph_end":false,"start":3157.0974060058616,"text":"Ref-7: Engelbart, D."},{"end":3165.446359252932,"index":352,"markdown_text":"C., \"Design Considerations for Knowledge Workshop Terminals,\" AFIPS Conference Proceedings, Volume 42, pp.","paragraph_end":false,"start":3158.9594055175803,"text":"C., \"Design Considerations for Knowledge Workshop Terminals,\" AFIPS Conference Proceedings, Volume 42, pp."},{"end":3171.242578125002,"index":353,"markdown_text":"221-227, National Computer Conference, June 4-8, 1973.","paragraph_end":false,"start":3165.446359252932,"text":"221-227, National Computer Conference, June 4-8, 1973."},{"end":3174.024694824221,"index":354,"markdown_text":"(AUGMENT,14851,)","paragraph_end":true,"start":3171.242578125002,"text":"(AUGMENT,14851,)"},{"end":3175.706503295901,"index":355,"markdown_text":"Ref-8: Engelbart, D.","paragraph_end":false,"start":3174.024694824221,"text":"Ref-8: Engelbart, D."},{"end":3187.348982238772,"index":356,"markdown_text":"C., \"Collaboration Support Provisions in AUGMENT,\" OAC '84 Digest (Proceedings of the 1984, AFIPS Office Automation Conference, Los Angeles, Ca., February 20-22).","paragraph_end":false,"start":3175.706503295901,"text":"C., \"Collaboration Support Provisions in AUGMENT,\" OAC '84 Digest (Proceedings of the 1984, AFIPS Office Automation Conference, Los Angeles, Ca., February 20-22)."},{"end":3190.266666666669,"index":357,"markdown_text":"(OAD,2221,)","paragr
