m allows one to \"send\" complete, structured documents as well as small messages. In an authorship environment, an important role for \"electronic mail\" is for the control and distribution of documents -- where small, throw-away messages are considered to be but a special class of document. An author should be able to bundle up any combination of text and graphics, in the forms that he has been using for studying and manipulating them -- and send the bundle to other workers. In AUGMENT, such a bundle is just like any other file structure, and can be studied and manipulated, incorporated into other files (documents), saved or deleted.\n\nRecorded Mail -- AUGMENT's Journal System. When mailing a document, an AUGMENT worker may optionally specify that it be installed as a \"recorded\" item. In this case, before distributing the item, the system will make a permanent record if it, as a file in a specified Journal collection. And, just as though it had been published, this recorded Journal item cannot later be changed. The system assigns a straightforward accession identifier (a simple number), and any authorized worker is henceforth guaranteed access to that Journal item by specifying the name of the Journal-collection and the Journal-item number -- e.g., as specified in the link \"<OAD,2237,>\".\n\nA given journal may be set up to serve multiple hosts and is much like a special library. It has its collection of documents, and AUGMENT provides associated support processes for entry, cataloging, retrieval, and access.\n\nTogether with the linking capability described above, a Journal system provides an extremely effective form of \"recorded dialog.\" Cross-reference links between a succession of Journal items produces an inter-linked network of collaborative contributions -- plans, outlines, document drafts, schedules, short comments, detailed critiques, reference material, etc. The on-line worker can follow these links very easily and, using multiple windows and flexible viewing options, can make very effective use of such records.\n\nFor instance, consider a detailed commentary directed toward a \"preliminary design\" document recorded in a given Journal collection. The author writing the commentary could view the design document in one window and his developing commentary document in another. He can easily establish links in his commentary to cite any passage in the design document -- e.g., a statement, a term in the statement, or a diagram. Then this author would submit his commentary into the Journal, perhaps specifying a list of colleagues for \"distribution.\" Each listed user would automatically receive a mail item announcing this new Journal entry, giving subject, author, date, etc., and the all-important link to the new Journal file containing the commentary. Any such recipient can subsequently study both the commentary and its cited planning document in a similar, multi-window, link-assisted manner.\n\nFurthermore, this second reader could develop and submit his own recorded commentary, which because of the citation power of AUGMENT links could be as short and to the point as: \"Frankly, John, I think your comment in (DDD,xxx,aa) is a mistake! Didn't you notice the earlier assumption in (DDD,xxx,bb)? Maybe you should go back to Tom's earlier requirements document -- especially at (EEE,yy,cc).\" (Here, \"DDD\" and \"EEE\" represent Journal names, \"xxx\", \"yyy\", and \"zzz\" represent Journal item numbers, and \"aa\", \"bb\", and \"cc\" represent addresses pointing to specific passages in those Journal files.)\n\nIn official parlance, \"retrieval\" is the finding out about the existence of a relevant piece of information, whereas \"access\" is the subsequent process of gaining possession of the information. For users of AUGMENT's Journal system, retrieval is immensely facilitated by the widespread use of citation links. When one can follow them as easily as can a practiced AUGMENT worker, these links provide extremely effective retrieval support. We have supplemented this with some simple, automatically generated catalog files, which made a rather nice balance. Access is provided by direct Jump on a reference link if the file is on line; if it isn't, AUGMENT asks the worker if she wants it retrieved, and a simple affirmative response automatically launches a request for the system operator to retrieve the file from its archive tape, after which the worker is notified of its availability via electronic mail.\n\nA private document can be submitted into a Journal. In this case, only those workers listed at Journal-entry time can get access to the central copy. Such a private item would not be listed or indexed in the \"public\" catalogs.\n\nWe have used the Journal system very heavily since 1970 to support AUGMENT's development activity; many customers have employed it heavily since 1975. There are about 100,000 entries recorded in the original Journal now (I don't know about other, newer AUGMENT Journal collections). We found that as workers became at home in this environment, they were increasingly free about submitting their items to the \"public.\" It became evident that the scientific tradition of active and open interchange has some solid relevance to the collaborative processes in our smaller, \"colleague communities.\" Time and again a worker would come across others' dialog and be able to contribute some valuable information (sometimes a one-sentence comment with a critical citation link). Often the payoff went the other way: the new party found immediate value in an old piece of recorded dialog.\n\nShared-Screen Teleconferencing. Consider a case where two people sit down to work together at a terminal, where they can both see the screen(s), and where either one can take over the controls. This is being done countless times every day throughout the country, in different combinations of expert-expert, expert-novice, novice-coach, etc. When talking together on their telephones, two or more distantly separated AUGMENT users can collaborate in a manner very similar to this.\n\nSuppose that two workers, Smith and Jones, want to set up and operate in a Shared-Screen Conferencing mode. Smith is in Princeton, working on host Office-4, and Jones is in San Francisco, working on host Office-12 -- and both of these host computers are connected to the same network. Assumedly they are in telephone contact when they decide to work in this shared-screen mode to collaborate on Smith's current job.\n\nJones will enter the command \"Share (display with user) SMITH! On host OF12! Viewing (other display)!!\"\n\nSmith will enter the command \"Share (display with user) JONES! On host OF4! Showing (this display)!!\"\n\nTo give these commands, each person only entered the characters shown in upper case (entry case actually irrelevant), plus the digits, plus an \"OK Key\" action where each exclamation point is shown.\n\nWhatever tool that Jones is currently using will continue responding to his controlling actions, as evidenced by various feedback and portrayal actions in the windows on his screen. Smith's screen image will clear, and be replaced with a replica of Jones' screen image -- multiple windows and all. For the duration of the shared-screen session, Smith's screen image will continue to replicate what is shown on Jones' screen.\n\nThere are provisions for passing control back and forth between workers. For instance, Jones can pass control to Smith so that Smith can show him some material or method of work. There are also provisions for the subsequent entry and departure of other conference participants.\n\nEmbedding the Graphic Illustrations\n\nFor complete support of document development, it is important to provide integrated means for developing, viewing, and manipulating graphical portrayals. These portrayals should be part of the working files from the very start, to be studied, passed about in mail, shared in Conferencing mode, edited, captioned, labelled, and moved about within the document structure. Furthermore, active, relevant citation links pointing to these graphical constructs would be installed in and followed from textual passages throughout the associated set of documents (including Mail and Journal documents).\n\nAUGMENT's architecture and file structure were designed for this end, and a good bit of the associated implementation is in place.\n\nA graphical data structure can be attached to any given file node, and there are basic capabilities for composing, studying, and modifying graphical diagrams. When formatting for a suitably equipped photo-typesetting device, there are formatting directives to designate the position and scale for placing these diagrams on a page. An AUGMENT file with integrated text and graphics can thus be mapped automatically onto a high-quality document whose pages contain both text and line drawings.\n\nOur goal here was for what we call an \"illustrative graphics\" capability -- basic to which is a command that, when directed toward any conventional \"plotter\" file, will translate it into a diagram attached to a designated node. In this way we can make use of graphic constructs developed within almost any applications system, most of which have provision for outputting \"conventional\" plotter files.\n\nThe most important next step is to adapt a bit-mapped display as an AUGMENT workstation, so the integrated text and graphics can be viewed and manipulated on the same screen. Heretofore, to do graphic work, an author has had to attach a Tektronix 4014 storage-tube display to the special printer/graphic port of her AUGMENT workstation. This has made use of AUGMENT graphics slow and expensive enough to limit the number of user groups who have developed the integrated use of mixed text and graphics.\n\nConclusion\n\nAUGMENT's unique provisions stemmed for the most part from the conceptual framework within which AUGMENT was developed. For instance, consider the pervasive and significant changes in the environment in which humans will be doing their knowledge work. Note that the habits, methods, conventions, intuitions, etc., that comprise the \"ways\" in which we think, work and collaborate, are for the most part products of many centuries of cultural evolution -- in a radically different environment. With a radically different environment, this constant process of cultural evolution can be expected to take some radical turns.\n\nThe AUGMENT developmental framework assumed that many of these \"ways\" are candidates now for change in directions that heretofore would not have been beneficial. The AUGMENT system emerged as a first step in considering a few such changes, which perhaps can improve human capability for doing knowledge work because their new \"ways\" will enable us more effectively to harness the new tools toward more effective basic capability. (This is very different from trying to \"automate\" our old \"ways\" of doing things.)\n\nAs an example, consider the \"What You See Is What You Get\" (WYSIWYG) syndrome. It is a highly touted feature for many vendors. It provides a definite advantage for the final process of converting a computer-held document to a nicely formatted hard copy. But what does it do for authorship? Well, in our framework, it has a negative impact. We were happy to abandon those constraints of lines and pages and other formatting geometry which did not contribute to matters of content and structure. We have chosen instead to provide the authorship process with structured files, flexible addressing, flexible window-size viewing, level and truncation viewspecs, etc. -- things that would be awkward or impossible to provide in a WYSIWYG environment. This provides the authorship phase with flexibility and power for studying and manipulating content and structure that we wouldn't consider trading off for WYSIWYG. Save it for the production phase.\n\nHere is another bit of culture that deserves re-examination. Consider the dictum, \"Easy to learn, and natural to use.\" Or, \"User friendly.\" The question is, for whom are you judging that things will be easy, or natural, or friendly? For designers of craft-work tool systems, very different perceptions of this issue are warranted between a system for the occasional, weekend do-it-yourself person and a system to be heavily used day after day by professionals. The AUGMENT User Interface System enables us easily to configure either kind of a tool collection.\n\nThis paper describes part of what is provided to professional knowledge workers who do a significant amount of authorship work. We observe no more difficulty in their learning how to employ this relatively large collection of tools than one would expect for professional woodworkers in their learning about the relatively large collection of chisels and other tools of their trade.\n\nIt is a basic part of our framework that, to augment human knowledge workers, attention must be given not only to tools, but to methods and skills as well. Because of space limitations, the scope of this paper was restricted to a summary of those tool provisions within AUGMENT that especially facilitate the authorship process. A full description of \"How to use AUGMENT to ...\" would definitely need to include methods of work that effectively harness these tool provisions, and the special kinds of skills that yield unique payoff in executing these methods. This is true for every tool system, of course, but it seems especially true in this case because many AUGMENT provisions do not fit into the general cultural background of our authorship process.\n\nPerhaps the best way for very brief summarization of what AUGMENT's users feel about its unique features is simply to say that those who leave its working environment really miss them.\n\nReferences\n\nRef-1: Engelbart, D. C., \"Toward Integrated, Evolutionary Office Automation Systems,\" Proceedings of the 26th Joint Engineering Management Conference, Denver, CO, Oct. 16-18, 1978, pp. 63-68. (AUGMENT,71279,)\n\nRef-2: Engelbart, D. C., R. W. Watson and J. C. Norton, \"The Augmented Knowledge Workshop,\" AFIPS Conference Proceedings, Volume 42, pp. 9-21, National Computer Conference, June 4-8, 1973. (AUGMENT,14724,)\n\nRef-3: Michael, Elizabeth K., Dirk H. van Nouhuys, Beverly R. Boli, Raphael Rom, and Ann C. Weinberg, \"Document Production and Control Systems,\" Phase One report of Document Production and Control Systems Design Study, by the Augmentation Research Center, SRI International, for AF Rome Air Development Center, Contract F30602-76-C-003, March 1, 1977. (AUGMENT,37730,)\n\nRef-4: Boli, Beverly R., Harvey G Lehtman, Elizabeth K. Michael, Raphael Rom, Dirk H. van Nouhuys, and Nina Zolotow, \"A Model Document Production System,\" Phase Two report of Document Production and Control Systems Design Study, by the Augmentation Research Center, SRI International, for AF Rome Air Development Center, Contract F30602-76-C-003, July 30, 1977. (AUGMENT,29000,)\n\nRef-5: Engelbart, D. C., \"Toward High-Performance Knowledge Workers,\" OAC '82 Digest (Proceedings of the 1982, AFIPS Office Automation Conference, San Francisco, Ca., April 5-7), pp. 279-290. (AUGMENT, 81010,)\n\nRef-6: Watson, Richard W., \"User Interface Design Issues for a Large Interactive System,\" AFIPS Conference Proceedings, Volume 45, AFIPS Press, 1976, Montvale, NJ, pp. 357-364. (AUGMENT,27171,)\n\nRef-7: Engelbart, D. C., \"Design Considerations for Knowledge Workshop Terminals,\" AFIPS Conference Proceedings, Volume 42, pp. 221-227, National Computer Conference, June 4-8, 1973. (AUGMENT,14851,)\n\nRef-8: Engelbart, D. C., \"Collaboration Support Provisions in AUGMENT,\" OAC '84 Digest (Proceedings of the 1984, AFIPS Office Automation Conference, Los Angeles, Ca., February 20-22). (OAD,2221,)"},"1891-11-09-hope-is-the-thing-with-feathers":{"content":"“Hope” is the thing with feathers\n\nBy Emily Dickinson\n\n“Hope” is the thing with feathers -  \nThat perches in the soul -  \nAnd sings the tune without the words -    \nAnd never stops - at all -  \n\nAnd sweetest - in the Gale - is heard -  \nAnd sore must be the storm -  \nThat could abash the little Bird  \nThat kept so many warm -\n\nI’ve heard it in the chillest land -  \nAnd on the strangest Sea -  \nYet - never - in Extremity,  \nIt asked a crumb - of me.","plain_text":"“Hope” is the thing with feathers\nBy Emily Dickinson\n“Hope” is the thing with feathers -That perches in the soul -And sings the tune without the words -And never stops - at all -  \nAnd sweetest - in the Gale - is heard -And sore must be the storm -That could abash the little BirdThat kept so many warm -\nI’ve heard it in the chillest land -And on the strangest Sea -Yet - never - in Extremity,It asked a crumb - of me."},"1987-11-13-hypertext-87-keynote-address":{"content":"# [Hypertext '87 Keynote Address]<!--silent-->\n\n## [Introduction]<!--silent-->\n\nI'm a Johnny-come-lately to hypertext: I didn't get started until 1967, and what is especially fun about being here is that I can pay public tribute to the two real trailblazers who have inspired me and hordes of my students who have gone off to do their own independent hypertext projects. The first is the incomparable, one and only Doug Engelbart, who has been working at this since the late 1950s. Many people don't know that. Some of them may go back in ancient history and remember his mind-blowing demonstration at the 1968 Fall Joint Computer Conference, but at that point he had already been working in this area for a decade. And he invented just about everything the rest of us have been doing since then. I will just mention two of his major contributions.\n\n\n## [Doug Engelbart]<!--silent-->\n\n\nThe first is office automation; he was doing office automation, in particular word processing, before the terms had even been coined. IBM invented the phrase, in connection with the MCST, the magnetic card selectric typewriter. Word processing was the right term, since words were all you could process. However, you were lucky if you could replace a small word with a larger word and not have it flow off the edges of the card. At that time Doug Engelbart was really working on idea processing. He was, of course, the inventor of outline processing, as it is known today. He had links, he had text searches with a variety of wild-card options. How many of today's commercial hypertext systems let you perform text searches with wild cards and all kinds of other conditions? Not very many, I believe. He spent a great deal of time on the user interface. He had a variety of interesting command language shells that were at once the singular strength of his NLS system and, to those who were not willing to invest the time to learn them, also a weakness. He invented the mouse and the five-key chord input device and lots of other things.\n\n\nSo there is this whole catalog of stuff that Doug's group at SRI implemented in the middle to late 1960s on a little timesharing system on the SDS 940, the kind of CPU that today would fit in your wristwatch. All that functionality ran on a computer of that power!\n\n\nThe second major contribution, and the one that most people don't know at all, even if they know something about Doug's efforts toward the augmentation of human intellect, is that he is the father of software engineering in the modern sense. Long before scientists such as Dijkstra and Bauer started writing about formal software engineering, Doug and his crew had been living it. This really was a bootstrap community of tool builders and tool users. So on that little timesharing system on the 940, they had meta-assemblers and compiler-compilers and ways of generating special-purpose problem-oriented languages. They had any number of tools and understood the value of building tools. To me that was a revelation. In my group at Brown University we were assembly-language hackers, and what was important to us was efficiency and writing the tightest possible code so that we could get sophisticated programs to run in real time. The whole idea of spending a lot of time and energy on first building tools was really novel.\n\n\n## [Ted Nelson]<!--silent-->\n\n\nSo much for my paean of praise to Doug Engelbart. I think we are all here because of him and also because of Ted Nelson, the second trailblazer, who coined the word \"hypertext\" and dozens of other words-being wordsmith and master showman par excellence and also a polemicist of the first rank. Ted is a self-proclaimed visionary who deserves the title, and he turned on generations of people with \"Computer Lib/Dream Machines\", a landmark work that still today-I reread a lot of it just a few days ago to prepare myself for this talk- is good reading. Ted coined that wonderful phrase, \"If computers are the wave of the future, displays are the surfboards.\" Well, I've used that bon mot ever since, and I think he is absolutely right: displays are the way to go. But one of the neat things is that we are discovering lots of other media that fit in: it's not just display technology, it's not just text and graphics any more. Video, high-quality sound and other media are also available now.\n\n\nAnother thing we should thank Ted for is that he did not just say, \"branch, link, make arbitrary associations.\" He tried very early to impose some discipline on linking, and introduced us to such wonderful artifices as stretch text, text that elastically expands and contracts in place. In other words, you don't select something and then it blows up to an alternate statement or adds a level of indentation; no, the text should expand and contract smoothly, and you might use a lever to make things get more or less terse. I have not yet seen an example of this, and it's really tough to write for, but it's a very interesting idea.\n\n\nTed also talked about performing hypergrams: a picture annotated with text whose components you can point to and they will perform-animate themselves, for example. This was a decade before the MIT Media Lab did this sort of thing. Also I really think Ted deserves the credit for thinking multimedia so early. He also talked about zippered lists, collateral text and all kinds of other weird and wacky ideas, some of which are workable, perhaps, some of which are not, but all of them are sure stimulating!\n\n\nOne of the most important things he taught me was that this is a new medium and you really can't be constrained to thinking about it in the old ways. Don't copy old bad habits; think about new organizations, new ways of doing things, and take advantage of this new medium.\n\n\nThe other important thing he really led me to focus on is that there is a great application for hypertext and hypermedia, not just for research, not just for maintaining your own personal database, but in teaching. And that is one of my major themes here: how we have used hypertext and hypermedia in teaching at Brown University.\n\n\n## [Hypertext '87 Workshop Significance]<!--silent-->\n\n\nWell, here we are at the first hypertext workshop and we have to ask, perhaps rhetorically, has hypertext arrived? has the millennium arrived? And of course there are several answers to those questions. The state of the art is reviewed in Jeff Conklin's excellent article in IEEE Computer of September 1987. There are also articles in the press hyping hypertext, and about the hype in hypertext. Conversely, some of the recent major books on computing in the humanities don't mention hypertext, don't mention hypermedia, don't really deal with the issue of branching texts. They are more concerned with typography, telecommunications and other issues that are very important. Even this 1986 book by Eugene Provenzo, \"Beyond the Gutenberg Galaxy\", which is delightful reading, does not mention it. And the forthcoming book by Christopher Turk about humanities computing, \"The Computer and the Scholar\", does not devote a chapter to this phenomenon, although electronic communication is certainly mentioned a lot, as are tools for processing text.\n\n\nWhen you look at the publicity and at systems such as Xerox's NoteCards, Owl's Guide, and especially Apple's HyperCard, you get the impression that we are about to go over the knee of the exponential curve. I really believe we are. HyperCard in particular, despite all its limitations, is beautifully engineered, and has a wonderful user interface, especially for hypertext-style linking. It will really acculturate our computer user community. It is simple enough, despite its complexity, that a lot of people can get access to it at a relatively simple level. There is a lot of traffic on networks already about it and people are exchanging stackware. I think it will be a mass-media cult phenomenon, rather like MacPaint and MacDraw. I think Apple has done a really brilliant job of getting it out there, and although it's a fraction of what Doug and Ted and others of us believe to be the potential of hypertext or hypermedia, I think it's very strong and will do a lot to get people interested in our field. Presumably, it will be improved in future generations.\n\n\nThe success of this workshop also says we are about to go over the knee of the exponential curve. There is a staggering amount of information in the participant statements and in the papers, and many good and interesting papers. I learned a lot from just browsing through them and reading a few carefully. Frank Halasz's paper is especially recommended, in terms of stating problem areas and an agenda for future problems we ought to be tackling.\n\n\nSo, while hypertext is not in the humanities computing books yet, which means that humanities scholars by and large do not yet know it exists, it will come through the HyperCard phenomenon, through the proceedings of this workshop, and the networking that this workshop will engender. So my summary is that no, the millennium has not arrived yet, but we are about to go over the knee.\n\n\nNext, let's ask what is different about hypertext? Is there really anything new to it? You can trivialize it and say, \"Nothing new, we've had network databases all our lives, what's the big deal?\" Or you can hype it and say that it is an intellectual breakthrough. Or you can simply say there are lots of interesting ideas, but there is also a lot of hard work to do to make it really happen on a broad scale. Hypertext is basically clay, and we have to mold it; that is what this workshop is all about: starting to mold that clay.\n\n\nWhy did it take so long to have this workshop, to have HyperCard, when the technology certainly has been out there and there have been a lot of proof-of-concept demonstrations? Well, the first reason is the classical inertia problem. Why did it take twenty years for Doug Engelbart's mouse to be commercialized? One reason is there is tremendous inertia in this so-called progressive field. New ideas take forever to be popularized. The second reason is, of course, that there are technology problems. It takes a long time to develop something as cheap and as user-friendly as the Macintosh, for example, and to displace the idiosyncratic interfaces we have all created and been forced to live with. Now the technology is definitely here, and there is certainly no excuse for waiting any longer.\n\n\n## [HES (Hypertext Editing System)]<!--silent-->\n\n\nNext I'm going to give you my own personal view of some hypertext chronology at Brown University and then do some wrapping up. I ran into Ted Nelson completely by accident at the 1967 Spring Joint Computer Conference, and gossiped with him about what we had both been doing since we left Swarthmore College. He told me about his ideas on hypertext, and one thing led to another and Ted started coming to Providence, using, as he is proud to say in Computer Lib, his own money. We started working on the Hypertext Editing System, which was essentially dual-purpose. One purpose was to produce printed documents nicely and efficiently, since at that time the technology on IBM/360 systems was batch cards for editing (mag card selectrics were not yet common). But the main purpose was to explore this hypertext concept.\n\n\nI want to mention a couple of numbers, just so that you can size the system. We ran our 2250 graphics display application in a 128K partition of a multiprogrammed operating system, on an IBM/360 Model 50 with 512K of memory, our mainframe at that time. An IBM/360 Model 50 is slower than a vanilla Mac and has less memory. Yet in that one partition we ran the Hypertext Editing System, and there was a complete timesharing system in another partition. There was no virtual memory, everything was done with System as a bootleg graphics project were paid by my IBM graphics contract. When our project monitor, Sam Matsa, saw it, he liked it, so we came out of the closet and started showing it around at a variety of sites where IBM had large customers. It was also ported to a number of university sites. Even after the project was frozen and we went on to the next-generation system, it was sold by IBM (unbeknownst to me and Ted and others who had worked on it) to the Apollo mission team at the Houston Manned Spacecraft Center and used to produce documentation that went up with Apollo, I'm proud to say.\n\n\nHere are some technical features of that early system. It had arbitrary-length strings rather than fixed-length lines or statements, and edits with arbitrary-length scope, for example for insert, delete, move and copy. It had unidirectional branches automatically arranged in menus. It had splices that were branches invisible to on-line users that allowed the printer to go through a branching text. It had text instances. Some of the papers here discuss the differences between inclusion and reference. Instances are references, so that if you changed, for example, a piece of legal boilerplate that was referenced in multiple places, the change would show up in all the places that referenced it. Instances are a standard idea from computer graphics-no big deal.\n\n\nOur data structure was a pointer-rich data structure on arbitrary-length pages. Edits were done by pointer manipulation, not, in general, by character manipulation. This technique was, in effect, a precursor of the piece-table technique, where you work with pointers to text rather than the raw text itself. We did software paging of arbitrary-length pages in this 128K partition, and that turned out to be too complex. Page-replacement algorithms when the slots have variable size are just not very manageable. We used Text/360, which was a batch formatter rather like MlT's Runoff, to produce hard copy. And so we could fulfill both of our objectives, producing hard-copy documents and fooling around with hypertext.\n\n\nLet me tell you a little bit about the fooling around with hypertext. Ted's schematic of his hypertext of patents had a kind of hierarchical structure and then cross-references. These implemented the cross-references in the patents, and we also had various forms of indices; the real diagram was about the size of a large blueprint, as I remember, and hard to navigate on paper and on-line. We had already come to the point where Ted, who designed it, was able to go through the hypertext pretty well, but some of the rest of us had difficulty following it-it was not exactly obvious where you were. This, of course, is the classical lost-in hyperspace problem, which has been mentioned by one and all; I won't elaborate on it here because it is amply discussed in the Proceedings. We already started getting the notion that the richer the hypertext, the greater the navigational problem. But we arranged careful demos in which we knew exactly where we had to go, and people were impressed.\n\n\nIn early 1968 we made the rounds of a number of large customers for IBM equipment, for example, The New York Times and Time/Life. And we found that our system was essentially too complex for them to understand. Remember that these people were producing magazines and newspapers and other forms of printed material. At most they had typographic programs that set type and maybe some software that did display ad management. But the idea of sitting on-line behind a tube and actually authoring and editing and rearranging and cross-referencing really was more than they were willing to believe you needed to do or should do. It was \"very interesting.\" It was futury and researchy, and I remember this particular demo we did at Time/Life when our audience said, \"That's great, but it will take us at least 10 years before people will be willing to sit down behind tubes and do anything on-line.\"\n\n\nFortunately, they were wrong, and by the mid 1970s such places as Newsday on Long Island had bought precursors of the ATEX text-editing systems, and, much sooner than anyone would have predicted, this very conservative field of newspaper and magazine publishing switched over to editing on-line. All those people who sat down and typed with two fingers did in fact learn to organize their thoughts on-line on a VDT, despite dire predictions that they never would.\n\n\nThe other thing I learned was something about the art of giving demos: use progressive disclosure, don't show it to them all at once. We used a standard 32-key IBM function keyboard, used in every computer-aided design installation in the world, and all the engineers were perfectly used to it, loved it, had no problems with it. But when we gave demos to people whose business was words, not engineering designs, they would freak out- they couldn't handle all those editing buttons, one of which brought in another overlay of 32 formatting functions. So I learned very early to make a plastic overlay which I essentially used to cover up all but five of the editing buttons: insert, delete, move, copy and jump. Then we would do an entire demo for half an hour or so with that, let people play, and then we would say, \"But wait, there's more . . . \". And then we would play peek-a-boo, strip off the first overlay and, lo and behold, there was another row of function keys. And so by doing progressive disclosure with a sequence of increasingly revealing overlays we managed not to swamp and panic people.\n\n\nThe last lesson learned during that period: real estate, screen real estate. We saw that people would sit behind a 2250 Mod 4 display with software character generation, where they could put up teeny tiny 8- or 10-point text with the screen flickering wildly-three, four frames a second, sometimes two. And they would prefer that to a smaller screen or larger, steadier characters, simply because context is so extremely important. It drives me wild to sit behind a small-screen Mac and be restricted to this little 3\" x 5\" card image, not even able to scroll around on a drawing to get more of a view. We have to deal with this problem of getting more screen real estate so that it feels like something we normally work with, even something as limited as 8 1/2\" x 11\". We have to get bigger displays, and we must have easier ways of moving around on the displays we do have, because these little tiny windows just drive you crazy. I'm going to come back to that.\n\n\nIn 1968, I finally met Doug Engelbart and experienced his landmark demonstration at the Fall Joint Computer Conference, about as gutsy and risky a demo as I have ever seen. He was doing multiperson collaboration, using all of his tools on-line interactively-it was a tour de force. He did outline processing, browsing and jumping around through multiple files with text and graphics, using key words and other view specs to act as viewing filters over his data, using text-searching capabilities, and so on.\n\n\n## [FRESS (File Retrieval and Editing System)]<!--silent-->\n\n\nLater that year I went on with my students to design FRESS, a File Retrieval and Editing System. My design goal was to steal or improve on the best ideas from Doug's NLS and put in some things we really liked from the Hypertext Editing System-a more freeform editing style, no limits to statement size, for example. But the intellectual debt is clearly to Doug's NLS.\n\n\nOne of the things I worked very hard on was output-input device independence and the idea of a logical device. We wanted to get this system to run on anything from teletypewriters, which were very common at that time, up to and including minicomputers with multiple windows on vector displays. We had a 16-Kbyte IMLAC mini with a vector display that was used very extensively-a single one, because that was all we could afford.\n\n\nSo we developed the notion of virtual output and input devices, along the lines of Fortran logical l/O units. Virtual input devices were an important part of a graphics subroutine package called GPGS that we designed in 1971 in the Netherlands as part of a three-university consortium. And that idea went into the CORE, GKS, and PHIGS standard graphics packages and now into PHIGS+, the latest graphics package specified by an ad hoc standards group in 1987, almost two decades later.\n\n\nFRESS was of course multiterminal, it supported outline processing, arbitrary-length strings, edits, etc.; it had no size limitations. I really believe in that-I think it is important not to feel yourself constrained. One of the really important ways in which unconstrained size and scope ought to work is that it should not interfere with performance. In FRESS, to a first approximation, you could not tell the difference between working with a two-page printed file and a 200-page printed file because of the software paging scheme we used. And yes, of course, some tables grow with file size, but in general the system was just as peppy with large files as with small files, and I think that is really important for users. While keeping a lot of small files may be a feature for some people, it's a bug for many others, and the system should not force you into an unnatural usage pattern.\n\n\nWe also went from unidirectional links in Hypertext Editing System to bidirectional links with explainers in FRESS. I think bidirectionality is important: the 'come from' is as important as the 'go to.' Key words were possible on every element, both for on-line and off-line trails. Links could be \"typed\" with these key words. We also experimented with protection down to the character level, and every single one of a hundred-odd functions could have a bit in a mask that said whether you could perform that function on this block of text or not. It was overkill, and we haven't done it since, but it certainly was interesting.\n\n\nWe had an ability to see the structure space, a visualization of all the structure in the text, the outline structure and the cross-reference structure. You could do structural rearrangements in that structure space in a quick overview mode and you would thereby induce those same edits in the text itself. And of course edits made in the text would also appear in the structure space. That duality was a very useful and popular feature.\n\n\nThe most popular feature, however, was undo. I will claim that, to the best of my knowledge, FRESS was the first system to have an undo. We saved every edit in a shadow version of the data structure, and that allowed us to do both an autosave and an undo. I think the most important feature in any system built today has to be indefinite undo and redo. One level is better than zero, but not enough, and wholly inadequate for serious work. It doesn't matter how it's done, whether it's journaling, transcripting done with inverses, whatever, but you've got to have it.\n\n\nWe had escapes to the command shell, so that you could do some useful work outside the system. That is another theme I want to return to: whether you should have a self-contained, self-sufficient hyperuniverse or should be able to go outside and do things you need to do that it does not (and should not) provide.\n\n\nI want to tell you a little about the sociopolitical climate then, because these really are the barefoot-in-the-snow stories that most of you, fortunately, have never been exposed to. When we were doing this work at Brown University, nobody said \"Hey, it's great you're building tools for humanists, that's wonderful, when can we have it?\" In fact, quite the reverse. Those were the days of accounting on mainframes. You got a certain amount of 'funny money' allocated every year and you had to make it last, and if you ran out, tough. Maybe you could argue for a little more and maybe you couldn't. So it was extremely important to make our system efficient so that people could afford to use it on their funny-money budget. I had serious warfare with the vice president in charge of computing about whether the software should even be allowed on the system, because if it were on the system, then people would use it. And that would subvert the true purpose of computers, which was to produce numbers for engineers and scientists. He said, literally, \"If you want to screw around with text, use a typewriter.\" I essentially had to blackmail him by saying there would be a revolution by the humanists on campus if they found out how much the engineers and scientists were spending on computing when they couldn't have any.\n\n\nThese were the best of times, these were the worst of times. They were the best of times in that there were a lot of technology and \"proof of concept\" systems out there. They were the worst of times because we really had to fight to get these ideas recognized as legitimate fields of inquiry and to get real users. In about 1972, I watched Doug do his standard 90-minute pitch with video and live demos to a group of DARPA contractors who were the best and the brightest in the country at that time. And one of the very best people said, basically, \"Doug, I don't see what you're doing there that I can't do on my glass teletype with a good line editor.\" But Doug, fortunately, kept going, we kept going, other people did. And by the mid 1970s we finally got around to doing what I had always wanted to do since Ted first tuned me in to the idea, which was try out this on-line stuff in education.\n\n\nSo, very briefly, I'll describe two experiments. In one, funded by the Exxon Education Foundation, a physicist and I did a course called Man, Energy and Environment. Students did a lot of reading of hypertext on-line about the subject, but no writing.\n\n\nThen we did a much more ambitious experiment in the following two years, funded by the National Endowment for the Humanities. For this English poetry course we used a very large hypertext with well over a thousand links. Three times a week students had to sign up for an hour each on our one and only Imlac graphics workstation and do their reading and their commenting on-line, following trails, making trails. We used a kind of progressive disclosure: the first time through they saw the poem they were supposed to critique and analyze, with no references. The second time they saw it with a few links to other poems on the same subject or by the same poet. There would also be some word glosses, some professional analyses, but still not very much context. And they would be reviewing what other students had written on the first pass, and the teacher's and TAs' comments as well, and then they would form a new opinion of what they had read. And then they would do that a third time, when they had yet more access to what people had written communally and what had previously been put in the database. It was very interesting. People loved it, despite the fact the system went down a lot, that it was hard to get at it, that you had to schedule time. And this \"communal text,\" as it was called by the poetry people who wrote about it later, became very rich in additional annotations. Electronic graffiti, as I thought of them.\n\n\nThe reason I encouraged such annotations was that I remembered that when I was in college with Ted, I would always grab the dirtiest copy of a book in the library, rather than the cleanest one, because the dirtiest ones had the most marginalia, which I found very helpful. It really worked here: on average, students wrote three times as much for both analyses and informal discourse as they did in the control group, and that pleased the faculty who were very much concerned with encouraging oral and written expression. One of the things we found is that people express themselves differently. Some people who were very articulate in a classroom setting were pretty silent once they got behind the tube. And vice versa, so a lot of shy violets really became vocal once they got behind the tube.\n\n\nWhat we discovered from that experiment is that people could follow trails and enjoyed it. But what we did not see was a lot of people blazing trails. There wasn't enough time, the interface wasn't good enough, response wasn't fast enough-a variety of reasons. So we never really proved a central hypothesis, that people can and will blaze trails, not just follow them. I will make a statement that says, despite the experience with Xerox's NoteCards system, despite whatever other experiences there are out there with programming environment browsers and so on, by and large the hypothesis remains unproven that, with little guidance, people can construct really good trails, really good webs that help them and help other readers. I think we still need to test that hypothesis in a major way.\n\n\n## [DPS (Document Presentation System)]<!--silent-->\n\n\nThe next thing we did after FRESS was put to bed in the late 1970s was to make a rather different hypertext system, our third by that time. What we were interested in then was power tools for producing primarily graphical documents. I want to describe to you very quickly some of the things we did in our electronic document project.\n\n\nThere were three components to the system. One was a viewer's component in which prepared screen pages could be viewed. Figure 1 shows four iconic buttons, each one a composite of individual images drawn by hand and then, with the help of the authoring component, put together on a screen page and buttonized. This is typical of what a maintenance and repair technician would see as a typical page in the little maintenance and repair Dynabook icon. The other two components were for the author. The first was for making graphics for individual pages or their parts, a MacDraw-MacPaint combination. The component most interesting for this audience, shown in Figure 2, was the hypertext creation component for constructing pages, chapters and links. It was multiwindow, so that a page under construction could occupy either the entire screen or a portion of it. This allowed multiple pages or even chapters to be visible simultaneously so that you could create links from one to another. The whole interface is manipulated directly: there's almost no typing and lots of pointing at objects and manipulating them. This was back in 1979 when that was not so common.\n\n\nWe spent a lot of time figuring out how to elide, that is, hide, information graphically. We had a 'detail button' that let us view things at varying levels of detail. So the author could move these windows around, look at pages and chapters at arbitrary levels of detail, iconically create various kinds of buttons and specify actions to take place when the reader invoked a button. Such actions could include animation and taking a link to another page. The model for this hypertext is more a finite-state automaton in which transitions take you from one mode to the other rather than of a static hypertext with static links. In particular, using a keywording facility, you could cause different parts to appear on the same page as a function of the keywords encountered during traversal. So on two successive accesses a page might look quite different through hiding information or showing new buttons.\n\n\nThe system had three automatically created navigation aids. First, it had a time line, as shown in Figure 3, that you could use to travel back in time, consisting of buttons of miniature page icons stamped with time and date, with color coding keying you to chapters. This is little bit like the 'recent page' in HyperCard, but here we are time traveling: we are not just going back to an image, we are going back to the state that accompanied our view of that image, because a page, as you remember, can change over time. Another was the 'neighbors' display: the current page is displayed in context with (on the left) a filmstrip of all the places you could have come from, and (on the right) all the places you could go to, and again you can pick any of these miniatures and go there directly. In general, this could be an arbitrarily complicated display with dozens of sources and destinations; then you use iconic scroll bars to move over these filmstrips. The third navigation aid was a visual index of buttons of page miniatures arranged by key words, color-coded by chapter.\n\n\nWe learned some new lessons from this third system. It had great power tools for the author, but it still involved a tremendous amount of hand work. What you really would like in making fairly regular documents, like maintenance and repair manuals, is to drive the creation of the pictorial or textual, audio, video, etc., explanations directly from deep knowledge about the problem domain, the particular problem to be solved, the design rules for creating explanations in the various media, and the user of the manual. You want, in effect, to produce an automated authoring capability in which most of these things can be driven from these knowledge bases. Steve Feiner's Ph.D. dissertation and his work since then describes such automated authoring.\n\n\n## [BALSA (Brown ALgorithm Simulator and Animator)]<!--silent-->\n\n\nThe next system I would like to mention briefly is not a hypertext system, but it formed our thinking about ingredients at the nodes of a hypertext. This is the BALSA (Brown ALgorithm Simulator and Animator) environment, created in 1983 by Bob Sedgewick, who is now chairman of computer science at Princeton University, and Marc Brown, who last year received an ACM distinguished dissertation award for this work. In the course of a lecture we use BALSA on a network of workstations in the classroom to look at dynamic visualizations of programs implementing algorithms and data structures. If a picture is worth a thousand words, a dynamic picture of time-varying objects is worth a thousand static ones. We need dynamics at the nodes, not just static pictures and text. Something one learns quickly about user-controlled real-time animation is that hardware power is really essential. If it takes 10 seconds to put up the next picture because that's how long the hardware needs, you do not have kinesthetic feedback, you do not have smoothness and visual continuity, it is not responsive. It makes a great demo, but it drives you crazy in real life.\n\n\n## [IRIS (Institute for Research on Information and Scholarship)]<!--silent-->\n\n\nWe have been using electronically assisted teaching now for five years and our new building contains two workstation auditoriums. BALSA has been integrated into a variety of courses in computer science and math, as well as in neural science and even political science. These experiences led to Brown's wholesale commitment to workstations and in fact to the creation in 1983 of IRIS, our Institute for Research on Information and Scholarship. IRIS not only creates scholars' workstation software but also has a completely symmetrical program evaluation branch where social scientists with an interest in this area study needs, requirements and impact of this technology on scholarly work. And by the way, 'scholarly work' to us is not just the work of faculty members but also that of students-we're all scholars on this bus.\n\n\nWe set up IRIS at a time when there was a lot of enthusiasm in front-running universities for buying into the workstation revolution, looking at the Xerox PARC model of distributed computation and saying, \"We want to deliver tools that really take advantage of the expressive power of such workstations.\" So IRIS and other organizations on other campuses were created to develop scholarly tools. I think, though, that there is still a paucity of such scholarly tools and we are at the very beginning of understanding what they might be.\n\n\n## [Nine Issues]<!--silent-->\n\n\n### [1. User-Controlled 3D Animation]<!--silent-->\n\n\nI'm going to sum up what I think are some key areas we all ought to be looking at. Here are nine quick items. My first concern is that systems may develop great infrastructure, great hypertext glue, but what's at the nodes? As with the 2D animation in BALSA, I think we should be aiming at user-controlled 3D animation, where the interactive user has control over what is being shown, the level of detail, the visualizations employed, and so on. This is just a wide-open area that needs a lot of study, not to mention vast hardware power.\n\n\n### [2. Standards]<!--silent-->\n\n\nSecond, Ted talks a lot about the docuverse, a mythical entity out there that is all-inclusive and contains everything. But instead, right now we are building docu-islands; none of our systems talk to each other, they are wholly incompatible. So we are all working the same agenda, more or less, but we can't exchange stuff; there is no exchange format, there is no universality, and furthermore, our systems are closed systems. In a sense, they are making the same mistake as the all-in-one environments in personal computing. Yes, they give you a word processor and a spreadsheet editor and a business graphics package, etc., but none of them are really satisfactory. And our experience with FRESS, where we had to escape to command language, showed that it is really important to be able to go outside. So it's not enough to bundle the HyperCard package with every Mac you buy. It really ought to be migrated down, become part of the toolbox, so that application programmers can take their applications and take advantage of a standard linking protocol that works within and between applications.\n\n\nSo I'm going to raise a red-flag word: standards. I'm a firm believer in standards. And everybody will say it is absolutely premature to standardize when we don't even know what the hell we're talking about. We are still in the experimental phase. I believe that. But if we don't start thinking about standards, five years from now we are going to have a wealth of these little docu-islands which are totally incompatible, and that's crazy.\n\n\n### [3. Real-World Domain Size]<!--silent-->\n\n\nPoint number three is size. We are still in the toy problem stage. There has not been a decent-sized hypertext built yet. And we won't know what it is like until we deal with the kinds of documentation problems that people in the real world deal with. People have graphed the number of pages of technical manuals for fighter aircraft against time. In World War II, we had 1K page documentation per fighter aircraft; in Korea, 10K; in Vietnam, 100K. It's an exponential curve. The F-16 has 600K pages, and the advanced tactical fighter will probably have somewhere around a million and a half pages of technical documentation. It is, in effect, a giant hypertext that should be linked, and done with change control.\n\n\n### [4. Versioning]<!--silent-->\n\n\nAnd that is my fourth point. We have to do something about versioning and change control in the large. But we won't have a fighting chance to kill paper and become an on-line community until we tackle the kinds of problems that paper solves for us today. Paper is convenient, you can carry it around and versions are easily created and maintained. Hypertext is not as accessible as paper, and it certainly isn't prepared to deal with the size problems as paper does.\n\n\n### [5. Navigation]<!--silent-->\n\n\nThe fifth problem is navigation, lost in hyperspace. Some people say we need content and structure query, we need virtual structures, composites; others say we need pruning. All of this is true. I find the notion of dynamically constructing a hypertext very intriguing, but very difficult to do in general. My point of view is that in a sense hypertext gives us a goto, and a goto, as we all know, produces spaghetti. At most we have invented the if-then-else-if, with hierarchy. That's our one structured flow-of-control concept, where you have some sense of what you are looking at in your hyperdocument. Well, we need to discover what the equivalents of other constructs are. As Ted did at the start, we have to invent other document forms that somehow become standard so that people have pattern recognition and say, \"Ah, yes, I know how that one works.\" So we need new forms, new flow of control kinds of constructs besides just unbridled goto-ness of directed graph structures.\n\n\nThe other navigation aid we need is a tell-me-what you've-got, which probably entails AI. Instead of just syntax, we need some notion of semantics at the nodes. We need to be able to derive new knowledge from old, using inference engines. Just storing billions and billions of facts that are tied together is not going to do it for us; that will just drown us in associations.\n\n\n### [6. Hypermedia Designers]<!--silent-->\n\n\nThe sixth point is that we need hypermedia designers. Remember how crazy everybody went when they got the ability to print multiple fonts? We got 'fontitis.' Then people discovered color screens and we got 'coloritis,' without any rules, without any design discipline. Now we've got linkitis,' and people with no graphic design experience or talent are going to throw stuff together and it will look terrible. You all know that one of the interesting things that happened after Gutenberg was typography. For a while after Gutenberg, type designers were using manuscript letterforms. And they were using erasers and paintbrushes to doctor the stuff the typesetting machine had set so it would look more like an old-fashioned manuscript and people would be familiar with it. It took a long while for people to understand that this new medium demanded a new style, a new typography. So typography is an invention, and it is nearly as important as the printing press in the first place. We don't want to mimic the old manuscript form in our hypertexts.\n\n\nAldus Manutius discovered modern pages. And pages gave us a new way to cross-reference, to talk about content, to index, and that technology took a while, but it made information a great deal more accessible. So we need people who are concerned about layout and design and typography of hypermedia and can think about classification and indexing and how we put things together.\n\n\n### [7. Don't Metaphor Me In]<!--silent-->\n\n\nBut we don't want to put things together in such a way that there is one point of view, because if we've learned one thing from interactive tools up to now is that multiview is the way people work. You can not have it just one way. We need an update to Larry Tesler's \"Don't mode me in.\" Jim Foley and I recently came up with \"Don't metaphor me in.\" Don't give me a little card image and say, \"That's all you've got, because that's what I thought you should want for your virtual shoebox.\" There have got to be multiple modalities and the designers have to be able to deal with that. So that was issue number seven: don't metaphor me in, don't give me only one way of looking at things.\n\n\n### [8. Accessibility/Portability]<!--silent-->\n\n\nPoint eight: accessibility, portability-I want a laptop Dynabook. And I also want wallscreen-size displays. I want my whiteboard-sized hypertext display, and not until it's that big do I think we can really start working with hypertext. Hoker performs the following experiment. Take The Wall Street Journal and move around a little cutout the size of a Mac screen and see how happy you are with The Wall Street Journal, versus looking at a page of it in its entirety and immediately picking up what you might be interested in reading. A very persuasive point.\n\n\n### [9. Sociopolitico-Economic Problems]<!--silent-->\n\n\nAnd finally, point number nine: we must think about the sociopolitico-economic problems. We have not come to grips with issues of intellectual property rights and compensation. Congress and the U.S. Patent Office and copyright lawyers and so on do not understand what is involved here and need to be educated. If we shrink away from those issues and leave it to them, there is going to be absolute chaos. Ted, again, has written extensively on this issue and has postulated some interesting mechanisms for coping with the problems.\n\n\nSo there are essentially three classes of people. There are the visionary hypers who say, not only is the glass not half empty, it's overflowing with opportunities and possibilities and technology push of CD ROMs, 100 megabytes and 100 MIPS on your personal computer in just a few years, and so on. They are saying everything is great and we have a wonderful universe to explore.\n\n\nThen there are the skeptics who say, not only is the glass not half full, but there was probably never any water in it to begin with. And I'm a third type sitting on the fence somewhere in between these two extremes, saying, I've used a lot of hypertext systems and I think they are neat and show a lot of potential. I think we are just at the very beginning and it's too early to rush to judgment, but it's clear that collectively we have a lot of hard but exciting work to do to make this technology work and to create what has been called the electronic Alexandria.\n\nAuthor's Present Address: Andries van Dam, Brown University, Dept. of Computer Science, 115 Waterman St., Providence, RI 02912.\n\nPermission to copy without fee all or part of this material is granted provided that the copies are not made or distributed for direct commercial advantage, the ACM copyright notice and the title of the publication and its date appear, and notice is given that copying is by permission of the Association for Computing Machinery. To copy otherwise, or to republish, requires a fee and/or specific permission.\n\nCopyright 1996 ACM 1072-5520/96/0300 $3.50\n\nText extracted from the article printed in Communications of the ACM (Vol. 31, No. 7). Printed by permission of ACM.","plain_text":"I'm a Johnny-come-lately to hypertext: I didn't get started until 1967, and what is especially fun about being here is that I can pay public tribute to the two real trailblazers who have inspired me and hordes of my students who have gone off to do their own independent hypertext projects. The first is the incomparable, one and only Doug Engelbart, who has been working at this since the late 1950s. Many people don't know that. Some of them may go back in ancient history and remember his mind-blowing demonstration at the 1968 Fall Joint Computer Conference, but at that point he had already been working in this area for a decade. And he invented just about everything the rest of us have been doing since then. I will just mention two of his major contributions.\n\nThe first is office automation; he was doing office automation, in particular word processing, before the terms had even been coined. IBM invented the phrase, in connection with the MCST, the magnetic card selectric typewriter. Word processing was the right term, since words were all you could process. However, you were lucky if you could replace a small word with a larger word and not have it flow off the edges of the card. At that time Doug Engelbart was really working on idea processing. He was, of course, the inventor of outline processing, as it is known today. He had links, he had text searches with a variety of wild-card options. How many of today's commercial hypertext systems let you perform text searches with wild cards and all kinds of other conditions? Not very many, I believe. He spent a great deal of time on the user interface. He had a variety of interesting command language shells that were at once the singular strength of his NLS system and, to those who were not willing to invest the time to learn them, also a weakness. He invented the mouse and the five-key chord input device and lots of other things.\n\nSo there is this whole catalog of stuff that Doug's group at SRI implemented in the middle to late 1960s on a little timesharing system on the SDS 940, the kind of CPU that today would fit in your wristwatch. All that functionality ran on a computer of that power!\n\nThe second major contribution, and the one that most people don't know at all, even if they know something about Doug's efforts toward the augmentation of human intellect, is that he is the father of software engineering in the modern sense. Long before scientists such as Dijkstra and Bauer started writing about formal software engineering, Doug and his crew had been living it. This really was a bootstrap community of tool builders and tool users. So on that little timesharing system on the 940, they had meta-assemblers and compiler-compilers and ways of generating special-purpose problem-oriented languages. They had any number of tools and understood the value of building tools. To me that was a revelation. In my group at Brown University we were assembly-language hackers, and what was important to us was efficiency and writing the tightest possible code so that we could get sophisticated programs to run in real time. The whole idea of spending a lot of time and energy on first building tools was really novel.\n\nSo much for my paean of praise to Doug Engelbart. I think we are all here because of him and also because of Ted Nelson, the second trailblazer, who coined the word \"hypertext\" and dozens of other words-being wordsmith and master showman par excellence and also a polemicist of the first rank. Ted is a self-proclaimed visionary who deserves the title, and he turned on generations of people with \"Computer Lib/Dream Machines\", a landmark work that still today-I reread a lot of it just a few days ago to prepare myself for this talk- is good reading. Ted coined that wonderful phrase, \"If computers are the wave of the future, displays are the surfboards.\" Well, I've used that bon mot ever since, and I think he is absolutely right: displays are the way to go. But one of the neat things is that we are discovering lots of other media that fit in: it's not just display technology, it's not just text and graphics any more. Video, high-quality sound and other media are also available now.\n\nAnother thing we should thank Ted for is that he did not just say, \"branch, link, make arbitrary associations.\" He tried very early to impose some discipline on linking, and introduced us to such wonderful artifices as stretch text, text that elastically expands and contracts in place. In other words, you don't select something and then it blows up to an alternate statement or adds a level of indentation; no, the text should expand and contract smoothly, and you might use a lever to make things get more or less terse. I have not yet seen an example of this, and it's really tough to write for, but it's a very interesting idea.\n\nTed also talked about performing hypergrams: a picture annotated with text whose components you can point to and they will perform-animate themselves, for example. This was a decade before the MIT Media Lab did this sort of thing. Also I really think Ted deserves the credit for thinking multimedia so early. He also talked about zippered lists, collateral text and all kinds of other weird and wacky ideas, some of which are workable, perhaps, some of which are not, but all of them are sure stimulating!\n\nOne of the most important things he taught me was that this is a new medium and you really can't be constrained to thinking about it in the old ways. Don't copy old bad habits; think about new organizations, new ways of doing things, and take advantage of this new medium.\n\nThe other important thing he really led me to focus on is that there is a great application for hypertext and hypermedia, not just for research, not just for maintaining your own personal database, but in teaching. And that is one of my major themes here: how we have used hypertext and hypermedia in teaching at Brown University.\n\nWell, here we are at the first hypertext workshop and we have to ask, perhaps rhetorically, has hypertext arrived? has the millennium arrived? And of course there are several answers to those questions. The state of the art is reviewed in Jeff Conklin's excellent article in IEEE Computer of September 1987. There are also articles in the press hyping hypertext, and about the hype in hypertext. Conversely, some of the recent major books on computing in the humanities don't mention hypertext, don't mention hypermedia, don't really deal with the issue of branching texts. They are more concerned with typography, telecommunications and other issues that are very important. Even this 1986 book by Eugene Provenzo, \"Beyond the Gutenberg Galaxy\", which is delightful reading, does not mention it. And the forthcoming book by Christopher Turk about humanities computing, \"The Computer and the Scholar\", does not devote a chapter to this phenomenon, although electronic communication is certainly mentioned a lot, as are tools for processing text.\n\nWhen you look at the publicity and at systems such as Xerox's NoteCards, Owl's Guide, and especially Apple's HyperCard, you get the impression that we are about to go over the knee of the exponential curve. I really believe we are. HyperCard in particular, despite all its limitations, is beautifully engineered, and has a wonderful user interface, especially for hypertext-style linking. It will really acculturate our computer user community. It is simple enough, despite its complexity, that a lot of people can get access to it at a relatively simple level. There is a lot of traffic on networks already about it and people are exchanging stackware. I think it will be a mass-media cult phenomenon, rather like MacPaint and MacDraw. I think Apple has done a really brilliant job of getting it out there, and although it's a fraction of what Doug and Ted and others of us believe to be the potential of hypertext or hypermedia, I think it's very strong and will do a lot to get people interested in our field. Presumably, it will be improved in future generations.\n\nThe success of this workshop also says we are about to go over the knee of the exponential curve. There is a staggering amount of information in the participant statements and in the papers, and many good and interesting papers. I learned a lot from just browsing through them and reading a few carefully. Frank Halasz's paper is especially recommended, in terms of stating problem areas and an agenda for future problems we ought to be tackling.\n\nSo, while hypertext is not in the humanities computing books yet, which means that humanities scholars by and large do not yet know it exists, it will come through the HyperCard phenomenon, through the proceedings of this workshop, and the networking that this workshop will engender. So my summary is that no, the millennium has not arrived yet, but we are about to go over the knee.\n\nNext, let's ask what is different about hypertext? Is there really anything new to it? You can trivialize it and say, \"Nothing new, we've had network databases all our lives, what's the big deal?\" Or you can hype it and say that it is an intellectual breakthrough. Or you can simply say there are lots of interesting ideas, but there is also a lot of hard work to do to make it really happen on a broad scale. Hypertext is basically clay, and we have to mold it; that is what this workshop is all about: starting to mold that clay.\n\nWhy did it take so long to have this workshop, to have HyperCard, when the technology certainly has been out there and there have been a lot of proof-of-concept demonstrations? Well, the first reason is the classical inertia problem. Why did it take twenty years for Doug Engelbart's mouse to be commercialized? One reason is there is tremendous inertia in this so-called progressive field. New ideas take forever to be popularized. The second reason is, of course, that there are technology problems. It takes a long time to develop something as cheap and as user-friendly as the Macintosh, for example, and to displace the idiosyncratic interfaces we have all created and been forced to live with. Now the technology is definitely here, and there is certainly no excuse for waiting any longer.\n\nNext I'm going to give you my own personal view of some hypertext chronology at Brown University and then do some wrapping up. I ran into Ted Nelson completely by accident at the 1967 Spring Joint Computer Conference, and gossiped with him about what we had both been doing since we left Swarthmore College. He told me about his ideas on hypertext, and one thing led to another and Ted started coming to Providence, using, as he is proud to say in Computer Lib, his own money. We started working on the Hypertext Editing System, which was essentially dual-purpose. One purpose was to produce printed documents nicely and efficiently, since at that time the technology on IBM/360 systems was batch cards for editing (mag card selectrics were not yet common). But the main purpose was to explore this hypertext concept.\n\nI want to mention a couple of numbers, just so that you can size the system. We ran our 2250 graphics display application in a 128K partition of a multiprogrammed operating system, on an IBM/360 Model 50 with 512K of memory, our mainframe at that time. An IBM/360 Model 50 is slower than a vanilla Mac and has less memory. Yet in that one partition we ran the Hypertext Editing System, and there was a complete timesharing system in another partition. There was no virtual memory, everything was done with System as a bootleg graphics project were paid by my IBM graphics contract. When our project monitor, Sam Matsa, saw it, he liked it, so we came out of the closet and started showing it around at a variety of sites where IBM had large customers. It was also ported to a number of university sites. Even after the project was frozen and we went on to the next-generation system, it was sold by IBM (unbeknownst to me and Ted and others who had worked on it) to the Apollo mission team at the Houston Manned Spacecraft Center and used to produce documentation that went up with Apollo, I'm proud to say.\n\nHere are some technical features of that early system. It had arbitrary-length strings rather than fixed-length lines or statements, and edits with arbitrary-length scope, for example for insert, delete, move and copy. It had unidirectional branches automatically arranged in menus. It had splices that were branches invisible to on-line users that allowed the printer to go through a branching text. It had text instances. Some of the papers here discuss the differences between inclusion and reference. Instances are references, so that if you changed, for example, a piece of legal boilerplate that was referenced in multiple places, the change would show up in all the places that referenced it. Instances are a standard idea from computer graphics-no big deal.\n\nOur data structure was a pointer-rich data structure on arbitrary-length pages. Edits were done by pointer manipulation, not, in general, by character manipulation. This technique was, in effect, a precursor of the piece-table technique, where you work with pointers to text rather than the raw text itself. We did software paging of arbitrary-length pages in this 128K partition, and that turned out to be too complex. Page-replacement algorithms when the slots have variable size are just not very manageable. We used Text/360, which was a batch formatter rather like MlT's Runoff, to produce hard copy. And so we could fulfill both of our objectives, producing hard-copy documents and fooling around with hypertext.\n\nLet me tell you a little bit about the fooling around with hypertext. Ted's schematic of his hypertext of patents had a kind of hierarchical structure and then cross-references. These implemented the cross-references in the patents, and we also had various forms of indices; the real diagram was about the size of a large blueprint, as I remember, and hard to navigate on paper and on-line. We had already come to the point where Ted, who designed it, was able to go through the hypertext pretty well, but some of the rest of us had difficulty following it-it was not exactly obvious where you were. This, of course, is the classical lost-in hyperspace problem, which has been mentioned by one and all; I won't elaborate on it here because it is amply discussed in the Proceedings. We already started getting the notion that the richer the hypertext, the greater the navigational problem. But we arranged careful demos in which we knew exactly where we had to go, and people were impressed.\n\nIn early 1968 we made the rounds of a number of large customers for IBM equipment, for example, The New York Times and Time/Life. And we found that our system was essentially too complex for them to understand. Remember that these people were producing magazines and newspapers and other forms of printed material. At most they had typographic programs that set type and maybe some software that did display ad management. But the idea of sitting on-line behind a tube and actually authoring and editing and rearranging and cross-referencing really was more than they were willing to believe you needed to do or should do. It was \"very interesting.\" It was futury and researchy, and I remember this particular demo we did at Time/Life when our audience said, \"That's great, but it will take us at least 10 years before people will be willing to sit down behind tubes and do anything on-line.\"\n\nFortunately, they were wrong, and by the mid 1970s such places as Newsday on Long Island had bought precursors of the ATEX text-editing systems, and, much sooner than anyone would have predicted, this very conservative field of newspaper and magazine publishing switched over to editing on-line. All those people who sat down and typed with two fingers did in fact learn to organize their thoughts on-line on a VDT, despite dire predictions that they never would.\n\nThe other thing I learned was something about the art of giving demos: use progressive disclosure, don't show it to them all at once. We used a standard 32-key IBM function keyboard, used in every computer-aided design installation in the world, and all the engineers were perfectly used to it, loved it, had no problems with it. But when we gave demos to people whose business was words, not engineering designs, they would freak out- they couldn't handle all those editing buttons, one of which brought in another overlay of 32 formatting functions. So I learned very early to make a plastic overlay which I essentially used to cover up all but five of the editing buttons: insert, delete, move, copy and jump. Then we would do an entire demo for half an hour or so with that, let people play, and then we would say, \"But wait, there's more . . . \". And then we would play peek-a-boo, strip off the first overlay and, lo and behold, there was another row of function keys. And so by doing progressive disclosure with a sequence of increasingly revealing overlays we managed not to swamp and panic people.\n\nThe last lesson learned during that period: real estate, screen real estate. We saw that people would sit behind a 2250 Mod 4 display with software character generation, where
