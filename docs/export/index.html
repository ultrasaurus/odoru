ncouraging oral and written expression."},{"end":1658.4511308670042,"index":215,"markdown_text":"One of the things we found is that people express themselves differently.","paragraph_end":false,"start":1654.9964647293089,"text":"One of the things we found is that people express themselves differently."},{"end":1663.638135910034,"index":216,"markdown_text":"Some people who were very articulate in a classroom setting were pretty silent once they got behind the tube.","paragraph_end":false,"start":1658.4511308670042,"text":"Some people who were very articulate in a classroom setting were pretty silent once they got behind the tube."},{"end":1669.1999999999998,"index":217,"markdown_text":"And vice versa, so a lot of shy violets really became vocal once they got behind the tube.","paragraph_end":true,"start":1663.638135910034,"text":"And vice versa, so a lot of shy violets really became vocal once they got behind the tube."},{"end":1674.8765646934507,"index":218,"markdown_text":"What we discovered from that experiment is that people could follow trails and enjoyed it.","paragraph_end":false,"start":1669.1999999999998,"text":"What we discovered from that experiment is that people could follow trails and enjoyed it."},{"end":1678.66094083786,"index":219,"markdown_text":"But what we did not see was a lot of people blazing trails.","paragraph_end":false,"start":1674.8765646934507,"text":"But what we did not see was a lot of people blazing trails."},{"end":1685.148444366455,"index":220,"markdown_text":"There wasn't enough time, the interface wasn't good enough, response wasn't fast enough-a variety of reasons.","paragraph_end":false,"start":1678.66094083786,"text":"There wasn't enough time, the interface wasn't good enough, response wasn't fast enough-a variety of reasons."},{"end":1691.6960155487059,"index":221,"markdown_text":"So we never really proved a central hypothesis, that people can and will blaze trails, not just follow them.","paragraph_end":false,"start":1685.148444366455,"text":"So we never really proved a central hypothesis, that people can and will blaze trails, not just follow them."},{"end":1714.5424358367918,"index":222,"markdown_text":"I will make a statement that says, despite the experience with Xerox's NoteCards system, despite whatever other experiences there are out there with programming environment browsers and so on, by and large the hypothesis remains unproven that, with little guidance, people can construct really good trails, really good webs that help them and help other readers.","paragraph_end":false,"start":1691.6960155487059,"text":"I will make a statement that says, despite the experience with Xerox's NoteCards system, despite whatever other experiences there are out there with programming environment browsers and so on, by and large the hypothesis remains unproven that, with little guidance, people can construct really good trails, really good webs that help them and help other readers."},{"end":1719.9277400970457,"index":223,"markdown_text":"I think we still need to test that hypothesis in a major way.","paragraph_end":true,"start":1714.5424358367918,"text":"I think we still need to test that hypothesis in a major way."},{"end":1729.3586444854734,"index":224,"markdown_text":"The next thing we did after FRESS was put to bed in the late 1970s was to make a rather different hypertext system, our third by that time.","paragraph_end":false,"start":1719.9277400970457,"text":"The next thing we did after FRESS was put to bed in the late 1970s was to make a rather different hypertext system, our third by that time."},{"end":1735.0552330017088,"index":225,"markdown_text":"What we were interested in then was power tools for producing primarily graphical documents.","paragraph_end":false,"start":1729.3586444854734,"text":"What we were interested in then was power tools for producing primarily graphical documents."},{"end":1741.0666666666664,"index":226,"markdown_text":"I want to describe to you very quickly some of the things we did in our electronic document project.","paragraph_end":true,"start":1735.0552330017088,"text":"I want to describe to you very quickly some of the things we did in our electronic document project."},{"end":1743.619874779383,"index":227,"markdown_text":"There were three components to the system.","paragraph_end":false,"start":1741.0666666666664,"text":"There were three components to the system."},{"end":1748.4259136358894,"index":228,"markdown_text":"One was a viewer's component in which prepared screen pages could be viewed.","paragraph_end":false,"start":1743.619874779383,"text":"One was a viewer's component in which prepared screen pages could be viewed."},{"end":1759.0292378107704,"index":229,"markdown_text":"Figure 1 shows four iconic buttons, each one a composite of individual images drawn by hand and then, with the help of the authoring component, put together on a screen page and buttonized.","paragraph_end":false,"start":1748.4259136358894,"text":"Figure 1 shows four iconic buttons, each one a composite of individual images drawn by hand and then, with the help of the authoring component, put together on a screen page and buttonized."},{"end":1766.1281567255653,"index":230,"markdown_text":"This is typical of what a maintenance and repair technician would see as a typical page in the little maintenance and repair Dynabook icon.","paragraph_end":false,"start":1759.0292378107704,"text":"This is typical of what a maintenance and repair technician would see as a typical page in the little maintenance and repair Dynabook icon."},{"end":1768.8015156428016,"index":231,"markdown_text":"The other two components were for the author.","paragraph_end":false,"start":1766.1281567255653,"text":"The other two components were for the author."},{"end":1775.1094408671058,"index":232,"markdown_text":"The first was for making graphics for individual pages or their parts, a MacDraw-MacPaint combination.","paragraph_end":false,"start":1768.8015156428016,"text":"The first was for making graphics for individual pages or their parts, a MacDraw-MacPaint combination."},{"end":1783.770323816935,"index":233,"markdown_text":"The component most interesting for this audience, shown in Figure 2, was the hypertext creation component for constructing pages, chapters and links.","paragraph_end":false,"start":1775.1094408671058,"text":"The component most interesting for this audience, shown in Figure 2, was the hypertext creation component for constructing pages, chapters and links."},{"end":1789.7077837626136,"index":234,"markdown_text":"It was multiwindow, so that a page under construction could occupy either the entire screen or a portion of it.","paragraph_end":false,"start":1783.770323816935,"text":"It was multiwindow, so that a page under construction could occupy either the entire screen or a portion of it."},{"end":1796.2059508005775,"index":235,"markdown_text":"This allowed multiple pages or even chapters to be visible simultaneously so that you could create links from one to another.","paragraph_end":false,"start":1789.7077837626136,"text":"This allowed multiple pages or even chapters to be visible simultaneously so that you could create links from one to another."},{"end":1802.593976084391,"index":236,"markdown_text":"The whole interface is manipulated directly: there's almost no typing and lots of pointing at objects and manipulating them.","paragraph_end":false,"start":1796.2059508005775,"text":"The whole interface is manipulated directly: there's almost no typing and lots of pointing at objects and manipulating them."},{"end":1806.533333333333,"index":237,"markdown_text":"This was back in 1979 when that was not so common.","paragraph_end":true,"start":1802.593976084391,"text":"This was back in 1979 when that was not so common."},{"end":1812.5790167172747,"index":238,"markdown_text":"We spent a lot of time figuring out how to elide, that is, hide, information graphically.","paragraph_end":false,"start":1806.533333333333,"text":"We spent a lot of time figuring out how to elide, that is, hide, information graphically."},{"end":1816.8230066617327,"index":239,"markdown_text":"We had a 'detail button' that let us view things at varying levels of detail.","paragraph_end":false,"start":1812.5790167172747,"text":"We had a 'detail button' that let us view things at varying levels of detail."},{"end":1829.544967206319,"index":240,"markdown_text":"So the author could move these windows around, look at pages and chapters at arbitrary levels of detail, iconically create various kinds of buttons and specify actions to take place when the reader invoked a button.","paragraph_end":false,"start":1816.8230066617327,"text":"So the author could move these windows around, look at pages and chapters at arbitrary levels of detail, iconically create various kinds of buttons and specify actions to take place when the reader invoked a button."},{"end":1833.6988711675006,"index":241,"markdown_text":"Such actions could include animation and taking a link to another page.","paragraph_end":false,"start":1829.544967206319,"text":"Such actions could include animation and taking a link to another page."},{"end":1843.5381207784014,"index":242,"markdown_text":"The model for this hypertext is more a finite-state automaton in which transitions take you from one mode to the other rather than of a static hypertext with static links.","paragraph_end":false,"start":1833.6988711675006,"text":"The model for this hypertext is more a finite-state automaton in which transitions take you from one mode to the other rather than of a static hypertext with static links."},{"end":1851.6757722218829,"index":243,"markdown_text":"In particular, using a keywording facility, you could cause different parts to appear on the same page as a function of the keywords encountered during traversal.","paragraph_end":false,"start":1843.5381207784014,"text":"In particular, using a keywording facility, you could cause different parts to appear on the same page as a function of the keywords encountered during traversal."},{"end":1858.2666666666664,"index":244,"markdown_text":"So on two successive accesses a page might look quite different through hiding information or showing new buttons.","paragraph_end":true,"start":1851.6757722218829,"text":"So on two successive accesses a page might look quite different through hiding information or showing new buttons."},{"end":1862.7511346499123,"index":245,"markdown_text":"The system had three automatically created navigation aids.","paragraph_end":false,"start":1858.2666666666664,"text":"The system had three automatically created navigation aids."},{"end":1876.6049378077187,"index":246,"markdown_text":"First, it had a time line, as shown in Figure 3, that you could use to travel back in time, consisting of buttons of miniature page icons stamped with time and date, with color coding keying you to chapters.","paragraph_end":false,"start":1862.7511346499123,"text":"First, it had a time line, as shown in Figure 3, that you could use to travel back in time, consisting of buttons of miniature page icons stamped with time and date, with color coding keying you to chapters."},{"end":1891.9602377573647,"index":247,"markdown_text":"This is little bit like the 'recent page' in HyperCard, but here we are time traveling: we are not just going back to an image, we are going back to the state that accompanied our view of that image, because a page, as you remember, can change over time.","paragraph_end":false,"start":1876.6049378077187,"text":"This is little bit like the 'recent page' in HyperCard, but here we are time traveling: we are not just going back to an image, we are going back to the state that accompanied our view of that image, because a page, as you remember, can change over time."},{"end":1907.9161341349281,"index":248,"markdown_text":"Another was the 'neighbors' display: the current page is displayed in context with (on the left) a filmstrip of all the places you could have come from, and (on the right) all the places you could go to, and again you can pick any of these miniatures and go there directly.","paragraph_end":false,"start":1891.9602377573647,"text":"Another was the 'neighbors' display: the current page is displayed in context with (on the left) a filmstrip of all the places you could have come from, and (on the right) all the places you could go to, and again you can pick any of these miniatures and go there directly."},{"end":1918.5767557779945,"index":249,"markdown_text":"In general, this could be an arbitrarily complicated display with dozens of sources and destinations; then you use iconic scroll bars to move over these filmstrips.","paragraph_end":false,"start":1907.9161341349281,"text":"In general, this could be an arbitrarily complicated display with dozens of sources and destinations; then you use iconic scroll bars to move over these filmstrips."},{"end":1927.1999999999998,"index":250,"markdown_text":"The third navigation aid was a visual index of buttons of page miniatures arranged by key words, color-coded by chapter.","paragraph_end":true,"start":1918.5767557779945,"text":"The third navigation aid was a visual index of buttons of page miniatures arranged by key words, color-coded by chapter."},{"end":1930.7340857505797,"index":251,"markdown_text":"We learned some new lessons from this third system.","paragraph_end":false,"start":1927.1999999999998,"text":"We learned some new lessons from this third system."},{"end":1936.5708338737486,"index":252,"markdown_text":"It had great power tools for the author, but it still involved a tremendous amount of hand work.","paragraph_end":false,"start":1930.7340857505797,"text":"It had great power tools for the author, but it still involved a tremendous amount of hand work."},{"end":1960.3082763671873,"index":253,"markdown_text":"What you really would like in making fairly regular documents, like maintenance and repair manuals, is to drive the creation of the pictorial or textual, audio, video, etc., explanations directly from deep knowledge about the problem domain, the particular problem to be solved, the design rules for creating explanations in the various media, and the user of the manual.","paragraph_end":false,"start":1936.5708338737486,"text":"What you really would like in making fairly regular documents, like maintenance and repair manuals, is to drive the creation of the pictorial or textual, audio, video, etc., explanations directly from deep knowledge about the problem domain, the particular problem to be solved, the design rules for creating explanations in the various media, and the user of the manual."},{"end":1968.1173049926756,"index":254,"markdown_text":"You want, in effect, to produce an automated authoring capability in which most of these things can be driven from these knowledge bases.","paragraph_end":false,"start":1960.3082763671873,"text":"You want, in effect, to produce an automated authoring capability in which most of these things can be driven from these knowledge bases."},{"end":1975.1999999999998,"index":255,"markdown_text":"Steve Feiner's Ph.D. dissertation and his work since then describes such automated authoring.","paragraph_end":true,"start":1968.1173049926756,"text":"Steve Feiner's Ph.D. dissertation and his work since then describes such automated authoring."},{"end":1983.0806252479551,"index":256,"markdown_text":"The next system I would like to mention briefly is not a hypertext system, but it formed our thinking about ingredients at the nodes of a hypertext.","paragraph_end":false,"start":1975.1999999999998,"text":"The next system I would like to mention briefly is not a hypertext system, but it formed our thinking about ingredients at the nodes of a hypertext."},{"end":1997.9807149887083,"index":257,"markdown_text":"This is the BALSA (Brown ALgorithm Simulator and Animator) environment, created in 1983 by Bob Sedgewick, who is now chairman of computer science at Princeton University, and Marc Brown, who last year received an ACM distinguished dissertation award for this work.","paragraph_end":false,"start":1983.0806252479551,"text":"This is the BALSA (Brown ALgorithm Simulator and Animator) environment, created in 1983 by Bob Sedgewick, who is now chairman of computer science at Princeton University, and Marc Brown, who last year received an ACM distinguished dissertation award for this work."},{"end":2007.1931364059446,"index":258,"markdown_text":"In the course of a lecture we use BALSA on a network of workstations in the classroom to look at dynamic visualizations of programs implementing algorithms and data structures.","paragraph_end":false,"start":1997.9807149887083,"text":"In the course of a lecture we use BALSA on a network of workstations in the classroom to look at dynamic visualizations of programs implementing algorithms and data structures."},{"end":2013.2112514495848,"index":259,"markdown_text":"If a picture is worth a thousand words, a dynamic picture of time-varying objects is worth a thousand static ones.","paragraph_end":false,"start":2007.1931364059446,"text":"If a picture is worth a thousand words, a dynamic picture of time-varying objects is worth a thousand static ones."},{"end":2016.8261234283445,"index":260,"markdown_text":"We need dynamics at the nodes, not just static pictures and text.","paragraph_end":false,"start":2013.2112514495848,"text":"We need dynamics at the nodes, not just static pictures and text."},{"end":2022.58388633728,"index":261,"markdown_text":"Something one learns quickly about user-controlled real-time animation is that hardware power is really essential.","paragraph_end":false,"start":2016.8261234283445,"text":"Something one learns quickly about user-controlled real-time animation is that hardware power is really essential."},{"end":2032.4071323394774,"index":262,"markdown_text":"If it takes 10 seconds to put up the next picture because that's how long the hardware needs, you do not have kinesthetic feedback, you do not have smoothness and visual continuity, it is not responsive.","paragraph_end":false,"start":2022.58388633728,"text":"If it takes 10 seconds to put up the next picture because that's how long the hardware needs, you do not have kinesthetic feedback, you do not have smoothness and visual continuity, it is not responsive."},{"end":2036.2666666666664,"index":263,"markdown_text":"It makes a great demo, but it drives you crazy in real life.","paragraph_end":true,"start":2032.4071323394774,"text":"It makes a great demo, but it drives you crazy in real life."},{"end":2043.1861562887825,"index":264,"markdown_text":"We have been using electronically assisted teaching now for five years and our new building contains two workstation auditoriums.","paragraph_end":false,"start":2036.2666666666664,"text":"We have been using electronically assisted teaching now for five years and our new building contains two workstation auditoriums."},{"end":2050.6363737742104,"index":265,"markdown_text":"BALSA has been integrated into a variety of courses in computer science and math, as well as in neural science and even political science.","paragraph_end":false,"start":2043.1861562887825,"text":"BALSA has been integrated into a variety of courses in computer science and math, as well as in neural science and even political science."},{"end":2060.469859377543,"index":266,"markdown_text":"These experiences led to Brown's wholesale commitment to workstations and in fact to the creation in 1983 of IRIS, our Institute for Research on Information and Scholarship.","paragraph_end":false,"start":2050.6363737742104,"text":"These experiences led to Brown's wholesale commitment to workstations and in fact to the creation in 1983 of IRIS, our Institute for Research on Information and Scholarship."},{"end":2074.12858988444,"index":267,"markdown_text":"IRIS not only creates scholars' workstation software but also has a completely symmetrical program evaluation branch where social scientists with an interest in this area study needs, requirements and impact of this technology on scholarly work.","paragraph_end":false,"start":2060.469859377543,"text":"IRIS not only creates scholars' workstation software but also has a completely symmetrical program evaluation branch where social scientists with an interest in this area study needs, requirements and impact of this technology on scholarly work."},{"end":2081.733333333333,"index":268,"markdown_text":"And by the way, 'scholarly work' to us is not just the work of faculty members but also that of students-we're all scholars on this bus.","paragraph_end":true,"start":2074.12858988444,"text":"And by the way, 'scholarly work' to us is not just the work of faculty members but also that of students-we're all scholars on this bus."},{"end":2102.254467709859,"index":269,"markdown_text":"We set up IRIS at a time when there was a lot of enthusiasm in front-running universities for buying into the workstation revolution, looking at the Xerox PARC model of distributed computation and saying, \"We want to deliver tools that really take advantage of the expressive power of such workstations.\"","paragraph_end":false,"start":2081.733333333333,"text":"We set up IRIS at a time when there was a lot of enthusiasm in front-running universities for buying into the workstation revolution, looking at the Xerox PARC model of distributed computation and saying, \"We want to deliver tools that really take advantage of the expressive power of such workstations.\""},{"end":2109.3317563374835,"index":270,"markdown_text":"So IRIS and other organizations on other campuses were created to develop scholarly tools.","paragraph_end":false,"start":2102.254467709859,"text":"So IRIS and other organizations on other campuses were created to develop scholarly tools."},{"end":2118.129993947347,"index":271,"markdown_text":"I think, though, that there is still a paucity of such scholarly tools and we are at the very beginning of understanding what they might be.","paragraph_end":true,"start":2109.3317563374835,"text":"I think, though, that there is still a paucity of such scholarly tools and we are at the very beginning of understanding what they might be."},{"end":2122.7347379048665,"index":272,"markdown_text":"I'm going to sum up what I think are some key areas we all ought to be looking at.","paragraph_end":false,"start":2118.129993947347,"text":"I'm going to sum up what I think are some key areas we all ought to be looking at."},{"end":2125.0170884450276,"index":273,"markdown_text":"Here are nine quick items.","paragraph_end":false,"start":2122.7347379048665,"text":"Here are nine quick items."},{"end":2133.966305287679,"index":274,"markdown_text":"My first concern is that systems may develop great infrastructure, great hypertext glue, but what's at the nodes?","paragraph_end":false,"start":2125.0170884450276,"text":"My first concern is that systems may develop great infrastructure, great hypertext glue, but what's at the nodes?"},{"end":2149.051838429769,"index":275,"markdown_text":"As with the 2D animation in BALSA, I think we should be aiming at user-controlled 3D animation, where the interactive user has control over what is being shown, the level of detail, the visualizations employed, and so on.","paragraph_end":false,"start":2133.966305287679,"text":"As with the 2D animation in BALSA, I think we should be aiming at user-controlled 3D animation, where the interactive user has control over what is being shown, the level of detail, the visualizations employed, and so on."},{"end":2155.733333333333,"index":276,"markdown_text":"This is just a wide-open area that needs a lot of study, not to mention vast hardware power.","paragraph_end":true,"start":2149.051838429769,"text":"This is just a wide-open area that needs a lot of study, not to mention vast hardware power."},{"end":2162.088872893651,"index":277,"markdown_text":"Second, Ted talks a lot about the docuverse, a mythical entity out there that is all-inclusive and contains everything.","paragraph_end":false,"start":2155.733333333333,"text":"Second, Ted talks a lot about the docuverse, a mythical entity out there that is all-inclusive and contains everything."},{"end":2168.044063313802,"index":278,"markdown_text":"But instead, right now we are building docu-islands; none of our systems talk to each other, they are wholly incompatible.","paragraph_end":false,"start":2162.088872893651,"text":"But instead, right now we are building docu-islands; none of our systems talk to each other, they are wholly incompatible."},{"end":2177.712490781148,"index":279,"markdown_text":"So we are all working the same agenda, more or less, but we can't exchange stuff; there is no exchange format, there is no universality, and furthermore, our systems are closed systems.","paragraph_end":false,"start":2168.044063313802,"text":"So we are all working the same agenda, more or less, but we can't exchange stuff; there is no exchange format, there is no universality, and furthermore, our systems are closed systems."},{"end":2182.596747144063,"index":280,"markdown_text":"In a sense, they are making the same mistake as the all-in-one environments in personal computing.","paragraph_end":false,"start":2177.712490781148,"text":"In a sense, they are making the same mistake as the all-in-one environments in personal computing."},{"end":2189.7830102284747,"index":281,"markdown_text":"Yes, they give you a word processor and a spreadsheet editor and a business graphics package, etc., but none of them are really satisfactory.","paragraph_end":false,"start":2182.596747144063,"text":"Yes, they give you a word processor and a spreadsheet editor and a business graphics package, etc., but none of them are really satisfactory."},{"end":2195.798253758748,"index":282,"markdown_text":"And our experience with FRESS, where we had to escape to command language, showed that it is really important to be able to go outside.","paragraph_end":false,"start":2189.7830102284747,"text":"And our experience with FRESS, where we had to escape to command language, showed that it is really important to be able to go outside."},{"end":2199.8517854054767,"index":283,"markdown_text":"So it's not enough to bundle the HyperCard package with every Mac you buy.","paragraph_end":false,"start":2195.798253758748,"text":"So it's not enough to bundle the HyperCard package with every Mac you buy."},{"end":2211.4666666666662,"index":284,"markdown_text":"It really ought to be migrated down, become part of the toolbox, so that application programmers can take their applications and take advantage of a standard linking protocol that works within and between applications.","paragraph_end":true,"start":2199.8517854054767,"text":"It really ought to be migrated down, become part of the toolbox, so that application programmers can take their applications and take advantage of a standard linking protocol that works within and between applications."},{"end":2214.7403887192404,"index":285,"markdown_text":"So I'm going to raise a red-flag word: standards.","paragraph_end":false,"start":2211.4666666666662,"text":"So I'm going to raise a red-flag word: standards."},{"end":2217.1831659952795,"index":286,"markdown_text":"I'm a firm believer in standards.","paragraph_end":false,"start":2214.7403887192404,"text":"I'm a firm believer in standards."},{"end":2224.0910195986426,"index":287,"markdown_text":"And everybody will say it is absolutely premature to standardize when we don't even know what the hell we're talking about.","paragraph_end":false,"start":2217.1831659952795,"text":"And everybody will say it is absolutely premature to standardize when we don't even know what the hell we're talking about."},{"end":2226.7340249697363,"index":288,"markdown_text":"We are still in the experimental phase.","paragraph_end":false,"start":2224.0910195986426,"text":"We are still in the experimental phase."},{"end":2227.88533445994,"index":289,"markdown_text":"I believe that.","paragraph_end":false,"start":2226.7340249697363,"text":"I believe that."},{"end":2238.866910235087,"index":290,"markdown_text":"But if we don't start thinking about standards, five years from now we are going to have a wealth of these little docu-islands which are totally incompatible, and that's crazy.","paragraph_end":true,"start":2227.88533445994,"text":"But if we don't start thinking about standards, five years from now we are going to have a wealth of these little docu-islands which are totally incompatible, and that's crazy."},{"end":2241.2295963923134,"index":291,"markdown_text":"Point number three is size.","paragraph_end":false,"start":2238.866910235087,"text":"Point number three is size."},{"end":2243.892623202006,"index":292,"markdown_text":"We are still in the toy problem stage.","paragraph_end":false,"start":2241.2295963923134,"text":"We are still in the toy problem stage."},{"end":2247.4266417185463,"index":293,"markdown_text":"There has not been a decent-sized hypertext built yet.","paragraph_end":false,"start":2243.892623202006,"text":"There has not been a decent-sized hypertext built yet."},{"end":2254.2043478647865,"index":294,"markdown_text":"And we won't know what it is like until we deal with the kinds of documentation problems that people in the real world deal with.","paragraph_end":false,"start":2247.4266417185463,"text":"And we won't know what it is like until we deal with the kinds of documentation problems that people in the real world deal with."},{"end":2259.750654474894,"index":295,"markdown_text":"People have graphed the number of pages of technical manuals for fighter aircraft against time.","paragraph_end":false,"start":2254.2043478647865,"text":"People have graphed the number of pages of technical manuals for fighter aircraft against time."},{"end":2267.4594175974526,"index":296,"markdown_text":"In World War II, we had 1K page documentation per fighter aircraft; in Korea, 10K; in Vietnam, 100K.","paragraph_end":false,"start":2259.750654474894,"text":"In World War II, we had 1K page documentation per fighter aircraft; in Korea, 10K; in Vietnam, 100K."},{"end":2269.4116385142006,"index":297,"markdown_text":"It's an exponential curve.","paragraph_end":false,"start":2267.4594175974526,"text":"It's an exponential curve."},{"end":2279.0325777689613,"index":298,"markdown_text":"The F-16 has 600K pages, and the advanced tactical fighter will probably have somewhere around a million and a half pages of technical documentation.","paragraph_end":false,"start":2269.4116385142006,"text":"The F-16 has 600K pages, and the advanced tactical fighter will probably have somewhere around a million and a half pages of technical documentation."},{"end":2284.5333333333333,"index":299,"markdown_text":"It is, in effect, a giant hypertext that should be linked, and done with change control.","paragraph_end":true,"start":2279.0325777689613,"text":"It is, in effect, a giant hypertext that should be linked, and done with change control."},{"end":2286.6856295784314,"index":300,"markdown_text":"And that is my fourth point.","paragraph_end":false,"start":2284.5333333333333,"text":"And that is my fourth point."},{"end":2291.090328725179,"index":301,"markdown_text":"We have to do something about versioning and change control in the large.","paragraph_end":false,"start":2286.6856295784314,"text":"We have to do something about versioning and change control in the large."},{"end":2301.671618016561,"index":302,"markdown_text":"But we won't have a fighting chance to kill paper and become an on-line community until we tackle the kinds of problems that paper solves for us today.","paragraph_end":false,"start":2291.090328725179,"text":"But we won't have a fighting chance to kill paper and become an on-line community until we tackle the kinds of problems that paper solves for us today."},{"end":2309.2497020085652,"index":303,"markdown_text":"Paper is convenient, you can carry it around and versions are easily created and maintained.","paragraph_end":false,"start":2301.671618016561,"text":"Paper is convenient, you can carry it around and versions are easily created and maintained."},{"end":2317.733333333333,"index":304,"markdown_text":"Hypertext is not as accessible as paper, and it certainly isn't prepared to deal with the size problems as paper does.","paragraph_end":true,"start":2309.2497020085652,"text":"Hypertext is not as accessible as paper, and it certainly isn't prepared to deal with the size problems as paper does."},{"end":2321.366388781865,"index":305,"markdown_text":"The fifth problem is navigation, lost in hyperspace.","paragraph_end":false,"start":2317.733333333333,"text":"The fifth problem is navigation, lost in hyperspace."},{"end":2328.8226592381793,"index":306,"markdown_text":"Some people say we need content and structure query, we need virtual structures, composites; others say we need pruning.","paragraph_end":false,"start":2321.366388781865,"text":"Some people say we need content and structure query, we need virtual structures, composites; others say we need pruning."},{"end":2329.8034841855365,"index":307,"markdown_text":"All of this is true.","paragraph_end":false,"start":2328.8226592381793,"text":"All of this is true."},{"end":2336.158828481038,"index":308,"markdown_text":"I find the notion of dynamically constructing a hypertext very intriguing, but very difficult to do in general.","paragraph_end":false,"start":2329.8034841855365,"text":"I find the notion of dynamically constructing a hypertext very intriguing, but very difficult to do in general."},{"end":2342.9345280965167,"index":309,"markdown_text":"My point of view is that in a sense hypertext gives us a goto, and a goto, as we all know, produces spaghetti.","paragraph_end":false,"start":2336.158828481038,"text":"My point of view is that in a sense hypertext gives us a goto, and a goto, as we all know, produces spaghetti."},{"end":2347.0680034001666,"index":310,"markdown_text":"At most we have invented the if-then-else-if, with hierarchy.","paragraph_end":false,"start":2342.9345280965167,"text":"At most we have invented the if-then-else-if, with hierarchy."},{"end":2353.6335255940753,"index":311,"markdown_text":"That's our one structured flow-of-control concept, where you have some sense of what you are looking at in your hyperdocument.","paragraph_end":false,"start":2347.0680034001666,"text":"That's our one structured flow-of-control concept, where you have some sense of what you are looking at in your hyperdocument."},{"end":2357.4167077382403,"index":312,"markdown_text":"Well, we need to discover what the equivalents of other constructs are.","paragraph_end":false,"start":2353.6335255940753,"text":"Well, we need to discover what the equivalents of other constructs are."},{"end":2367.1248719533282,"index":313,"markdown_text":"As Ted did at the start, we have to invent other document forms that somehow become standard so that people have pattern recognition and say, \"Ah, yes, I know how that one works.\"","paragraph_end":false,"start":2357.4167077382403,"text":"As Ted did at the start, we have to invent other document forms that somehow become standard so that people have pattern recognition and say, \"Ah, yes, I know how that one works.\""},{"end":2375.4666666666662,"index":314,"markdown_text":"So we need new forms, new flow of control kinds of constructs besides just unbridled goto-ness of directed graph structures.","paragraph_end":true,"start":2367.1248719533282,"text":"So we need new forms, new flow of control kinds of constructs besides just unbridled goto-ness of directed graph structures."},{"end":2382.443889347712,"index":315,"markdown_text":"The other navigation aid we need is a tell-me-what you've-got, which probably entails AI.","paragraph_end":false,"start":2375.4666666666662,"text":"The other navigation aid we need is a tell-me-what you've-got, which probably entails AI."},{"end":2387.629257170359,"index":316,"markdown_text":"Instead of just syntax, we need some notion of semantics at the nodes.","paragraph_end":false,"start":2382.443889347712,"text":"Instead of just syntax, we need some notion of semantics at the nodes."},{"end":2393.4652990976965,"index":317,"markdown_text":"We need to be able to derive new knowledge from old, using inference engines.","paragraph_end":false,"start":2387.629257170359,"text":"We need to be able to derive new knowledge from old, using inference engines."},{"end":2403.1999999999994,"index":318,"markdown_text":"Just storing billions and billions of facts that are tied together is not going to do it for us; that will just drown us in associations.","paragraph_end":true,"start":2393.4652990976965,"text":"Just storing billions and billions of facts that are tied together is not going to do it for us; that will just drown us in associations."},{"end":2406.453784656524,"index":319,"markdown_text":"The sixth point is that we need hypermedia designers.","paragraph_end":false,"start":2403.1999999999994,"text":"The sixth point is that we need hypermedia designers."},{"end":2410.5986055850976,"index":320,"markdown_text":"Remember how crazy everybody went when they got the ability to print multiple fonts?","paragraph_end":false,"start":2406.453784656524,"text":"Remember how crazy everybody went when they got the ability to print multiple fonts?"},{"end":2411.7799794197076,"index":321,"markdown_text":"We got 'fontitis.'","paragraph_end":false,"start":2410.5986055850976,"text":"We got 'fontitis.'"},{"end":2417.3965126991266,"index":322,"markdown_text":"Then people discovered color screens and we got 'coloritis,' without any rules, without any design discipline.","paragraph_end":false,"start":2411.7799794197076,"text":"Then people discovered color screens and we got 'coloritis,' without any rules, without any design discipline."},{"end":2424.114326667785,"index":323,"markdown_text":"Now we've got linkitis,' and people with no graphic design experience or talent are going to throw stuff together and it will look terrible.","paragraph_end":false,"start":2417.3965126991266,"text":"Now we've got linkitis,' and people with no graphic design experience or talent are going to throw stuff together and it will look terrible."},{"end":2428.5394737243646,"index":324,"markdown_text":"You all know that one of the interesting things that happened after Gutenberg was typography.","paragraph_end":false,"start":2424.114326667785,"text":"You all know that one of the interesting things that happened after Gutenberg was typography."},{"end":2432.574166488647,"index":325,"markdown_text":"For a while after Gutenberg, type designers were using manuscript letterforms.","paragraph_end":false,"start":2428.5394737243646,"text":"For a while after Gutenberg, type designers were using manuscript letterforms."},{"end":2441.4945423126214,"index":326,"markdown_text":"And they were using erasers and paintbrushes to doctor the stuff the typesetting machine had set so it would look more like an old-fashioned manuscript and people would be familiar with it.","paragraph_end":false,"start":2432.574166488647,"text":"And they were using erasers and paintbrushes to doctor the stuff the typesetting machine had set so it would look more like an old-fashioned manuscript and people would be familiar with it."},{"end":2447.3012973785394,"index":327,"markdown_text":"It took a long while for people to understand that this new medium demanded a new style, a new typography.","paragraph_end":false,"start":2441.4945423126214,"text":"It took a long while for people to understand that this new medium demanded a new style, a new typography."},{"end":2452.4472820281976,"index":328,"markdown_text":"So typography is an invention, and it is nearly as important as the printing press in the first place.","paragraph_end":false,"start":2447.3012973785394,"text":"So typography is an invention, and it is nearly as important as the printing press in the first place."},{"end":2456.666666666666,"index":329,"markdown_text":"We don't want to mimic the old manuscript form in our hypertexts.","paragraph_end":true,"start":2452.4472820281976,"text":"We don't want to mimic the old manuscript form in our hypertexts."},{"end":2460.450768152872,"index":330,"markdown_text":"Aldus Manutius discovered modern pages.","paragraph_end":false,"start":2456.666666666666,"text":"Aldus Manutius discovered modern pages."},{"end":2472.5338651339207,"index":331,"markdown_text":"And pages gave us a new way to cross-reference, to talk about content, to index, and that technology took a while, but it made information a great deal more accessible.","paragraph_end":false,"start":2460.450768152872,"text":"And pages gave us a new way to cross-reference, to talk about content, to index, and that technology took a while, but it made information a great deal more accessible."},{"end":2485.3969397226965,"index":332,"markdown_text":"So we need people who are concerned about layout and design and typography of hypermedia and can think about classification and indexing and how we put things together.","paragraph_end":true,"start":2472.5338651339207,"text":"So we need people who are concerned about layout and design and typography of hypermedia and can think about classification and indexing and how we put things together."},{"end":2497.209742991129,"index":333,"markdown_text":"But we don't want to put things together in such a way that there is one point of view, because if we've learned one thing from interactive tools up to now is that multiview is the way people work.","paragraph_end":false,"start":2485.3969397226965,"text":"But we don't want to put things together in such a way that there is one point of view, because if we've learned one thing from interactive tools up to now is that multiview is the way people work."},{"end":2499.6323694864905,"index":334,"markdown_text":"You can not have it just one way.","paragraph_end":false,"start":2497.209742991129,"text":"You can not have it just one way."},{"end":2503.256297556559,"index":335,"markdown_text":"We need an update to Larry Tesler's \"Don't mode me in.\"","paragraph_end":false,"start":2499.6323694864905,"text":"We need an update to Larry Tesler's \"Don't mode me in.\""},{"end":2507.0203776041662,"index":336,"markdown_text":"Jim Foley and I recently came up with \"Don't metaphor me in.\"","paragraph_end":false,"start":2503.256297556559,"text":"Jim Foley and I recently came up with \"Don't metaphor me in.\""},{"end":2514.658656565348,"index":337,"markdown_text":"Don't give me a little card image and say, \"That's all you've got, because that's what I thought you should want for your virtual shoebox.\"","paragraph_end":false,"start":2507.0203776041662,"text":"Don't give me a little card image and say, \"That's all you've got, because that's what I thought you should want for your virtual shoebox.\""},{"end":2520.3848623911535,"index":338,"markdown_text":"There have got to be multiple modalities and the designers have to be able to deal with that.","paragraph_end":false,"start":2514.658656565348,"text":"There have got to be multiple modalities and the designers have to be able to deal with that."},{"end":2527.066666666666,"index":339,"markdown_text":"So that was issue number seven: don't metaphor me in, don't give me only one way of looking at things.","paragraph_end":true,"start":2520.3848623911535,"text":"So that was issue number seven: don't metaphor me in, don't give me only one way of looking at things."},{"end":2533.8438449541723,"index":340,"markdown_text":"Point eight: accessibility, portability-I want a laptop Dynabook.","paragraph_end":false,"start":2527.066666666666,"text":"Point eight: accessibility, portability-I want a laptop Dynabook."},{"end":2537.437651220957,"index":341,"markdown_text":"And I also want wallscreen-size displays.","paragraph_end":false,"start":2533.8438449541723,"text":"And I also want wallscreen-size displays."},{"end":2545.7564621607457,"index":342,"markdown_text":"I want my whiteboard-sized hypertext display, and not until it's that big do I think we can really start working with hypertext.","paragraph_end":false,"start":2537.437651220957,"text":"I want my whiteboard-sized hypertext display, and not until it's that big do I think we can really start working with hypertext."},{"end":2548.9398346583043,"index":343,"markdown_text":"Hoker performs the following experiment.","paragraph_end":false,"start":2545.7564621607457,"text":"Hoker performs the following experiment."},{"end":2562.8245402018224,"index":344,"markdown_text":"Take The Wall Street Journal and move around a little cutout the size of a Mac screen and see how happy you are with The Wall Street Journal, versus looking at a page of it in its entirety and immediately picking up what you might be interested in reading.","paragraph_end":false,"start":2548.9398346583043,"text":"Take The Wall Street Journal and move around a little cutout the size of a Mac screen and see how happy you are with The Wall Street Journal, versus looking at a page of it in its entirety and immediately picking up what you might be interested in reading."},{"end":2565.706745020548,"index":345,"markdown_text":"A very persuasive point.","paragraph_end":true,"start":2562.8245402018224,"text":"A very persuasive point."},{"end":2572.3337649027503,"index":346,"markdown_text":"And finally, point number nine: we must think about the sociopolitico-economic problems.","paragraph_end":false,"start":2565.706745020548,"text":"And finally, point number nine: we must think about the sociopolitico-economic problems."},{"end":2577.2890127817786,"index":347,"markdown_text":"We have not come to grips with issues of intellectual property rights and compensation.","paragraph_end":false,"start":2572.3337649027503,"text":"We have not come to grips with issues of intellectual property rights and compensation."},{"end":2578.740550867716,"index":348,"markdown_text":"Congress and the U.S.","paragraph_end":false,"start":2577.2890127817786,"text":"Congress and the U.S."},{"end":2585.2774752298988,"index":349,"markdown_text":"Patent Office and copyright lawyers and so on do not understand what is involved here and need to be educated.","paragraph_end":false,"start":2578.740550867716,"text":"Patent Office and copyright lawyers and so on do not understand what is involved here and need to be educated."},{"end":2591.043582789103,"index":350,"markdown_text":"If we shrink away from those issues and leave it to them, there is going to be absolute chaos.","paragraph_end":false,"start":2585.2774752298988,"text":"If we shrink away from those issues and leave it to them, there is going to be absolute chaos."},{"end":2599.066666666666,"index":351,"markdown_text":"Ted, again, has written extensively on this issue and has postulated some interesting mechanisms for coping with the problems.","paragraph_end":true,"start":2591.043582789103,"text":"Ted, again, has written extensively on this issue and has postulated some interesting mechanisms for coping with the problems."},{"end":2602.120658699671,"index":352,"markdown_text":"So there are essentially three classes of people.","paragraph_end":false,"start":2599.066666666666,"text":"So there are essentially three classes of people."},{"end":2621.0854483286535,"index":353,"markdown_text":"There are the visionary hypers who say, not only is the glass not half empty, it's overflowing with opportunities and possibilities and technology push of CD ROMs, 100 megabytes and 100 MIPS on your personal computer in just a few years, and so on.","paragraph_end":false,"start":2602.120658699671,"text":"There are the visionary hypers who say, not only is the glass not half empty, it's overflowing with opportunities and possibilities and technology push of CD ROMs, 100 megabytes and 100 MIPS on your personal computer in just a few years, and so on."},{"end":2627.302529207865,"index":354,"markdown_text":"They are saying everything is great and we have a wonderful universe to explore.","paragraph_end":true,"start":2621.0854483286535,"text":"They are saying everything is great and we have a wonderful universe to explore."},{"end":2635.683484903971,"index":355,"markdown_text":"Then there are the skeptics who say, not only is the glass not half full, but there was probably never any water in it to begin with.","paragraph_end":false,"start":2627.302529207865,"text":"Then there are the skeptics who say, not only is the glass not half full, but there was probably never any water in it to begin with."},{"end":2647.6791647593177,"index":356,"markdown_text":"And I'm a third type sitting on the fence somewhere in between these two extremes, saying, I've used a lot of hypertext systems and I think they are neat and show a lot of potential.","paragraph_end":false,"start":2635.683484903971,"text":"And I'm a third type sitting on the fence somewhere in between these two extremes, saying, I've used a lot of hypertext systems and I think they are neat and show a lot of potential."},{"end":2665.8719011942544,"index":357,"markdown_text":"I think we are just at the very beginning and it's too early to rush to judgment, but it's clear that collectively we have a lot of hard but exciting work to do to make this technology work and to create what has been called the electronic Alexandria.","paragraph_end":true,"start":2647.6791647593177,"text":"I think we are just at the very beginning and it's too early to rush to judgment, but it's clear that collectively we have a lot of hard but exciting work to do to make this technology work and to create what has been called the electronic Alexandria."},{"end":2678.9333333333334,"index":358,"markdown_text":"Author's Present Address: Andries van Dam, Brown University, Dept. of Computer Science, 115 Waterman St., Providence, RI 02912.","paragraph_end":true,"start":2665.8719011942544,"text":"Author's Present Address: Andries van Dam, Brown University, Dept. of Computer Science, 115 Waterman St., Providence, RI 02912."},{"end":2704.7660950978598,"index":359,"markdown_tex
